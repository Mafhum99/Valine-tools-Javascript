<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS conic gradients with degree stops">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F300; Conic Gradient Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F300;</span>
        <h1>Conic Gradient Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS conic gradients with custom color stops</p>

            <div id="tool-content">
                <div id="color-stops">
                    <div class="color-stop-row form-group">
                        <input type="color" class="form-input form-input-color stop-color" value="#ef4444">
                        <input type="number" class="form-input stop-degree" value="0" min="0" max="360" placeholder="deg">
                        <span class="text-muted">deg</span>
                    </div>
                    <div class="color-stop-row form-group">
                        <input type="color" class="form-input form-input-color stop-color" value="#22c55e">
                        <input type="number" class="form-input stop-degree" value="120" min="0" max="360" placeholder="deg">
                        <span class="text-muted">deg</span>
                    </div>
                    <div class="color-stop-row form-group">
                        <input type="color" class="form-input form-input-color stop-color" value="#3b82f6">
                        <input type="number" class="form-input stop-degree" value="240" min="0" max="360" placeholder="deg">
                        <span class="text-muted">deg</span>
                    </div>
                    <div class="color-stop-row form-group">
                        <input type="color" class="form-input form-input-color stop-color" value="#ef4444">
                        <input type="number" class="form-input stop-degree" value="360" min="0" max="360" placeholder="deg">
                        <span class="text-muted">deg</span>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="addStopBtn" class="btn btn-secondary">+ Add Stop</button>
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div id="preview" class="gradient-preview"></div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
