<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert plain text to HTML">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4C4; Text to HTML Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4C4;</span>
        <h1>Text to HTML Converter</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Wrap text in HTML paragraph tags, convert newlines to breaks</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Paste text to convert</label>
                    <textarea id="input" class="form-textarea" rows="10" placeholder="Hello World\n\nThis is a new paragraph.\n\nAnd another one."></textarea>
                </div>

                <div class="btn-group">
                    <button id="convertBtn" class="btn btn-primary">&#x1F504; Convert</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">HTML Output</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
