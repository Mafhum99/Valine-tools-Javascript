<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Encrypt text with Caesar cipher">
    <meta name="theme-color" content="#2563eb">
    <title>🔒 Text Encryptor - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔒</span>
        <h1>Text Encryptor</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Encrypt text using Caesar cipher</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input Text</label>
                    <textarea id="input" class="form-input" rows="4" placeholder="Enter text to encrypt..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shift">Shift Amount (1-25)</label>
                    <input type="number" id="shift" class="form-input" min="1" max="25" value="3" placeholder="Enter shift amount...">
                </div>

                <div class="btn-group">
                    <button id="encrypt" class="btn btn-primary btn-block">🔒 Encrypt</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Encrypted Text</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
