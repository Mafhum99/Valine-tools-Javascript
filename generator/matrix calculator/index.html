<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Perform matrix operations: add, subtract, multiply, transpose, determinant, inverse">
    <meta name="theme-color" content="#2563eb">
    <title>Matrix Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔢</span>
        <h1>Matrix Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Perform operations on matrices: add, subtract, multiply, transpose, determinant, inverse</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="matrix-size">Matrix Size</label>
                    <select id="matrix-size" class="form-select">
                        <option value="2">2x2</option>
                        <option value="3" selected>3x3</option>
                        <option value="4">4x4</option>
                        <option value="5">5x5</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="operation">Operation</label>
                    <select id="operation" class="form-select">
                        <option value="add">A + B</option>
                        <option value="subtract">A - B</option>
                        <option value="multiply">A x B</option>
                        <option value="transpose-a">Transpose A</option>
                        <option value="transpose-b">Transpose B</option>
                        <option value="determinant-a">Determinant A</option>
                        <option value="inverse-a">Inverse A</option>
                        <option value="scalar">A x Scalar</option>
                    </select>
                </div>
                <div class="form-group" id="matrix-a-inputs">
                    <label class="form-label">Matrix A</label>
                    <div id="matrix-a-grid" class="matrix-grid-a"></div>
                </div>
                <div class="form-group" id="matrix-b-inputs">
                    <label class="form-label">Matrix B</label>
                    <div id="matrix-b-grid" class="matrix-grid-b"></div>
                </div>
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
