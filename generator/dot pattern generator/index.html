<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS dot pattern backgrounds">
    <meta name="theme-color" content="#2563eb">
    <title>Dot Pattern Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Dot Pattern Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS dot pattern backgrounds</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="dot-color">Dot Color</label>
                    <input type="color" id="dot-color" value="#94a3b8" class="color-picker-inline">
                    <input type="text" id="dot-color-text" value="#94a3b8" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="dot-bg">Background Color</label>
                    <input type="color" id="dot-bg" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="dot-bg-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="dot-size">Dot Radius (px)</label>
                    <input type="range" id="dot-size" min="1" max="10" value="2" class="form-range">
                    <span id="dot-size-value" class="range-value">2px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="dot-spacing">Dot Spacing (px)</label>
                    <input type="range" id="dot-spacing" min="6" max="40" value="16" class="form-range">
                    <span id="dot-spacing-value" class="range-value">16px</span>
                </div>

                <div class="preview-box" id="dot-preview" style="width:100%;height:200px;border-radius:var(--radius);border:1px solid var(--gray-300);"></div>

                <div class="result-box" id="dot-output">
                    <div class="result-label">CSS Code</div>
                    <code id="dot-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
