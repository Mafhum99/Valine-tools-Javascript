<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1F4D0; Image Size Calculator - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4D0;</span>
        <h1>Image Size Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert image dimensions between pixels, inches, and centimeters</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="width">Width</label>
                    <input type="number" id="width" class="form-input" placeholder="1920" min="0.1" step="any">
                </div>
                <div class="form-group">
                    <label class="form-label" for="height">Height</label>
                    <input type="number" id="height" class="form-input" placeholder="1080" min="0.1" step="any">
                </div>
                <div class="form-group">
                    <label class="form-label" for="unit">Unit</label>
                    <select id="unit" class="form-input">
                        <option value="px">Pixels (px)</option>
                        <option value="in">Inches (in)</option>
                        <option value="cm">Centimeters (cm)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="dpi">DPI (Dots Per Inch)</label>
                    <input type="number" id="dpi" class="form-input" value="96" min="1">
                </div>
                <div class="btn-group">
                    <button id="calculateBtn" class="btn btn-primary">&#x1F522; Calculate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>
                <div class="result-box" id="result">
                    <div class="result-label">Dimensions in All Units</div>
                    <div id="output">-</div>
                </div>
                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
