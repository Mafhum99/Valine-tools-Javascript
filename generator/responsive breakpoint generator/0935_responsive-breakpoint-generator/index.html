<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate responsive media queries">
    <meta name="theme-color" content="#2563eb">
    <title>📱 Responsive Breakpoint Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📱</span>
        <h1>Responsive Breakpoint Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate responsive media query CSS templates</p>

            <div id="tool-content">
                <h3 class="section-title">Breakpoint Values (px)</h3>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="mobileBreakpoint">Mobile (max-width)</label>
                        <input type="number" id="mobileBreakpoint" class="form-input" value="640" min="320" max="1023">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tabletBreakpoint">Tablet (max-width)</label>
                        <input type="number" id="tabletBreakpoint" class="form-input" value="1024" min="641" max="1439">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="desktopBreakpoint">Desktop (min-width)</label>
                    <input type="number" id="desktopBreakpoint" class="form-input" value="1025" min="768" max="2560">
                </div>

                <div class="form-group">
                    <label class="form-label" for="approach">Media Query Approach</label>
                    <select id="approach" class="form-select">
                        <option value="mobile-first">Mobile First (min-width)</option>
                        <option value="desktop-first">Desktop First (max-width)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="includeExtras">Include Extra Breakpoints</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="includeLargeDesktop"> Large Desktop (1440px+)</label>
                        <label><input type="checkbox" id="includeWide"> Ultra Wide (1920px+)</label>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate CSS</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-section" id="previewSection">
                    <h3>Preview</h3>
                    <div id="preview" class="breakpoint-preview"></div>
                </div>

                <div class="result-box" id="result" style="display:none;">
                    <div class="result-label">Generated CSS Media Queries</div>
                    <pre id="output"></pre>
                </div>

                <div class="btn-group" id="copyGroup" style="display:none;">
                    <button id="copy" class="btn btn-secondary">📋 Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
