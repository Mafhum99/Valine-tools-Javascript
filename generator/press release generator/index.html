<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate professional press releases">
    <meta name="theme-color" content="#2563eb">
    <title>📰 Press Release Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📰</span>
        <h1>Press Release Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate professional press releases</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="announcement">Announcement / News</label>
                    <textarea id="announcement" class="form-textarea" placeholder="Describe the announcement..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="company">Company / Organization</label>
                    <input type="text" id="company" class="form-input" placeholder="e.g., Acme Corporation">
                </div>

                <div class="form-group">
                    <label class="form-label" for="date">Release Date</label>
                    <input type="date" id="date" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label" for="contact">Media Contact (optional)</label>
                    <input type="text" id="contact" class="form-input" placeholder="e.g., Jane Doe, jane@acme.com">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Press Release</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
