<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate definite and indefinite integrals">
    <meta name="theme-color" content="#2563eb">
    <title>∫ Integral Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">∫</span>
        <h1>Integral Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate definite and indefinite integrals</p>
            
            <div id="tool-content">
                <!-- Tool content goes here -->
                <div class="form-group">
                    <label class="form-label" for="fx">Function f(x)</label>
                    <input type="text" id="fx" class="form-input" placeholder="e.g. x^2 + 3*x + sin(x)" value="x^2">
                </div>

                <div class="form-group">
                    <label class="form-label" for="mode">Integration Mode</label>
                    <select id="mode" class="form-input">
                        <option value="definite">Definite (Numerical)</option>
                        <option value="indefinite">Indefinite (Symbolic)</option>
                    </select>
                </div>

                <div id="definite-section">
                    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">
                        <div style="flex:1;">
                            <label class="form-label" for="bound-a">Lower Bound (a)</label>
                            <input type="number" id="bound-a" class="form-input" placeholder="0" value="0">
                        </div>
                        <div style="flex:1;">
                            <label class="form-label" for="bound-b">Upper Bound (b)</label>
                            <input type="number" id="bound-b" class="form-input" placeholder="1" value="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="n-intervals">Intervals (n, must be even)</label>
                        <input type="number" id="n-intervals" class="form-input" placeholder="100" value="100">
                    </div>
                </div>
                
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate Integral</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                
                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">Enter f(x) and choose a mode</div>
                </div>
                
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
