<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert spoken words to text">
    <meta name="theme-color" content="#2563eb">
    <title>🎙️ Speech to Text - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎙️</span>
        <h1>Speech to Text</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert spoken words to text</p>

            <div id="tool-content">
                <div class="btn-group">
                    <button id="startBtn" class="btn btn-primary btn-block">🎙️ Start Listening</button>
                    <button id="stopBtn" class="btn btn-secondary" disabled>⏹ Stop</button>
                    <button id="clearBtn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="form-group">
                    <label class="form-label" for="language">Language</label>
                    <select id="language" class="form-input">
                        <option value="en-US">English (US)</option>
                        <option value="en-GB">English (UK)</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                        <option value="de-DE">German</option>
                        <option value="it-IT">Italian</option>
                        <option value="pt-BR">Portuguese</option>
                        <option value="ja-JP">Japanese</option>
                        <option value="ko-KR">Korean</option>
                        <option value="zh-CN">Chinese (Simplified)</option>
                        <option value="ar-SA">Arabic</option>
                        <option value="hi-IN">Hindi</option>
                        <option value="id-ID">Indonesian</option>
                    </select>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label" id="status">Ready - Click "Start Listening"</div>
                    <div id="output"></div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
