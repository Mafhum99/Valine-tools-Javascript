<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate strong random passwords">
    <meta name="theme-color" content="#2563eb">
    <title>🔑 Password Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔑</span>
        <h1>Password Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate strong random passwords</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="length">Password Length</label>
                    <input type="number" id="length" class="form-input" value="16" min="4" max="128">
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="numbers" checked> Numbers (0-9)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="symbols" checked> Symbols (!@#$%^&*)
                    </label>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">🔑 Generate Password</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Password</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Password</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
