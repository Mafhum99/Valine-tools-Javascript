<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Simplify and compare ratios">
    <meta name="theme-color" content="#2563eb">
    <title>Ratio Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#9878;</span>
        <h1>Ratio Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Simplify a ratio A:B or compare two ratios A:B and C:D.</p>

            <div class="form-group">
                <label class="form-label" for="ratio-a">A</label>
                <input type="number" step="any" id="ratio-a" class="form-input" placeholder="e.g. 6">
            </div>
            <div class="form-group">
                <label class="form-label" for="ratio-b">B</label>
                <input type="number" step="any" id="ratio-b" class="form-input" placeholder="e.g. 8">
            </div>
            <div class="form-group">
                <label class="form-label" for="ratio-c">C (optional, for comparison)</label>
                <input type="number" step="any" id="ratio-c" class="form-input" placeholder="e.g. 3">
            </div>
            <div class="form-group">
                <label class="form-label" for="ratio-d">D (optional, for comparison)</label>
                <input type="number" step="any" id="ratio-d" class="form-input" placeholder="e.g. 4">
            </div>

            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>

            <div class="result-box" id="result">
                <div class="result-label">Result</div>
                <div id="output">-</div>
            </div>

            <div class="btn-group">
                <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
