<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Minify JavaScript by removing comments and whitespace">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4F3; JS Minifier - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4F3;</span>
        <h1>JS Minifier</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Remove comments, extra whitespace, and console.log statements from JavaScript</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Paste JavaScript to minify</label>
                    <textarea id="input" class="form-textarea" rows="10" placeholder="// Example code\nfunction greet(name) {\n    console.log('Hello, ' + name);\n    return true;\n}"></textarea>
                </div>

                <div class="btn-group">
                    <button id="minifyBtn" class="btn btn-primary">&#x1F4E6; Minify</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Minified JavaScript</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
