<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random strings">
    <meta name="theme-color" content="#2563eb">
    <title>🔤 Random String Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔤</span>
        <h1>Random String Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random strings</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">String Length</label>
                    <input type="number" id="input" class="form-input" placeholder="Enter value..." value="16">
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="uppercase" checked> Uppercase (A-Z)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="lowercase" checked> Lowercase (a-z)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="numbers" checked> Numbers (0-9)
                    </label>
                    <label class="form-label">
                        <input type="checkbox" id="symbols"> Symbols (!@#$%)
                    </label>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">🔤 Generate String</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated String</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy String</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
