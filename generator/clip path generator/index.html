<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS clip-path shapes">
    <meta name="theme-color" content="#2563eb">
    <title>Clip Path Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Clip Path Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS clip-path shapes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="shape-type">Shape Type</label>
                    <select id="shape-type" class="form-select">
                        <option value="circle">Circle</option>
                        <option value="ellipse">Ellipse</option>
                        <option value="inset">Inset</option>
                        <option value="polygon">Polygon</option>
                    </select>
                </div>

                <!-- Circle Controls -->
                <div id="circle-controls" class="shape-controls">
                    <div class="form-group">
                        <label class="form-label" for="circle-radius">Radius (%)</label>
                        <div class="range-with-value">
                            <input type="range" id="circle-radius" min="0" max="100" step="1" value="50" class="form-range">
                            <span id="circle-radius-value" class="range-value">50%</span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="circle-x">Center X (%)</label>
                            <input type="number" id="circle-x" value="50" min="0" max="100" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="circle-y">Center Y (%)</label>
                            <input type="number" id="circle-y" value="50" min="0" max="100" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Ellipse Controls -->
                <div id="ellipse-controls" class="shape-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="ellipse-rx">Radius X (%)</label>
                            <input type="number" id="ellipse-rx" value="50" min="0" max="100" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="ellipse-ry">Radius Y (%)</label>
                            <input type="number" id="ellipse-ry" value="50" min="0" max="100" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="ellipse-x">Center X (%)</label>
                            <input type="number" id="ellipse-x" value="50" min="0" max="100" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="ellipse-y">Center Y (%)</label>
                            <input type="number" id="ellipse-y" value="50" min="0" max="100" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Inset Controls -->
                <div id="inset-controls" class="shape-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="inset-top">Top (%)</label>
                            <input type="number" id="inset-top" value="10" min="0" max="50" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="inset-right">Right (%)</label>
                            <input type="number" id="inset-right" value="10" min="0" max="50" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="inset-bottom">Bottom (%)</label>
                            <input type="number" id="inset-bottom" value="10" min="0" max="50" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="inset-left">Left (%)</label>
                            <input type="number" id="inset-left" value="10" min="0" max="50" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="inset-radius">Border Radius (%)</label>
                        <input type="number" id="inset-radius" value="0" min="0" max="50" class="form-input">
                    </div>
                </div>

                <!-- Polygon Controls -->
                <div id="polygon-controls" class="shape-controls" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="polygon-sides">Number of Sides</label>
                        <select id="polygon-sides" class="form-select">
                            <option value="3">Triangle (3)</option>
                            <option value="4">Diamond (4)</option>
                            <option value="5" selected>Pentagon (5)</option>
                            <option value="6">Hexagon (6)</option>
                            <option value="7">Heptagon (7)</option>
                            <option value="8">Octagon (8)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="polygon-rotation">Rotation (degrees)</label>
                        <div class="range-with-value">
                            <input type="range" id="polygon-rotation" min="0" max="360" step="1" value="0" class="form-range">
                            <span id="polygon-rotation-value" class="range-value">0deg</span>
                        </div>
                    </div>
                </div>

                <div class="preview-box" id="preview-container">
                    <div class="preview-element" id="preview"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
