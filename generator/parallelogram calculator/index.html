<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate area, perimeter, and diagonals of a parallelogram">
    <meta name="theme-color" content="#2563eb">
    <title>Parallelogram Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .para-result .result-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; }
        .para-result .result-card .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .para-result .result-card .value { font-size: 1.25rem; font-weight: 700; color: #2563eb; margin-top: 0.25rem; }
        .para-result .result-card .detail { font-size: 0.8rem; color: #6b7280; font-family: monospace; margin-top: 0.5rem; }
        .para-result .result-card.primary { border-left: 4px solid #2563eb; background: #eff6ff; }
        .formula-display { background: #f3f4f6; border-radius: 0.5rem; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 0.875rem; line-height: 1.8; color: #374151; }
        .copy-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .btn-copy { padding: 0.5rem 1rem; background: #e5e7eb; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        .btn-copy:hover { background: #d1d5db; }
        .para-mode-group { margin-top: 0.75rem; }
        #para-result { margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">▱</span>
        <h1>Parallelogram Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate area, perimeter, and diagonals of a parallelogram</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="para-mode">Calculate</label>
                    <select id="para-mode" class="form-select">
                        <option value="area-h">Area (using base &amp; height)</option>
                        <option value="perimeter">Perimeter</option>
                        <option value="diagonals">Area, Perimeter &amp; Diagonals</option>
                    </select>
                </div>
                <!-- Side a (all modes) -->
                <div class="form-group">
                    <label class="form-label" for="para-a">Side a</label>
                    <input type="number" id="para-a" class="form-input" placeholder="e.g. 5" min="0.001" step="any">
                </div>
                <!-- Area mode: height -->
                <div class="para-mode-group" data-mode="area-h">
                    <div class="form-group">
                        <label class="form-label" for="para-h">Height h</label>
                        <input type="number" id="para-h" class="form-input" placeholder="e.g. 3" min="0.001" step="any">
                    </div>
                </div>
                <!-- Perimeter mode: side b -->
                <div class="para-mode-group" data-mode="perimeter" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="para-b-perim">Side b</label>
                        <input type="number" id="para-b-perim" class="form-input" placeholder="e.g. 4" min="0.001" step="any">
                    </div>
                </div>
                <!-- Diagonals mode: side b and angle -->
                <div class="para-mode-group" data-mode="diagonals" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="para-b-diag">Side b</label>
                        <input type="number" id="para-b-diag" class="form-input" placeholder="e.g. 4" min="0.001" step="any">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="para-theta">Angle θ (degrees)</label>
                        <input type="number" id="para-theta" class="form-input" placeholder="e.g. 60" min="0.001" max="179.999" step="any">
                    </div>
                </div>
                <div class="btn-group">
                    <button id="para-calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="para-clear" class="btn btn-secondary">Clear</button>
                </div>
                <div id="para-result"></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
