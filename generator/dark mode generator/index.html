<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate dark mode CSS from your current colors">
    <meta name="theme-color" content="#2563eb">
    <title>Dark Mode Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Dark Mode Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate dark mode CSS from your current colors</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="dm-bg">Background Color</label>
                    <input type="color" id="dm-bg" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="dm-bg-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dm-text">Text Color</label>
                    <input type="color" id="dm-text" value="#1f2937" class="color-picker-inline">
                    <input type="text" id="dm-text-text" value="#1f2937" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dm-surface">Surface/Card Color</label>
                    <input type="color" id="dm-surface" value="#f3f4f6" class="color-picker-inline">
                    <input type="text" id="dm-surface-text" value="#f3f4f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="dm-strategy">Inversion Strategy</label>
                    <select id="dm-strategy" class="form-select">
                        <option value="invert">Smart Invert</option>
                        <option value="dark">Use Dark Presets</option>
                        <option value="custom">Custom Colors</option>
                    </select>
                </div>
                <div class="preview-box" id="dm-preview" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray-300);"></div>
                <div class="result-box" id="dm-output">
                    <div class="result-label">Dark Mode CSS</div>
                    <code id="dm-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
