<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate tiered pricing structures">
    <meta name="theme-color" content="#2563eb">
    <title>Tier Pricing Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧮</span>
        <h1>Tier Pricing Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate tiered pricing structures</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="base_price">Base Price ($)</label>
                    <input type="number" id="base_price" class="form-input" placeholder="e.g. 100" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier1_qty">Tier 1 Quantity</label>
                    <input type="number" id="tier1_qty" class="form-input" placeholder="e.g. 10" step="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier1_discount">Tier 1 Discount (%)</label>
                    <input type="number" id="tier1_discount" class="form-input" placeholder="e.g. 5" step="0.01" min="0" max="100">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier2_qty">Tier 2 Quantity</label>
                    <input type="number" id="tier2_qty" class="form-input" placeholder="e.g. 50" step="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier2_discount">Tier 2 Discount (%)</label>
                    <input type="number" id="tier2_discount" class="form-input" placeholder="e.g. 10" step="0.01" min="0" max="100">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier3_qty">Tier 3 Quantity</label>
                    <input type="number" id="tier3_qty" class="form-input" placeholder="e.g. 100" step="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tier3_discount">Tier 3 Discount (%)</label>
                    <input type="number" id="tier3_discount" class="form-input" placeholder="e.g. 20" step="0.01" min="0" max="100">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
