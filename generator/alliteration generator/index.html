<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate alliterations (words starting with same letter)">
    <meta name="theme-color" content="#2563eb">
    <title>&#9989; Alliteration Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#9989;</span>
        <h1>Alliteration Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate alliterations (words starting with same letter)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Enter a starting letter</label>
                    <input type="text" id="input" class="form-input" placeholder="e.g., S" maxlength="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="type">Alliteration Type</label>
                    <select id="type" class="form-select">
                        <option value="phrases">Alliterative Phrases</option>
                        <option value="words">Words Starting With Letter</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="count">Number of Results</label>
                    <input type="number" id="count" class="form-input" value="10" min="1" max="50" style="width:100px;">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Alliterations</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Alliterative Results (<span id="resultCount">0</span>)</div>
                    <div id="output" style="white-space: pre-wrap; line-height:2;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
