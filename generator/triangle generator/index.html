<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS triangle shapes">
    <meta name="theme-color" content="#2563eb">
    <title>Triangle Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f53a;</span>
        <h1>Triangle Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS triangle shapes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="triType">Triangle Type</label>
                    <select id="triType" class="form-input">
                        <option value="equilateral">Equilateral</option>
                        <option value="right">Right Angle</option>
                        <option value="isosceles">Isosceles</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="triDirection">Direction</label>
                    <select id="triDirection" class="form-input">
                        <option value="up">Up</option>
                        <option value="down">Down</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="triSize">Size (px)</label>
                    <input type="range" id="triSize" class="form-range" min="10" max="200" value="50">
                    <span id="triSizeValue" class="range-value">50</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="triColor">Color</label>
                    <input type="color" id="triColor" class="form-color" value="#2563eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="triBorderStyle">Border Style</label>
                    <select id="triBorderStyle" class="form-input">
                        <option value="solid">Solid</option>
                        <option value="outlined">Outlined</option>
                    </select>
                </div>

                <div class="form-group" id="borderColorGroup">
                    <label class="form-label" for="triBorderColor">Border Color</label>
                    <input type="color" id="triBorderColor" class="form-color" value="#1e40af">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Triangle</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="triPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy CSS</button>
                    <button id="copyHTML" class="btn btn-secondary">&#x1f4cb; Copy HTML</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
