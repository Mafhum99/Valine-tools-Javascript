<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS toggle switches">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F500; CSS Toggle Switch Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F500;</span>
        <h1>CSS Toggle Switch Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS toggle switch components</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="onColor">On Color</label>
                    <input type="color" id="onColor" class="form-input form-input-color" value="#2563eb">
                    <input type="text" id="onColorText" class="form-input" value="#2563eb" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="size">Size</label>
                    <select id="size" class="form-select">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <label class="toggle-switch" id="preview">
                            <input type="checkbox" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
