<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate styled CSS buttons">
    <meta name="theme-color" content="#2563eb">
    <title>Button Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f518;</span>
        <h1>Button Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate styled CSS buttons</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="btnText">Button Text</label>
                    <input type="text" id="btnText" class="form-input" placeholder="Click Me" maxlength="30" value="Click Me">
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnBgColor">Background Color</label>
                    <input type="color" id="btnBgColor" class="form-color" value="#2563eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnTextColor">Text Color</label>
                    <input type="color" id="btnTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnFontSize">Font Size (px)</label>
                    <input type="range" id="btnFontSize" class="form-range" min="12" max="28" value="16">
                    <span id="btnFontSizeValue" class="range-value">16</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnPadding">Padding (px)</label>
                    <input type="range" id="btnPadding" class="form-range" min="6" max="24" value="12">
                    <span id="btnPaddingValue" class="range-value">12</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnBorderRadius">Border Radius (px)</label>
                    <input type="range" id="btnBorderRadius" class="form-range" min="0" max="50" value="8">
                    <span id="btnBorderRadiusValue" class="range-value">8</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnBorderStyle">Border Style</label>
                    <select id="btnBorderStyle" class="form-input">
                        <option value="none">No Border</option>
                        <option value="solid">Solid Border</option>
                        <option value="outline">Outline Style</option>
                    </select>
                </div>

                <div class="form-group" id="btnBorderColorGroup">
                    <label class="form-label" for="btnBorderColor">Border Color</label>
                    <input type="color" id="btnBorderColor" class="form-color" value="#1e40af">
                </div>

                <div class="form-group">
                    <label class="form-label" for="btnStyle">Button Style</label>
                    <select id="btnStyle" class="form-input">
                        <option value="flat">Flat</option>
                        <option value="gradient">Gradient</option>
                        <option value="shadow">With Shadow</option>
                        <option value="3d">3D Effect</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Button</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="btnPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
