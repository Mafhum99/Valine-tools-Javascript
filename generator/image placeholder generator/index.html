<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate placeholder image backgrounds with CSS">
    <meta name="theme-color" content="#2563eb">
    <title>Image Placeholder Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Image Placeholder Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate placeholder image backgrounds with CSS</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="ph-style">Placeholder Style</label>
                    <select id="ph-style" class="form-select">
                        <option value="solid">Solid Color</option>
                        <option value="gradient">Gradient</option>
                        <option value="noise">Noise/Static</option>
                        <option value="mountain">Mountain Silhouette</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ph-color1">Primary Color</label>
                    <input type="color" id="ph-color1" value="#cbd5e1" class="color-picker-inline">
                    <input type="text" id="ph-color1-text" value="#cbd5e1" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ph-color2">Secondary Color</label>
                    <input type="color" id="ph-color2" value="#94a3b8" class="color-picker-inline">
                    <input type="text" id="ph-color2-text" value="#94a3b8" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ph-width">Width (px)</label>
                    <input type="number" id="ph-width" value="400" min="50" max="1920" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ph-height">Height (px)</label>
                    <input type="number" id="ph-height" value="300" min="50" max="1080" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ph-text">Label Text (optional)</label>
                    <input type="text" id="ph-text" value="400x300" class="form-input" placeholder="e.g., 400x300">
                </div>

                <div class="preview-box" id="ph-preview" style="width:100%;height:200px;border-radius:var(--radius);border:1px solid var(--gray-300);display:flex;align-items:center;justify-content:center;overflow:hidden;"></div>

                <div class="result-box" id="ph-output">
                    <div class="result-label">HTML/CSS Code</div>
                    <code id="ph-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy Code</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
