<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS tooltips with arrows">
    <meta name="theme-color" content="#2563eb">
    <title>&#x27A4; CSS Tooltip Arrow Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x27A4;</span>
        <h1>CSS Tooltip Arrow Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS tooltips with arrow pointers</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="tooltipColor">Tooltip Color</label>
                    <input type="color" id="tooltipColor" class="form-input form-input-color" value="#1f2937">
                    <input type="text" id="tooltipColorText" class="form-input" value="#1f2937" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="arrowSize">Arrow Size (px)</label>
                    <input type="range" id="arrowSize" class="form-range" min="5" max="20" value="10">
                    <span id="arrowSizeVal" class="range-value">10px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="position">Position</label>
                    <select id="position" class="form-select">
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview (hover the box)</div>
                    <div class="preview-container">
                        <div class="tooltip-wrapper-gen" id="tooltipWrapper">
                            <div class="tooltip-target-gen">Hover Me</div>
                            <div class="tooltip-text-gen" id="tooltipText">Tooltip with arrow</div>
                        </div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
