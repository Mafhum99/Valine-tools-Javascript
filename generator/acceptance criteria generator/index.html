<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate acceptance criteria for stories">
    <meta name="theme-color" content="#2563eb">
    <title>Acceptance Criteria Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">✅</span>
        <h1>Acceptance Criteria Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate acceptance criteria for stories</p>

            <div id="tool-content">
                <!-- ====== TOOL CONTENT START ====== -->
                <div class="form-group">
                    <label class="form-label" for="input">User Story or Feature Name</label>
                    <input type="text" id="input" class="form-input" placeholder="e.g., User Login Page">
                </div>

                <div class="btn-group">
                    <button id="action-btn" class="btn btn-primary btn-block">Generate Criteria</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy Result</button>
                </div>
                <!-- ====== TOOL CONTENT END ====== -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
