<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Optimize package dimensions for shipping">
    <meta name="theme-color" content="#2563eb">
    <title>Package Dimension Optimizer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F9EE;</span>
        <h1>Package Dimension Optimizer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Optimize package dimensions for shipping</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="length_cm">Length (cm)</label>
                    <input type="number" id="length_cm" class="form-input" placeholder="e.g. 40">
                </div>
                <div class="form-group">
                    <label class="form-label" for="width_cm">Width (cm)</label>
                    <input type="number" id="width_cm" class="form-input" placeholder="e.g. 30">
                </div>
                <div class="form-group">
                    <label class="form-label" for="height_cm">Height (cm)</label>
                    <input type="number" id="height_cm" class="form-input" placeholder="e.g. 20">
                </div>
                <div class="form-group">
                    <label class="form-label" for="actual_weight_kg">Actual Weight (kg)</label>
                    <input type="number" id="actual_weight_kg" class="form-input" placeholder="e.g. 2.5">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
