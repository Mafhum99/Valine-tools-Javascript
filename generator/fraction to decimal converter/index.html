<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x2797; Fraction to Decimal Converter - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x2797;</span>
        <h1>Fraction to Decimal Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert fractions to decimal numbers</p>
            <div id="tool-content">
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <div class="form-group" style="flex:1;"><label class="form-label" for="numerator">Numerator</label><input type="number" id="numerator" class="form-input" placeholder="3" step="any"></div>
                    <div style="padding-top:1.5rem;font-size:1.5rem;">/</div>
                    <div class="form-group" style="flex:1;"><label class="form-label" for="denominator">Denominator</label><input type="number" id="denominator" class="form-input" placeholder="4" step="any"></div>
                </div>
                <div class="btn-group"><button id="convertBtn" class="btn btn-primary">&#x1F504; Convert</button><button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Decimal Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
