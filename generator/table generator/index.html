<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate HTML tables">
    <meta name="theme-color" content="#2563eb">
    <title>Table Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f4ca;</span>
        <h1>Table Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate HTML tables</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="tableColumns">Columns (comma-separated)</label>
                    <input type="text" id="tableColumns" class="form-input" placeholder="Name, Email, Role" value="Name, Email, Role">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableRows">Number of Rows</label>
                    <input type="range" id="tableRows" class="form-range" min="1" max="20" value="5">
                    <span id="tableRowsValue" class="range-value">5</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableHeaderBg">Header Background</label>
                    <input type="color" id="tableHeaderBg" class="form-color" value="#2563eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableHeaderTextColor">Header Text Color</label>
                    <input type="color" id="tableHeaderTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableRowBg">Row Background Color</label>
                    <input type="color" id="tableRowBg" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableAltRowBg">Alternate Row Color</label>
                    <input type="color" id="tableAltRowBg" class="form-color" value="#f3f4f6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableBorderColor">Border Color</label>
                    <input type="color" id="tableBorderColor" class="form-color" value="#e5e7eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tableStyle">Table Style</label>
                    <select id="tableStyle" class="form-input">
                        <option value="striped">Striped</option>
                        <option value="solid">Solid Rows</option>
                        <option value="minimal">Minimal</option>
                        <option value="bordered">Fully Bordered</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Table</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="tablePreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">HTML/CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
