<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random colors">
    <meta name="theme-color" content="#2563eb">
    <title>Random Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎲</span>
        <h1>Random Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random colors with display and copy</p>

            <div id="tool-content">
                <div id="color-preview" style="width: 100%; height: 120px; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e5e7eb; background-color: #3b82f6;"></div>

                <button id="generate" class="btn btn-primary btn-block">🎲 Generate Random Color</button>

                <div class="color-values">
                    <div class="color-value-item">
                        <span class="color-value-label">HEX</span>
                        <span class="color-value" id="hex-value">#3B82F6</span>
                        <button class="copy-btn" data-target="hex-value">📋</button>
                    </div>
                    <div class="color-value-item">
                        <span class="color-value-label">RGB</span>
                        <span class="color-value" id="rgb-value">rgb(59, 130, 246)</span>
                        <button class="copy-btn" data-target="rgb-value">📋</button>
                    </div>
                    <div class="color-value-item">
                        <span class="color-value-label">HSL</span>
                        <span class="color-value" id="hsl-value">hsl(217, 91%, 60%)</span>
                        <button class="copy-btn" data-target="hsl-value">📋</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
