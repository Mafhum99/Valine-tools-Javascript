<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random colors with hex and RGB values">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F3A8; Random Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F3A8;</span>
        <h1>Random Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random colors with hex and RGB values</p>

            <div id="tool-content">
                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Random Color</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">
                        <div id="color-preview" style="width:100%;height:100px;border-radius:8px;margin-bottom:1rem;background-color:#cccccc;"></div>
                        <div class="color-values">
                            <div class="color-value-row">
                                <span class="color-label">HEX:</span>
                                <span id="hex-value">#CCCCCC</span>
                                <button id="copy-hex" class="btn-copy-small">Copy</button>
                            </div>
                            <div class="color-value-row">
                                <span class="color-label">RGB:</span>
                                <span id="rgb-value">rgb(204, 204, 204)</span>
                                <button id="copy-rgb" class="btn-copy-small">Copy</button>
                            </div>
                            <div class="color-value-row">
                                <span class="color-label">HSL:</span>
                                <span id="hsl-value">hsl(0, 0%, 80%)</span>
                                <button id="copy-hsl" class="btn-copy-small">Copy</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .color-values { text-align: left; }
        .color-value-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
            font-family: monospace;
            font-size: 0.95rem;
        }
        .color-label {
            font-weight: 600;
            min-width: 40px;
            color: #6b7280;
        }
        .btn-copy-small {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            cursor: pointer;
            margin-left: auto;
        }
        .btn-copy-small:hover {
            background: #e5e7eb;
        }
    </style>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
