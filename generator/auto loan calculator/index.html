<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate auto loan payments">
    <meta name="theme-color" content="#2563eb">
    <title>🚗 Auto Loan Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🚗</span>
        <h1>Auto Loan Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate auto loan payments</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Car Price ($)</label>
                    <input type="number" id="input" class="form-input" placeholder="Enter value..." value="25000">
                </div>

                <div class="form-group">
                    <label class="form-label" for="downPayment">Down Payment ($)</label>
                    <input type="number" id="downPayment" class="form-input" value="5000">
                </div>
                <div class="form-group">
                    <label class="form-label" for="rate">Interest Rate (%)</label>
                    <input type="number" id="rate" class="form-input" value="5.5" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label class="form-label" for="term">Loan Term (months)</label>
                    <input type="number" id="term" class="form-input" value="60" min="1">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">🚗 Calculate Loan</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Auto Loan Payment</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
