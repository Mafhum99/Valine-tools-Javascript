<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate to-do lists">
    <meta name="theme-color" content="#2563eb">
    <title>To-Do List Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">✅</span>
        <h1>To-Do List Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate organized to-do lists</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="list-title">List Title</label>
                    <input type="text" id="list-title" class="form-input" placeholder="e.g., Daily Tasks">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tasks-input">Tasks (one per line)</label>
                    <textarea id="tasks-input" class="form-input form-textarea" rows="6" placeholder="Review emails&#10;Update project plan&#10;Team meeting at 2pm&#10;Prepare presentation"></textarea>
                </div>

                <div class="btn-group">
                    <button id="generate-btn" class="btn btn-primary btn-block">Generate To-Do List</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">To-Do List</div>
                    <div id="output" class="text-left">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy List</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
