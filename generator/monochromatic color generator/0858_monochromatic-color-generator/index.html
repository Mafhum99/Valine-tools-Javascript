<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate monochromatic color variations">
    <meta name="theme-color" content="#2563eb">
    <title>Monochromatic Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎨</span>
        <h1>Monochromatic Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate monochromatic shades by varying lightness</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color-input">Pick a Color</label>
                    <input type="color" id="color-input" class="form-input" value="#3b82f6" style="width: 100%; height: 60px; padding: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hex-input">Or enter HEX value</label>
                    <input type="text" id="hex-input" class="form-input" placeholder="#3b82f6" value="#3b82f6" maxlength="7">
                </div>

                <div class="color-shades-container" id="shades-container"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
