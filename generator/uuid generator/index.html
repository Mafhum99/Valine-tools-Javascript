<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate UUIDs (Universally Unique Identifiers)">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F194; UUID Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F194;</span>
        <h1>UUID Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate Universally Unique Identifiers</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="version">UUID Version</label>
                    <select id="version" class="form-input">
                        <option value="v4" selected>UUID v4 (Random)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="count">Count (1-20)</label>
                    <input type="number" id="count" class="form-input" value="1" min="1" max="20">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate UUID(s)</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
