<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate simple interest amount">
    <meta name="theme-color" content="#2563eb">
    <title>Simple Interest Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💰</span>
        <h1>Simple Interest Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate simple interest amount</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="principal">Principal Amount ($)</label>
                    <input type="number" id="principal" class="form-input" placeholder="e.g. 10000">
                </div>
                <div class="form-group">
                    <label class="form-label" for="rate_percent">Annual Interest Rate (%)</label>
                    <input type="number" id="rate_percent" class="form-input" placeholder="e.g. 5">
                </div>
                <div class="form-group">
                    <label class="form-label" for="time_years">Time (Years)</label>
                    <input type="number" id="time_years" class="form-input" placeholder="e.g. 3">
                </div>
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
