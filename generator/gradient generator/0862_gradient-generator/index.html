<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS gradients">
    <meta name="theme-color" content="#2563eb">
    <title>Gradient Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Gradient Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS gradients</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="angle">Angle (degrees)</label>
                    <div class="range-with-value">
                        <input type="range" id="angle" min="0" max="360" value="135" class="form-range">
                        <span id="angle-value" class="range-value">135deg</span>
                    </div>
                </div>

                <div id="color-stops">
                    <div class="form-group">
                        <label class="form-label">Color Stops (2-4)</label>
                        <div class="color-stop-row" data-index="0">
                            <input type="color" value="#6366f1" class="color-picker stop-color">
                            <input type="text" value="#6366f1" class="form-input color-text stop-color-text" maxlength="7" placeholder="#hex">
                            <span class="stop-position-label">0%</span>
                        </div>
                        <div class="color-stop-row" data-index="1">
                            <input type="color" value="#ec4899" class="color-picker stop-color">
                            <input type="text" value="#ec4899" class="form-input color-text stop-color-text" maxlength="7" placeholder="#hex">
                            <span class="stop-position-label">100%</span>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="add-stop" class="btn btn-secondary">+ Add Color Stop</button>
                    <button id="remove-stop" class="btn btn-secondary">- Remove Last</button>
                </div>

                <div class="preview-box" id="gradient-preview"></div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
