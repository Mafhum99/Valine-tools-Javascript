<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate and convert ACT scores">
    <meta name="theme-color" content="#2563eb">
    <title>🎓 ACT Score Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎓</span>
        <h1>ACT Score Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate and convert ACT scores</p>

            <div id="tool-content">
                <!-- ====== TOOL CONTENT START ====== -->
                <div class="form-group">
                    <label class="form-label" for="english">English (1-36)</label>
                    <input type="number" id="english" class="form-input" placeholder="English score (1-36)" min="1" max="36">
                </div>

                <div class="form-group">
                    <label class="form-label" for="math">Math (1-36)</label>
                    <input type="number" id="math" class="form-input" placeholder="Math score (1-36)" min="1" max="36">
                </div>

                <div class="form-group">
                    <label class="form-label" for="reading">Reading (1-36)</label>
                    <input type="number" id="reading" class="form-input" placeholder="Reading score (1-36)" min="1" max="36">
                </div>

                <div class="form-group">
                    <label class="form-label" for="science">Science (1-36)</label>
                    <input type="number" id="science" class="form-input" placeholder="Science score (1-36)" min="1" max="36">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Composite Score</div>
                    <div id="output">-</div>
                </div>

                <div class="result-box" id="breakdown" style="display:none;">
                    <div class="result-label">Section Breakdown</div>
                    <div id="section-scores"></div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
                <!-- ====== TOOL CONTENT END ====== -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
