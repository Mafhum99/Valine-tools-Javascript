<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate unique SKU codes for products">
    <meta name="theme-color" content="#2563eb">
    <title>SKU Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127991;&#65039;</span>
        <h1>SKU Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate unique SKU codes for products</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="product_name">Product Name</label>
                    <input type="text" id="product_name" class="form-input" placeholder="e.g. Wireless Mouse">
                </div>

                <div class="form-group">
                    <label class="form-label" for="variant">Variant <span style="color: #94a3b8;">(optional)</span></label>
                    <input type="text" id="variant" class="form-input" placeholder="e.g. RED, L">
                </div>

                <div class="form-group">
                    <label class="form-label" for="category_code">Category Code</label>
                    <input type="text" id="category_code" class="form-input" placeholder="e.g. ELC">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Generate SKU</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
