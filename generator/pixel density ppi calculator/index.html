<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate pixel density (PPI) of a screen">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4F1; Pixel Density (PPI) Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4F1;</span>
        <h1>Pixel Density (PPI) Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate pixels per inch for any screen</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="width">Screen Width (pixels)</label>
                    <input type="number" id="width" class="form-input" placeholder="1920" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="height">Screen Height (pixels)</label>
                    <input type="number" id="height" class="form-input" placeholder="1080" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="diagonal">Diagonal Size (inches)</label>
                    <input type="number" id="diagonal" class="form-input" placeholder="24" min="0.1" step="0.1">
                </div>

                <div class="btn-group">
                    <button id="calculateBtn" class="btn btn-primary">&#x1F522; Calculate PPI</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Pixel Density</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
