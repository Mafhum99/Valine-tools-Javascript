<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate avatar placeholders with initials">
    <meta name="theme-color" content="#2563eb">
    <title>Avatar Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Avatar Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate avatar placeholders with initials</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="av-name">Name / Initials</label>
                    <input type="text" id="av-name" value="JD" class="form-input" placeholder="John Doe" maxlength="20">
                </div>

                <div class="form-group">
                    <label class="form-label" for="av-color">Background Color</label>
                    <input type="color" id="av-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="av-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="av-textcolor">Text Color</label>
                    <input type="color" id="av-textcolor" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="av-textcolor-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="av-size">Size (px)</label>
                    <input type="range" id="av-size" min="32" max="200" value="80" class="form-range">
                    <span id="av-size-value" class="range-value">80px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="av-fontsize">Font Size (px)</label>
                    <input type="range" id="av-fontsize" min="12" max="80" value="32" class="form-range">
                    <span id="av-fontsize-value" class="range-value">32px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="av-shape">Shape</label>
                    <select id="av-shape" class="form-select">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                        <option value="rounded">Rounded Square</option>
                    </select>
                </div>

                <div class="preview-box" id="av-preview" style="display:flex;align-items:center;justify-content:center;padding:20px;"></div>

                <div class="result-box" id="av-output">
                    <div class="result-label">HTML Code</div>
                    <code id="av-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                    <button id="random" class="btn btn-secondary">Random Color</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
