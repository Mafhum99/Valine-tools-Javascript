<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Take and save notes">
    <meta name="theme-color" content="#2563eb">
    <title>Note Taker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📝</span>
        <h1>Note Taker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Take and save notes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="note-title">Title</label>
                    <input type="text" id="note-title" class="form-input" placeholder="Note title...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="note-content">Note</label>
                    <textarea id="note-content" class="form-input form-textarea" rows="6" placeholder="Write your note here..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="save-note" class="btn btn-primary btn-block">Save Note</button>
                </div>

                <div id="notes-list" class="mt-3">
                    <h3 class="text-lg font-semibold mb-2">Saved Notes</h3>
                    <div id="notes-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
