<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate glassmorphism CSS styles">
    <meta name="theme-color" content="#2563eb">
    <title>Glassmorphism Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Glassmorphism Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate glassmorphism CSS styles</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="blur-amount">Backdrop Blur (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="blur-amount" min="0" max="40" step="1" value="16" class="form-range">
                        <span id="blur-value" class="range-value">16px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bg-color">Background Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="bg-color" value="#ffffff" class="color-picker">
                        <input type="text" id="bg-color-text" value="#ffffff" class="form-input color-text" maxlength="7">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bg-opacity">Background Opacity</label>
                    <div class="range-with-value">
                        <input type="range" id="bg-opacity" min="0" max="100" step="1" value="30" class="form-range">
                        <span id="bg-opacity-value" class="range-value">30%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-width">Border Width (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="border-width" min="0" max="4" step="0.5" value="1" class="form-range">
                        <span id="border-width-value" class="range-value">1px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-color">Border Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="border-color" value="#ffffff" class="color-picker">
                        <input type="text" id="border-color-text" value="#ffffff" class="form-input color-text" maxlength="7">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-opacity">Border Opacity</label>
                    <div class="range-with-value">
                        <input type="range" id="border-opacity" min="0" max="100" step="1" value="50" class="form-range">
                        <span id="border-opacity-value" class="range-value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-radius">Border Radius (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="border-radius" min="0" max="50" step="1" value="20" class="form-range">
                        <span id="border-radius-value" class="range-value">20px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shadow-blur">Shadow Blur (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="shadow-blur" min="0" max="50" step="1" value="15" class="form-range">
                        <span id="shadow-blur-value" class="range-value">15px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shadow-opacity">Shadow Opacity</label>
                    <div class="range-with-value">
                        <input type="range" id="shadow-opacity" min="0" max="100" step="1" value="20" class="form-range">
                        <span id="shadow-opacity-value" class="range-value">20%</span>
                    </div>
                </div>

                <div class="preview-box" id="preview-container">
                    <div class="preview-background">
                        <div class="bg-shapes">
                            <div class="shape shape-1"></div>
                            <div class="shape shape-2"></div>
                            <div class="shape shape-3"></div>
                        </div>
                    </div>
                    <div class="preview-element" id="preview">
                        <span class="preview-text">Glass Card</span>
                    </div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
