<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Find the closest CSS color name for a given color">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F50E; Color Name Finder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F50E;</span>
        <h1>Color Name Finder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Find the closest CSS color name for a given color</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="colorInput">Enter HEX or RGB</label>
                    <input type="text" id="colorInput" class="form-input" value="#3B82F6" placeholder="#3B82F6 or rgb(59, 130, 246)">
                </div>

                <div class="btn-group">
                    <button id="find" class="btn btn-primary btn-block">Find Name</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">
                        <div id="color-preview" style="width:100%;height:60px;border-radius:8px;margin-bottom:1rem;background-color:#3b82f6;"></div>
                        <div id="result-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
