<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate catchy LinkedIn headlines">
    <meta name="theme-color" content="#2563eb">
    <title>💼 LinkedIn Headline Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💼</span>
        <h1>LinkedIn Headline Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate catchy LinkedIn headlines</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="job-title">Job Title</label>
                    <input type="text" id="job-title" class="form-input" placeholder="e.g., Software Engineer, Data Analyst...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="industry">Industry / Field</label>
                    <input type="text" id="industry" class="form-input" placeholder="e.g., Technology, Finance, Healthcare...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="headline-style">Headline Style</label>
                    <select id="headline-style" class="form-select">
                        <option value="professional">Professional</option>
                        <option value="creative">Creative</option>
                        <option value="results">Results-Driven</option>
                        <option value="helping">Helping / Value-Based</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Headlines</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
