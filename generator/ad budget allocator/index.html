<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Allocate ad budget across channels">
    <meta name="theme-color" content="#2563eb">
    <title>Ad Budget Allocator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💰</span>
        <h1>Ad Budget Allocator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Allocate ad budget across channels</p>

            <div id="tool-content">
                <!-- ====== TOOL CONTENT START ====== -->
                <div class="form-group">
                    <label class="form-label" for="total_budget">Total Budget ($)</label>
                    <input type="number" id="total_budget" class="form-input" placeholder="e.g. 10000">
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel1_pct">Channel 1 Percentage (%)</label>
                    <input type="number" id="channel1_pct" class="form-input" placeholder="e.g. 40">
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel2_pct">Channel 2 Percentage (%)</label>
                    <input type="number" id="channel2_pct" class="form-input" placeholder="e.g. 35">
                </div>
                <div class="form-group">
                    <label class="form-label" for="channel3_pct">Channel 3 Percentage (%)</label>
                    <input type="number" id="channel3_pct" class="form-input" placeholder="e.g. 25">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
                <!-- ====== TOOL CONTENT END ====== -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
