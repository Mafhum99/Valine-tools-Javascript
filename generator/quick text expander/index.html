<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Expand shortcuts into full text">
    <meta name="theme-color" content="#2563eb">
    <title>Quick Text Expander - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">↗️</span>
        <h1>Quick Text Expander</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Expand shortcuts into full text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="shortcut-input">Type a shortcut or full text</label>
                    <input type="text" id="shortcut-input" class="form-input" placeholder="e.g., btw, asap, idk...">
                </div>

                <div class="btn-group">
                    <button id="expand-btn" class="btn btn-primary btn-block">Expand</button>
                    <button id="clear-expander" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Expanded Text</div>
                    <div id="output" class="text-lg">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>

                <div class="mt-3">
                    <h3 class="text-lg font-semibold mb-2">Available Shortcuts</h3>
                    <div id="shortcuts-reference" class="text-sm"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
