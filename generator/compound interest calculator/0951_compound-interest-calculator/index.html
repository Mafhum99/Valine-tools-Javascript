<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate compound interest">
    <meta name="theme-color" content="#2563eb">
    <title>📈 Compound Interest Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📈</span>
        <h1>Compound Interest Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate compound interest</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Principal Amount ($)</label>
                    <input type="number" id="input" class="form-input" placeholder="Enter value..." value="10000">
                </div>

                <div class="form-group">
                    <label class="form-label" for="rate">Annual Interest Rate (%)</label>
                    <input type="number" id="rate" class="form-input" value="7" min="0" step="0.1">
                </div>
                <div class="form-group">
                    <label class="form-label" for="time">Time Period (years)</label>
                    <input type="number" id="time" class="form-input" value="10" min="1">
                </div>
                <div class="form-group">
                    <label class="form-label" for="compounds">Compounds Per Year</label>
                    <select id="compounds" class="form-input">
                        <option value="1">Annually (1x)</option>
                        <option value="4">Quarterly (4x)</option>
                        <option value="12" selected>Monthly (12x)</option>
                        <option value="365">Daily (365x)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">📈 Calculate Interest</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Compound Interest Result</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
