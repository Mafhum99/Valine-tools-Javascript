<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Manage clipboard history">
    <meta name="theme-color" content="#2563eb">
    <title>Clipboard Manager - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📋</span>
        <h1>Clipboard Manager</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Manage clipboard history</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="clipboard-text">Text Snippet</label>
                    <textarea id="clipboard-text" class="form-input form-textarea" rows="3" placeholder="Paste or type text to save..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="save-clipboard" class="btn btn-primary btn-block">Save to History</button>
                    <button id="paste-from-clipboard" class="btn btn-secondary">Paste from Clipboard</button>
                </div>

                <div id="clipboard-history" class="mt-3">
                    <div class="d-flex justify-between align-center mb-2">
                        <h3 class="text-lg font-semibold">Clipboard History</h3>
                        <button id="clear-history" class="btn btn-sm btn-danger">Clear All</button>
                    </div>
                    <div id="history-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
