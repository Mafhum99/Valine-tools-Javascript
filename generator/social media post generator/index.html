<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate social media post content">
    <meta name="theme-color" content="#2563eb">
    <title>📱 Social Media Post Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📱</span>
        <h1>Social Media Post Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate social media post content</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="topic">Topic</label>
                    <input type="text" id="topic" class="form-input" placeholder="e.g., New product launch, Company milestone...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="platform">Platform</label>
                    <select id="platform" class="form-select">
                        <option value="facebook">Facebook</option>
                        <option value="instagram">Instagram</option>
                        <option value="twitter">Twitter/X</option>
                        <option value="linkedin">LinkedIn</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="post-tone">Post Tone</label>
                    <select id="post-tone" class="form-select">
                        <option value="professional">Professional</option>
                        <option value="casual">Casual / Friendly</option>
                        <option value="promotional">Promotional</option>
                        <option value="humorous">Humorous</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Posts</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
