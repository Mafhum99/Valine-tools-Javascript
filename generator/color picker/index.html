<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Pick a color and see its HEX, RGB, HSL, and CMYK values">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F3A8; Color Picker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F3A8;</span>
        <h1>Color Picker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Pick a color and see its HEX, RGB, HSL, and CMYK values</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="colorPicker">Choose Color</label>
                    <input type="color" id="colorPicker" class="form-input" value="#3b82f6" style="height:60px;cursor:pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hexInput">Or enter HEX</label>
                    <input type="text" id="hexInput" class="form-input" value="#3B82F6" placeholder="#3B82F6" maxlength="7">
                </div>

                <div id="preview" style="width:100%;height:80px;border-radius:8px;margin-bottom:1rem;background-color:#3b82f6;border:1px solid #e5e7eb;"></div>

                <div class="result-box" id="result">
                    <div class="result-label">Color Values</div>
                    <div id="output">
                        <div class="color-values" id="colorValues"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .color-value-row {
            display:flex;align-items:center;gap:0.5rem;padding:0.6rem 0;
            border-bottom:1px solid #e5e7eb;font-family:monospace;font-size:0.95rem;
        }
        .color-label { font-weight:600;min-width:50px;color:#6b7280; }
        .btn-copy-small {
            padding:0.25rem 0.5rem;font-size:0.75rem;background:#f3f4f6;
            border:1px solid #d1d5db;border-radius:4px;cursor:pointer;margin-left:auto;
        }
        .btn-copy-small:hover { background:#e5e7eb; }
    </style>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
