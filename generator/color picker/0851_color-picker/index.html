<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Pick and preview colors with values">
    <meta name="theme-color" content="#2563eb">
    <title>Color Picker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎨</span>
        <h1>Color Picker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Pick and preview colors with HEX, RGB, and HSL values</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color-input">Pick a Color</label>
                    <input type="color" id="color-input" class="form-input" value="#3b82f6" style="width: 100%; height: 80px; padding: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hex-input">Or enter HEX value</label>
                    <input type="text" id="hex-input" class="form-input" placeholder="#3b82f6" value="#3b82f6" maxlength="7">
                </div>

                <div id="color-preview" style="width: 100%; height: 100px; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e5e7eb;"></div>

                <div class="color-values">
                    <div class="color-value-item">
                        <span class="color-value-label">HEX</span>
                        <span class="color-value" id="hex-value">#3B82F6</span>
                        <button class="copy-btn" data-value="hex" title="Copy HEX">📋</button>
                    </div>
                    <div class="color-value-item">
                        <span class="color-value-label">RGB</span>
                        <span class="color-value" id="rgb-value">rgb(59, 130, 246)</span>
                        <button class="copy-btn" data-value="rgb" title="Copy RGB">📋</button>
                    </div>
                    <div class="color-value-item">
                        <span class="color-value-label">HSL</span>
                        <span class="color-value" id="hsl-value">hsl(217, 91%, 60%)</span>
                        <button class="copy-btn" data-value="hsl" title="Copy HSL">📋</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
