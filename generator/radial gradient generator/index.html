<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS radial gradients visually">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F308; Radial Gradient Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F308;</span>
        <h1>Radial Gradient Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS radial gradients with custom colors and shapes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="fromColor">From Color</label>
                    <input type="color" id="fromColor" class="form-input form-input-color" value="#2563eb">
                    <input type="text" id="fromColorText" class="form-input" value="#2563eb" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="toColor">To Color</label>
                    <input type="color" id="toColor" class="form-input form-input-color" value="#7c3aed">
                    <input type="text" id="toColorText" class="form-input" value="#7c3aed" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="shape">Shape</label>
                    <select id="shape" class="form-select">
                        <option value="circle">Circle</option>
                        <option value="ellipse">Ellipse</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div id="preview" class="gradient-preview"></div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
