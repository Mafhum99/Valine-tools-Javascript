<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS striped patterns with customizable colors and angles">
    <meta name="theme-color" content="#2563eb">
    <title>Striped Pattern Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Striped Pattern Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS striped patterns with customizable colors and angles</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="stripe-color">Stripe Color</label>
                    <input type="color" id="stripe-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="stripe-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stripe-bg">Background Color</label>
                    <input type="color" id="stripe-bg" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="stripe-bg-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stripe-width">Stripe Width (px)</label>
                    <input type="range" id="stripe-width" min="1" max="20" value="4" class="form-range">
                    <span id="stripe-width-value" class="range-value">4px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="stripe-gap">Gap Between Stripes (px)</label>
                    <input type="range" id="stripe-gap" min="2" max="40" value="12" class="form-range">
                    <span id="stripe-gap-value" class="range-value">12px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="stripe-angle">Angle (degrees)</label>
                    <select id="stripe-angle" class="form-select">
                        <option value="0">0&deg; (Vertical)</option>
                        <option value="45" selected>45&deg; (Diagonal)</option>
                        <option value="90">90&deg; (Horizontal)</option>
                        <option value="135">135&deg; (Reverse Diagonal)</option>
                    </select>
                </div>

                <div class="preview-box" id="stripe-preview" style="width:100%;height:200px;border-radius:var(--radius);border:1px solid var(--gray-300);"></div>

                <div class="result-box" id="stripe-output">
                    <div class="result-label">CSS Code</div>
                    <code id="stripe-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
