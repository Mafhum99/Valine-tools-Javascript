<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate complementary colors">
    <meta name="theme-color" content="#2563eb">
    <title>Complementary Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔄</span>
        <h1>Complementary Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate complementary color (hue + 180 degrees)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color-input">Pick a Color</label>
                    <input type="color" id="color-input" class="form-input" value="#3b82f6" style="width: 100%; height: 60px; padding: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hex-input">Or enter HEX value</label>
                    <input type="text" id="hex-input" class="form-input" placeholder="#3b82f6" value="#3b82f6" maxlength="7">
                </div>

                <div class="color-pair-container">
                    <div class="color-pair-item">
                        <div class="color-preview" id="original-preview" style="background-color: #3b82f6;"></div>
                        <div class="color-pair-label">Original</div>
                        <div class="color-value-item">
                            <span class="color-value" id="original-hex">#3B82F6</span>
                            <button class="copy-btn" data-target="original-hex">📋</button>
                        </div>
                        <div class="color-value-item">
                            <span class="color-value" id="original-rgb">rgb(59, 130, 246)</span>
                            <button class="copy-btn" data-target="original-rgb">📋</button>
                        </div>
                    </div>
                    <div class="color-pair-item">
                        <div class="color-preview" id="complementary-preview" style="background-color: #f6a53b;"></div>
                        <div class="color-pair-label">Complementary</div>
                        <div class="color-value-item">
                            <span class="color-value" id="complementary-hex">#F6A53B</span>
                            <button class="copy-btn" data-target="complementary-hex">📋</button>
                        </div>
                        <div class="color-value-item">
                            <span class="color-value" id="complementary-rgb">rgb(246, 165, 59)</span>
                            <button class="copy-btn" data-target="complementary-rgb">📋</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
