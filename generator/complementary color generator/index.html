<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate complementary color pairs">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F504; Complementary Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F504;</span>
        <h1>Complementary Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate complementary color pairs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="baseColor">Base Color</label>
                    <input type="color" id="baseColor" class="form-input" value="#3b82f6" style="height:50px;cursor:pointer;">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Complementary Colors</div>
                    <div id="output"></div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .comp-row { display:flex;gap:1rem;align-items:center;margin:0.75rem 0; }
        .comp-swatch { flex:1;height:80px;border-radius:8px;display:flex;align-items:flex-end;justify-content:center;
            padding:0.5rem;font-size:0.8rem;font-family:monospace;font-weight:600;border:1px solid rgba(0,0,0,0.1); }
    </style>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
