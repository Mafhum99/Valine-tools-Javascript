<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Add line numbers to text">
    <meta name="theme-color" content="#2563eb">
    <title>&#128214; Line Number Adder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128214;</span>
        <h1>Line Number Adder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Add line numbers to each line</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input text</label>
                    <textarea id="input" class="form-textarea" rows="6" placeholder="Enter your text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="startNum">Starting Number</label>
                    <input type="number" id="startNum" class="form-input" value="1" min="0" style="width:100px;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="separator">Separator</label>
                    <select id="separator" class="form-select">
                        <option value=": ">Colon + Space (1: line)</option>
                        <option value=") ">Parenthesis + Space (1) line)</option>
                        <option value=" | ">Pipe (1 | line)</option>
                        <option value=" - ">Dash (1 - line)</option>
                        <option value="\t">Tab</option>
                        <option value="  ">Two Spaces</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="add" class="btn btn-primary btn-block">Add Line Numbers</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Numbered Text</div>
                    <textarea id="output" class="form-textarea" rows="8" readonly style="white-space: pre;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
