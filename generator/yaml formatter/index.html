<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Format and validate YAML data">
    <meta name="theme-color" content="#2563eb">
    <title>&#x270F;&#xFE0F; YAML Formatter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x270F;&#xFE0F;</span>
        <h1>YAML Formatter</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Fix indentation and format YAML data</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Paste YAML</label>
                    <textarea id="input" class="form-textarea" rows="10" placeholder="name: John\nage: 30\nhobbies:\n  - reading\n  - coding"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="indentSize">Indent size</label>
                    <select id="indentSize" class="form-select">
                        <option value="2" selected>2 spaces</option>
                        <option value="4">4 spaces</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="formatBtn" class="btn btn-primary">&#x2728; Format</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Formatted YAML</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
