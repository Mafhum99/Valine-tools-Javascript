<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate mind maps">
    <meta name="theme-color" content="#2563eb">
    <title>Mind Map Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧠</span>
        <h1>Mind Map Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate mind maps from text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="central-idea">Central Idea</label>
                    <input type="text" id="central-idea" class="form-input" placeholder="e.g., Project Management">
                </div>

                <div class="form-group">
                    <label class="form-label" for="branch-ideas">Branch Ideas (one per line, optional)</label>
                    <textarea id="branch-ideas" class="form-input form-textarea" rows="5" placeholder="Planning&#10;Execution&#10;Monitoring&#10;Reporting"></textarea>
                </div>

                <div class="btn-group">
                    <button id="generate-btn" class="btn btn-primary btn-block">Generate Mind Map</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Mind Map</div>
                    <div id="output" class="text-left" style="white-space: pre; font-family: monospace;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy Mind Map</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
