<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate pace from speed or speed from pace">
    <meta name="theme-color" content="#2563eb">
    <title>⚡ Speed-Pace Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">⚡</span>
        <h1>Speed-Pace Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert between speed and pace</p>
            <div class="form-group">
                <label class="form-label" for="inputValue">Value</label>
                <input type="number" id="inputValue" class="form-input" placeholder="e.g., 10" step="any">
            </div>
            <div class="form-group">
                <label class="form-label" for="inputType">Input Type</label>
                <select id="inputType" class="form-select">
                    <option value="speedKmh">Speed (km/h)</option>
                    <option value="speedMph">Speed (mph)</option>
                    <option value="paceKmh">Pace (min/km)</option>
                    <option value="paceMph">Pace (min/mile)</option>
                </select>
            </div>
            <div id="paceInputs" class="hidden">
                <div style="display:flex;gap:0.5rem;">
                    <div class="form-group" style="flex:1">
                        <label class="form-label" for="paceMin">Minutes</label>
                        <input type="number" id="paceMin" class="form-input" placeholder="Min" min="0" value="0">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label class="form-label" for="paceSec">Seconds</label>
                        <input type="number" id="paceSec" class="form-input" placeholder="Sec" min="0" max="59" value="0">
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
