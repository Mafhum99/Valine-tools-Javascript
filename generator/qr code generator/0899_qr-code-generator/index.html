<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate QR codes from text or URLs">
    <meta name="theme-color" content="#2563eb">
    <title>QR Code Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f4f1;</span>
        <h1>QR Code Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate QR codes from text or URLs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="qrInput">Text or URL</label>
                    <input type="text" id="qrInput" class="form-input" placeholder="https://example.com" value="https://example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="qrSize">Module Size (px)</label>
                    <input type="range" id="qrSize" class="form-range" min="4" max="20" value="8">
                    <span id="qrSizeValue" class="range-value">8</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="qrErrorCorrection">Error Correction</label>
                    <select id="qrErrorCorrection" class="form-input">
                        <option value="L">Low (7%)</option>
                        <option value="M" selected>Medium (15%)</option>
                        <option value="Q">Quartile (25%)</option>
                        <option value="H">High (30%)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="qrMargin">Margin (modules)</label>
                    <input type="range" id="qrMargin" class="form-range" min="1" max="8" value="4">
                    <span id="qrMarginValue" class="range-value">4</span>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate QR Code</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="qrPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">SVG Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy SVG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
