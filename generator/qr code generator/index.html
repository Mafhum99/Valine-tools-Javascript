<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate QR codes from text or URLs">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4F1; QR Code Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4F1;</span>
        <h1>QR Code Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate QR codes from text or URLs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text or URL</label>
                    <textarea id="input" class="form-input form-textarea" placeholder="Enter text or URL..." rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="size">Size (pixels)</label>
                    <input type="number" id="size" class="form-input" value="200" min="100" max="500">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate QR Code</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output" style="text-align:center;">
                        <canvas id="qr-canvas"></canvas>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="download" class="btn btn-secondary">&#x1F4BE; Download PNG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
