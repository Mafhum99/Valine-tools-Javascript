<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate QR code data">
    <meta name="theme-color" content="#2563eb">
    <title>📱 QR Code Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📱</span>
        <h1>QR Code Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate QR code data</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text or URL</label>
                    <textarea id="input" class="form-input" rows="3" placeholder="Enter value..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">📱 Generate QR Data</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">QR Code Data</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Data</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
