<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Estimate unredeemed gift card value (breakage)">
    <meta name="theme-color" content="#2563eb">
    <title>Gift Card Breakage Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧮</span>
        <h1>Gift Card Breakage Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Estimate unredeemed gift card value (breakage)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="total_gift_cards_sold">Total Gift Cards Sold</label>
                    <input type="number" id="total_gift_cards_sold" class="form-input" placeholder="e.g. 1000" step="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="total_value">Total Value ($)</label>
                    <input type="number" id="total_value" class="form-input" placeholder="e.g. 50000" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="redemption_rate">Redemption Rate (%)</label>
                    <input type="number" id="redemption_rate" class="form-input" placeholder="e.g. 75" step="0.01" min="0" max="100">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
