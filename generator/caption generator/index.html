<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate captions for social media">
    <meta name="theme-color" content="#2563eb">
    <title>💬 Caption Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💬</span>
        <h1>Caption Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate captions for social media</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="description">Image / Content Description</label>
                    <textarea id="description" class="form-textarea" placeholder="Describe the image or content you need a caption for..." rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="caption-style">Caption Style</label>
                    <select id="caption-style" class="form-select">
                        <option value="short">Short & Sweet</option>
                        <option value="engaging">Engaging / Question</option>
                        <option value="inspirational">Inspirational</option>
                        <option value="funny">Funny / Witty</option>
                        <option value="minimalist">Minimalist</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Captions</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
