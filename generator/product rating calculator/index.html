<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate weighted average product rating">
    <meta name="theme-color" content="#2563eb">
    <title>Product Rating Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F9EE;</span>
        <h1>Product Rating Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate weighted average product rating</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="stars_5">5 Stars</label>
                    <input type="number" id="stars_5" class="form-input" placeholder="e.g. 50">
                </div>
                <div class="form-group">
                    <label class="form-label" for="stars_4">4 Stars</label>
                    <input type="number" id="stars_4" class="form-input" placeholder="e.g. 30">
                </div>
                <div class="form-group">
                    <label class="form-label" for="stars_3">3 Stars</label>
                    <input type="number" id="stars_3" class="form-input" placeholder="e.g. 10">
                </div>
                <div class="form-group">
                    <label class="form-label" for="stars_2">2 Stars</label>
                    <input type="number" id="stars_2" class="form-input" placeholder="e.g. 5">
                </div>
                <div class="form-group">
                    <label class="form-label" for="stars_1">1 Star</label>
                    <input type="number" id="stars_1" class="form-input" placeholder="e.g. 3">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
