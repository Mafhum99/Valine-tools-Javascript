<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert text to speech">
    <meta name="theme-color" content="#2563eb">
    <title>🔊 Text to Speech - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔊</span>
        <h1>Text to Speech</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert text to speech</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input</label>
                    <textarea id="input" class="form-input" rows="6" placeholder="Enter text to speak..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="voiceSelect">Voice</label>
                    <select id="voiceSelect" class="form-input"></select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="rate">Rate: <span id="rateValue">1</span>x</label>
                    <input type="range" id="rate" class="form-range" min="0.5" max="2" step="0.1" value="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="pitch">Pitch: <span id="pitchValue">1</span></label>
                    <input type="range" id="pitch" class="form-range" min="0" max="2" step="0.1" value="1">
                </div>

                <div class="btn-group">
                    <button id="speak" class="btn btn-primary">🔊 Speak</button>
                    <button id="pause" class="btn btn-secondary">⏸ Pause</button>
                    <button id="resume" class="btn btn-secondary">▶ Resume</button>
                    <button id="stop" class="btn btn-secondary">⏹ Stop</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label" id="status">Ready</div>
                    <div id="output"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
