<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert em units to pixels">
    <meta name="theme-color" content="#2563eb">
    <title>EM to PX Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>EM to PX Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert em units to pixels</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="em-value">EM Value</label>
                    <input type="number" id="em-value" value="1" min="0" step="0.0625" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="em-parent-size">Parent Font Size (px)</label>
                    <input type="number" id="em-parent-size" value="16" min="1" class="form-input">
                </div>
                <div class="result-box" id="em-output">
                    <div class="result-label">Result</div>
                    <code id="em-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
