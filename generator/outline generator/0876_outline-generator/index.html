<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS outline styles">
    <meta name="theme-color" content="#2563eb">
    <title>&#128306; Outline Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128306;</span>
        <h1>Outline Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS outline styles</p>

            <div id="tool-content">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="outline-width">Width (px)</label>
                        <div class="range-with-value">
                            <input type="range" id="outline-width" min="0" max="10" value="2" class="form-range">
                            <span id="outline-width-value" class="range-value">2px</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="outline-style">Style</label>
                        <select id="outline-style" class="form-select">
                            <option value="solid">Solid</option>
                            <option value="dashed">Dashed</option>
                            <option value="dotted">Dotted</option>
                            <option value="double">Double</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="outline-color">Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="outline-color" value="#2563eb" class="color-picker">
                            <input type="text" id="outline-color-text" value="#2563eb" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="outline-offset">Offset (px)</label>
                        <div class="range-with-value">
                            <input type="range" id="outline-offset" min="-10" max="20" value="4" class="form-range">
                            <span id="outline-offset-value" class="range-value">4px</span>
                        </div>
                    </div>
                </div>

                <div class="preview-area outline-preview-area">
                    <div class="outline-preview" id="outline-preview"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="preset-focus" class="btn btn-secondary">Focus Preset</button>
                    <button id="preset-badge" class="btn btn-secondary">Badge Preset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
