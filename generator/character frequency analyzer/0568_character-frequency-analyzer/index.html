<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Analyze character frequency in text">
    <meta name="theme-color" content="#2563eb">
    <title>&#128203; Character Frequency Analyzer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128203;</span>
        <h1>Character Frequency Analyzer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Analyze character frequency in text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text to analyze</label>
                    <textarea id="input" class="form-textarea" rows="5" placeholder="Enter your text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="charType">Character Type</label>
                    <select id="charType" class="form-select">
                        <option value="letters">Letters Only</option>
                        <option value="all">All Characters</option>
                        <option value="vowels">Vowels Only</option>
                        <option value="consonants">Consonants Only</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="caseSensitive"> Case Sensitive
                    </label>
                </div>

                <div class="btn-group">
                    <button id="analyze" class="btn btn-primary btn-block">Analyze Characters</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Character Frequency (<span id="uniqueCount">0</span> unique)</div>
                    <div id="output" style="white-space: pre-wrap; font-family: monospace; font-size: 0.85rem;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
