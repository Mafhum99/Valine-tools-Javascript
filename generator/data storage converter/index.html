<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert between data storage units">
    <meta name="theme-color" content="#2563eb">
    <title>💾 Data Storage Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💾</span>
        <h1>Data Storage Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert between bytes, kilobytes, megabytes, gigabytes, terabytes, and more</p>
            <div class="form-group">
                <label class="form-label" for="inputValue">Value</label>
                <input type="number" id="inputValue" class="form-input" placeholder="Enter value" step="any">
            </div>
            <div class="form-group"><label class="form-label" for="systemType">System</label>
                <select id="systemType" class="form-select">
                    <option value="binary">Binary (1024-based, KiB, MiB...)</option>
                    <option value="decimal">Decimal (1000-based, KB, MB...)</option>
                </select>
            </div>
            <div class="form-group"><label class="form-label" for="fromUnit">From</label><select id="fromUnit" class="form-select"></select></div>
            <div class="form-group"><label class="form-label" for="toUnit">To</label><select id="toUnit" class="form-select"></select></div>
            <div class="btn-group">
                <button id="convert" class="btn btn-primary btn-block">Convert</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
