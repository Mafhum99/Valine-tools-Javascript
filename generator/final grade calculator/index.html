<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate the final exam score needed to achieve your desired course grade">
    <meta name="theme-color" content="#2563eb">
    <title>🎯 Final Grade Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎯</span>
        <h1>Final Grade Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate the final exam score needed to achieve your desired course grade.</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="current-grade">Current Grade (%)</label>
                    <input type="number" id="current-grade" class="form-input" placeholder="e.g. 85" min="0" max="100" step="any">
                </div>

                <div class="form-group">
                    <label class="form-label" for="weight-current">Weight of Current Grade (%)</label>
                    <input type="number" id="weight-current" class="form-input" placeholder="e.g. 60" min="0" max="100" step="any">
                    <small class="form-hint">Percentage of your overall grade earned so far</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="desired-grade">Desired Final Grade (%)</label>
                    <input type="number" id="desired-grade" class="form-input" placeholder="e.g. 90" min="0" max="100" step="any">
                </div>

                <div class="form-group">
                    <label class="form-label" for="weight-final">Weight of Final Exam (%)</label>
                    <input type="number" id="weight-final" class="form-input" placeholder="e.g. 40" min="0" max="100" step="any">
                    <small class="form-hint">Remaining percentage of your overall grade</small>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
