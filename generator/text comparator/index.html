<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Compare two texts for common and unique lines">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F50D; Text Comparator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F50D;</span>
        <h1>Text Comparator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Compare two texts, find common and unique lines</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="text1">First Text</label>
                    <textarea id="text1" class="form-textarea" rows="6" placeholder="Paste first text here..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="text2">Second Text</label>
                    <textarea id="text2" class="form-textarea" rows="6" placeholder="Paste second text here..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="compareBtn" class="btn btn-primary">&#x1F50D; Compare</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Comparison Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
