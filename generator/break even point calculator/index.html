<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Find the break-even point for your business">
    <meta name="theme-color" content="#2563eb">
    <title>⚖️ Break-Even Point Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">⚖️</span>
        <h1>Break-Even Point Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Find the break-even point for your business</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="fixedCosts">Fixed Costs ($)</label>
                    <input type="number" id="fixedCosts" class="form-input" placeholder="Enter fixed costs..." step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label class="form-label" for="pricePerUnit">Price per Unit ($)</label>
                    <input type="number" id="pricePerUnit" class="form-input" placeholder="Enter price per unit..." step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label class="form-label" for="variableCostPerUnit">Variable Cost per Unit ($)</label>
                    <input type="number" id="variableCostPerUnit" class="form-input" placeholder="Enter variable cost..." step="0.01" min="0">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Break-Even Point (Units)</div>
                    <div id="breakEvenUnits">-</div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Break-Even Revenue</div>
                    <div id="breakEvenRevenue">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
