<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Analyze word frequency in text">
    <meta name="theme-color" content="#2563eb">
    <title>&#128202; Word Frequency Analyzer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128202;</span>
        <h1>Word Frequency Analyzer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Analyze word frequency in text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text to analyze</label>
                    <textarea id="input" class="form-textarea" rows="6" placeholder="Enter your text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="minLength">Minimum Word Length</label>
                    <input type="number" id="minLength" class="form-input" value="3" min="1" max="20" style="width:80px;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sortBy">Sort By</label>
                    <select id="sortBy" class="form-select">
                        <option value="frequency">Frequency (most first)</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="excludeCommon" checked> Exclude Common Words (the, is, at, etc.)
                    </label>
                </div>

                <div class="btn-group">
                    <button id="analyze" class="btn btn-primary btn-block">Analyze Words</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Word Frequency Results (<span id="uniqueCount">0</span> unique words)</div>
                    <div id="output" style="white-space: pre-wrap; font-size:0.9rem;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
