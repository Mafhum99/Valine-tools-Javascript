<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate analogous color schemes">
    <meta name="theme-color" content="#2563eb">
    <title>Analogous Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎨</span>
        <h1>Analogous Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate analogous colors at -30 and +30 degrees</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color-input">Pick a Color</label>
                    <input type="color" id="color-input" class="form-input" value="#3b82f6" style="width: 100%; height: 60px; padding: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hex-input">Or enter HEX value</label>
                    <input type="text" id="hex-input" class="form-input" placeholder="#3b82f6" value="#3b82f6" maxlength="7">
                </div>

                <div class="color-triplet-container">
                    <div class="color-triplet-item">
                        <div class="color-preview" id="left-preview"></div>
                        <div class="color-pair-label">Analogous -30</div>
                        <div class="color-value-item">
                            <span class="color-value" id="left-hex"></span>
                            <button class="copy-btn" data-target="left-hex">📋</button>
                        </div>
                    </div>
                    <div class="color-triplet-item">
                        <div class="color-preview" id="base-preview"></div>
                        <div class="color-pair-label">Base Color</div>
                        <div class="color-value-item">
                            <span class="color-value" id="base-hex"></span>
                            <button class="copy-btn" data-target="base-hex">📋</button>
                        </div>
                    </div>
                    <div class="color-triplet-item">
                        <div class="color-preview" id="right-preview"></div>
                        <div class="color-pair-label">Analogous +30</div>
                        <div class="color-value-item">
                            <span class="color-value" id="right-hex"></span>
                            <button class="copy-btn" data-target="right-hex">📋</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
