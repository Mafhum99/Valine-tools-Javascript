<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate price elasticity of demand">
    <meta name="theme-color" content="#2563eb">
    <title>Price Elasticity Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧮</span>
        <h1>Price Elasticity Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate price elasticity of demand (E = % change in quantity / % change in price)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="old_price">Old Price ($)</label>
                    <input type="number" id="old_price" class="form-input" placeholder="e.g. 100" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="new_price">New Price ($)</label>
                    <input type="number" id="new_price" class="form-input" placeholder="e.g. 120" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="old_quantity">Old Quantity</label>
                    <input type="number" id="old_quantity" class="form-input" placeholder="e.g. 500" step="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="new_quantity">New Quantity</label>
                    <input type="number" id="new_quantity" class="form-input" placeholder="e.g. 400" step="1" min="0">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
