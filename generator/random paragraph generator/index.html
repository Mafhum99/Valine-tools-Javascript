<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random paragraphs">
    <meta name="theme-color" content="#2563eb">
    <title>&#128214; Random Paragraph Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128214;</span>
        <h1>Random Paragraph Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random paragraphs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="count">Number of Paragraphs</label>
                    <input type="number" id="count" class="form-input" value="3" min="1" max="50" style="width:100px;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="style">Paragraph Style</label>
                    <select id="style" class="form-select">
                        <option value="narrative">Narrative</option>
                        <option value="descriptive">Descriptive</option>
                        <option value="persuasive">Persuasive</option>
                        <option value="mixed">Mixed</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="sentences">Sentences per Paragraph</label>
                    <select id="sentences" class="form-select">
                        <option value="3">3 sentences</option>
                        <option value="4">4 sentences</option>
                        <option value="5" selected>5 sentences</option>
                        <option value="6">6 sentences</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Paragraphs</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Paragraphs</div>
                    <div id="output" style="white-space: pre-wrap; line-height:1.8;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Paragraphs</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
