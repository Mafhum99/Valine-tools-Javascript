<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate required sample size for tests">
    <meta name="theme-color" content="#2563eb">
    <title>Sample Size Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f4cb;</span>
        <h1>Sample Size Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate required sample size for tests</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="confidence_level">Confidence Level (%)</label>
                    <input type="number" id="confidence_level" class="form-input" placeholder="e.g. 95" value="95">
                </div>
                <div class="form-group">
                    <label class="form-label" for="margin_of_error">Margin of Error (%)</label>
                    <input type="number" id="margin_of_error" class="form-input" placeholder="e.g. 5" value="5">
                </div>
                <div class="form-group">
                    <label class="form-label" for="population_proportion">Population Proportion (%)</label>
                    <input type="number" id="population_proportion" class="form-input" placeholder="e.g. 50" value="50">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
