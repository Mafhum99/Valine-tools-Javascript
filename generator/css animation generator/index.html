<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS keyframe animations">
    <meta name="theme-color" content="#2563eb">
    <title>&#x2728; CSS Animation Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x2728;</span>
        <h1>CSS Animation Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS @keyframes animations</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="animationType">Animation Type</label>
                    <select id="animationType" class="form-select">
                        <option value="fade">Fade</option>
                        <option value="slide">Slide</option>
                        <option value="bounce">Bounce</option>
                        <option value="pulse">Pulse</option>
                        <option value="shake">Shake</option>
                        <option value="rotate">Rotate</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="duration">Duration (s)</label>
                    <input type="number" id="duration" class="form-input" value="1" min="0.1" max="10" step="0.1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="delay">Delay (s)</label>
                    <input type="number" id="delay" class="form-input" value="0" min="0" max="5" step="0.1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="iterations">Iterations</label>
                    <select id="iterations" class="form-select">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="infinite" selected>Infinite</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview" class="animation-preview">Box</div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
