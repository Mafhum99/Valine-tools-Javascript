<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS keyframe animations">
    <meta name="theme-color" content="#2563eb">
    <title>&#127916; CSS Animation Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127916;</span>
        <h1>CSS Animation Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS keyframe animations</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="animation-name">Animation Name</label>
                    <input type="text" id="animation-name" class="form-input" value="myAnimation" placeholder="e.g., fadeIn, slideUp...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="animation-preset">Preset Type</label>
                        <select id="animation-preset" class="form-select">
                            <option value="fade">Fade In</option>
                            <option value="slide-up">Slide Up</option>
                            <option value="slide-down">Slide Down</option>
                            <option value="slide-left">Slide Left</option>
                            <option value="slide-right">Slide Right</option>
                            <option value="bounce">Bounce</option>
                            <option value="pulse">Pulse</option>
                            <option value="shake">Shake</option>
                            <option value="spin">Spin</option>
                            <option value="flip">Flip</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="duration">Duration (s)</label>
                        <div class="range-with-value">
                            <input type="range" id="duration" min="0.1" max="5" step="0.1" value="1" class="form-range">
                            <span id="duration-value" class="range-value">1.0s</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="easing">Easing</label>
                        <select id="easing" class="form-select">
                            <option value="ease">Ease</option>
                            <option value="linear">Linear</option>
                            <option value="ease-in">Ease In</option>
                            <option value="ease-out">Ease Out</option>
                            <option value="ease-in-out">Ease In Out</option>
                            <option value="cubic-bezier(0.68, -0.55, 0.265, 1.55)">Back Out</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="iterations">Iterations</label>
                        <select id="iterations" class="form-select">
                            <option value="1">1 (Once)</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="infinite">Infinite</option>
                        </select>
                    </div>
                </div>

                <div class="preview-area animation-preview-area">
                    <div class="animation-preview" id="anim-preview">Preview</div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="play" class="btn btn-primary">Replay Animation</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
