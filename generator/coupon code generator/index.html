<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate unique coupon codes for promotions">
    <meta name="theme-color" content="#2563eb">
    <title>🎫 Coupon Code Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎫</span>
        <h1>Coupon Code Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate unique coupon codes for promotions</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="prefix">Prefix</label>
                    <input type="text" id="prefix" class="form-input" placeholder="e.g. SAVE" value="SAVE">
                </div>
                <div class="form-group">
                    <label class="form-label" for="code_length">Code Length</label>
                    <input type="number" id="code_length" class="form-input" placeholder="e.g. 8" value="8">
                </div>
                <div class="form-group">
                    <label class="form-label" for="quantity">Quantity</label>
                    <input type="number" id="quantity" class="form-input" placeholder="e.g. 5" value="5">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Generate Codes</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
