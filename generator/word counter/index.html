<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Count words, characters, sentences, paragraphs">
    <meta name="theme-color" content="#2563eb">
    <title>📝 Word Counter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📝</span>
        <h1>Word Counter</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Count words, characters, sentences, paragraphs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input</label>
                    <textarea id="input" class="form-input" rows="8" placeholder="Enter your text here..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="count" class="btn btn-primary btn-block">Count</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Statistics</div>
                    <div id="output">
                        <div class="stats-grid">
                            <div class="stat-item"><span class="stat-value" id="words">0</span><span class="stat-label">Words</span></div>
                            <div class="stat-item"><span class="stat-value" id="chars">0</span><span class="stat-label">Characters</span></div>
                            <div class="stat-item"><span class="stat-value" id="charsNoSpaces">0</span><span class="stat-label">Characters (no spaces)</span></div>
                            <div class="stat-item"><span class="stat-value" id="sentences">0</span><span class="stat-label">Sentences</span></div>
                            <div class="stat-item"><span class="stat-value" id="paragraphs">0</span><span class="stat-label">Paragraphs</span></div>
                            <div class="stat-item"><span class="stat-value" id="readingTime">0s</span><span class="stat-label">Reading Time</span></div>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
