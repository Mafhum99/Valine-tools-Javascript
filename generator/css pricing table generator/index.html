<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS pricing tables">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4B0; CSS Pricing Table Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4B0;</span>
        <h1>CSS Pricing Table Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate pricing table HTML and CSS</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="planName">Plan Name</label>
                    <input type="text" id="planName" class="form-input" value="Pro Plan" placeholder="Pro Plan">
                </div>

                <div class="form-group">
                    <label class="form-label" for="price">Price</label>
                    <input type="text" id="price" class="form-input" value="$29" placeholder="$29">
                </div>

                <div class="form-group">
                    <label class="form-label" for="period">Period</label>
                    <select id="period" class="form-select">
                        <option value="/month">Per Month</option>
                        <option value="/year">Per Year</option>
                        <option value="">One Time</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="features">Features (one per line)</label>
                    <textarea id="features" class="form-textarea" rows="4" placeholder="10 Users&#10;50 GB Storage&#10;Priority Support&#10;API Access">10 Users
50 GB Storage
Priority Support
API Access</textarea>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview"></div>
                    </div>
                    <div class="result-label mt-2">HTML + CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
