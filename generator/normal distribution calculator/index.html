<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Normal distribution calculator: PDF, CDF, probability ranges, and inverse CDF">
    <meta name="theme-color" content="#2563eb">
    <title>Normal Distribution Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .norm-result .result-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; }
        .norm-result .result-card .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .norm-result .result-card .value { font-size: 1.25rem; font-weight: 700; color: #2563eb; margin-top: 0.25rem; }
        .formula-display { background: #f3f4f6; border-radius: 0.5rem; padding: 1rem; margin: 1rem 0; font-family: monospace; font-size: 0.875rem; line-height: 1.8; color: #374151; }
        .copy-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .btn-copy { padding: 0.5rem 1rem; background: #e5e7eb; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        .btn-copy:hover { background: #d1d5db; }
        .norm-mode-group { margin-top: 1rem; }
        #norm-result { margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📊</span>
        <h1>Normal Distribution Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate PDF, CDF, probability ranges, and inverse CDF for normal distributions</p>
            <div id="tool-content">
                <div id="norm-inputs">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                        <div class="form-group">
                            <label class="form-label" for="norm-mu">Mean (μ)</label>
                            <input type="number" id="norm-mu" class="form-input" placeholder="e.g. 0" step="any">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="norm-sigma">Std Deviation (σ)</label>
                            <input type="number" id="norm-sigma" class="form-input" placeholder="e.g. 1" min="0.0001" step="any">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="norm-mode">Mode</label>
                        <select id="norm-mode" class="form-select">
                            <option value="pdf">PDF — f(x) at a point</option>
                            <option value="cdf">CDF — P(X ≤ x)</option>
                            <option value="range">Range — P(a < X < b)</option>
                            <option value="inverse">Inverse CDF — x for given p</option>
                        </select>
                    </div>
                    <!-- PDF mode -->
                    <div class="norm-mode-group" data-mode="pdf" style="display: none;">
                        <div class="form-group">
                            <label class="form-label" for="norm-x-pdf">Value x</label>
                            <input type="number" id="norm-x-pdf" class="form-input" placeholder="e.g. 1.96" step="any">
                        </div>
                    </div>
                    <!-- CDF mode -->
                    <div class="norm-mode-group" data-mode="cdf" style="display: none;">
                        <div class="form-group">
                            <label class="form-label" for="norm-x-cdf">Value x</label>
                            <input type="number" id="norm-x-cdf" class="form-input" placeholder="e.g. 1.96" step="any">
                        </div>
                    </div>
                    <!-- Range mode -->
                    <div class="norm-mode-group" data-mode="range" style="display: none;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                            <div class="form-group">
                                <label class="form-label" for="norm-range-a">Lower bound (a)</label>
                                <input type="number" id="norm-range-a" class="form-input" placeholder="e.g. -1" step="any">
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="norm-range-b">Upper bound (b)</label>
                                <input type="number" id="norm-range-b" class="form-input" placeholder="e.g. 1" step="any">
                            </div>
                        </div>
                    </div>
                    <!-- Inverse CDF mode -->
                    <div class="norm-mode-group" data-mode="inverse" style="display: none;">
                        <div class="form-group">
                            <label class="form-label" for="norm-p-inv">Probability p (0 to 1)</label>
                            <input type="number" id="norm-p-inv" class="form-input" placeholder="e.g. 0.975" min="0.0001" max="0.9999" step="any">
                        </div>
                    </div>
                </div>
                <div class="btn-group">
                    <button id="norm-calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="norm-clear" class="btn btn-secondary">Clear</button>
                </div>
                <div id="norm-result"></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
