<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate rhombus area and perimeter">
    <meta name="theme-color" content="#2563eb">
    <title>🔷 Rhombus Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #output { font-family: inherit; white-space: normal; }
        .result-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #e2e8f0; }
        .result-label { font-weight: 600; color: #475569; }
        .result-value { color: #1e293b; font-weight: 500; }
        .info-text { font-size: 0.8rem; color: #64748b; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔷</span>
        <h1>Rhombus Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate rhombus area, perimeter, and missing properties</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="rhoSide">Side (s)</label>
                    <input type="number" id="rhoSide" class="form-input" step="any" min="0" placeholder="Optional">
                </div>

                <div class="form-group">
                    <label class="form-label" for="rhoDiag1">Diagonal 1 (d1)</label>
                    <input type="number" id="rhoDiag1" class="form-input" step="any" min="0" placeholder="Required for area">
                </div>

                <div class="form-group">
                    <label class="form-label" for="rhoDiag2">Diagonal 2 (d2)</label>
                    <input type="number" id="rhoDiag2" class="form-input" step="any" min="0" placeholder="Required for area">
                </div>
                
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div id="errorBox" class="error-message" style="display: none; color: #ef4444; margin-top: 1rem;"></div>
                
                <div class="result-box" id="result" style="display: none;">
                    <div class="result-label">Results</div>
                    <div id="output"></div>
                </div>
                
                <div class="btn-group" id="copyBtnGroup" style="display: none;">
                    <button id="copy" class="btn btn-secondary">📋 Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
