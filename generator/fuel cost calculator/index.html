<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate the fuel cost for a trip">
    <meta name="theme-color" content="#2563eb">
    <title>💰 Fuel Cost Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💰</span>
        <h1>Fuel Cost Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate the total fuel cost for your trip</p>
            <div class="form-group">
                <label class="form-label" for="distance">Distance</label>
                <input type="number" id="distance" class="form-input" placeholder="e.g., 250" step="any">
            </div>
            <div class="form-group">
                <label class="form-label" for="distUnit">Distance Unit</label>
                <select id="distUnit" class="form-select">
                    <option value="km">Kilometers</option>
                    <option value="mi">Miles</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="consumption">Fuel Consumption</label>
                <input type="number" id="consumption" class="form-input" placeholder="e.g., 7.5" step="any">
            </div>
            <div class="form-group">
                <label class="form-label" for="consUnit">Consumption Unit</label>
                <select id="consUnit" class="form-select">
                    <option value="l100km">L/100km</option>
                    <option value="mpg">MPG (US)</option>
                    <option value="kml">km/L</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="price">Fuel Price (per liter)</label>
                <input type="number" id="price" class="form-input" placeholder="e.g., 1.50" step="any">
            </div>
            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Calculate Cost</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
