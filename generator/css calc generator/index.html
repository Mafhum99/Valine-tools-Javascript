<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS calc() expressions">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F9EE; CSS Calc Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F9EE;</span>
        <h1>CSS Calc Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS calc() expressions</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="calcType">Property Type</label>
                    <select id="calcType" class="form-select">
                        <option value="width">Width</option>
                        <option value="height">Height</option>
                        <option value="font-size">Font Size</option>
                        <option value="margin">Margin</option>
                        <option value="padding">Padding</option>
                        <option value="top">Top</option>
                        <option value="left">Left</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Value 1</label>
                    <input type="number" id="val1" class="form-input" value="100" placeholder="100" style="width:80px;">
                    <select id="unit1" class="form-select" style="width:80px;">
                        <option value="px">px</option>
                        <option value="%">%</option>
                        <option value="em">em</option>
                        <option value="rem">rem</option>
                        <option value="vw">vw</option>
                        <option value="vh">vh</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="operator">Operator</label>
                    <select id="operator" class="form-select" style="width:80px;">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="*">*</option>
                        <option value="/">/</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Value 2</label>
                    <input type="number" id="val2" class="form-input" value="20" placeholder="20" style="width:80px;">
                    <select id="unit2" class="form-select" style="width:80px;">
                        <option value="px" selected>px</option>
                        <option value="%">%</option>
                        <option value="em">em</option>
                        <option value="rem">rem</option>
                        <option value="vw">vw</option>
                        <option value="vh">vh</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview" class="calc-preview">calc() element</div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
