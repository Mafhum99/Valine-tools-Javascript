<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate flashcards">
    <meta name="theme-color" content="#2563eb">
    <title>Flashcard Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🃏</span>
        <h1>Flashcard Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate study flashcards from text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="flashcard-set-title">Set Title</label>
                    <input type="text" id="flashcard-set-title" class="form-input" placeholder="e.g., Biology Chapter 5">
                </div>

                <div class="form-group">
                    <label class="form-label" for="flashcard-data">Q&A Pairs (format: Question | Answer, one per line)</label>
                    <textarea id="flashcard-data" class="form-input form-textarea" rows="8" placeholder="What is photosynthesis? | Process by which plants convert sunlight to energy&#10;What is the capital of France? | Paris&#10;What year did WW2 end? | 1945"></textarea>
                </div>

                <div class="btn-group">
                    <button id="generate-btn" class="btn btn-primary btn-block">Generate Flashcards</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Flashcards</div>
                    <div id="output" class="text-left">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy Flashcards</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
