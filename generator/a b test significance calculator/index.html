<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Determine if A/B test results are significant">
    <meta name="theme-color" content="#2563eb">
    <title>A/B Test Significance Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f9ea;</span>
        <h1>A/B Test Significance Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Determine if A/B test results are significant</p>

            <div id="tool-content">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
                    <div class="form-group">
                        <label class="form-label" for="visitors_a">Visitors (A)</label>
                        <input type="number" id="visitors_a" class="form-input" placeholder="e.g. 1000" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="conversions_a">Conversions (A)</label>
                        <input type="number" id="conversions_a" class="form-input" placeholder="e.g. 100" min="0" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="visitors_b">Visitors (B)</label>
                        <input type="number" id="visitors_b" class="form-input" placeholder="e.g. 1000" min="1" step="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="conversions_b">Conversions (B)</label>
                        <input type="number" id="conversions_b" class="form-input" placeholder="e.g. 120" min="0" step="1">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
