<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Find and replace text">
    <meta name="theme-color" content="#2563eb">
    <title>🔍 Find and Replace - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔍</span>
        <h1>Find and Replace</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Find and replace text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input</label>
                    <textarea id="input" class="form-input" rows="6" placeholder="Enter your text here..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="findText">Find</label>
                    <input type="text" id="findText" class="form-input" placeholder="Text to find...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="replaceText">Replace With</label>
                    <input type="text" id="replaceText" class="form-input" placeholder="Replacement text...">
                </div>

                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" id="useRegex"> Use Regular Expression
                    </label>
                    <label class="form-checkbox">
                        <input type="checkbox" id="caseSensitive"> Case Sensitive
                    </label>
                    <label class="form-checkbox">
                        <input type="checkbox" id="replaceAll" checked> Replace All
                    </label>
                </div>

                <div class="btn-group">
                    <button id="replace" class="btn btn-primary btn-block">Replace</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result: <span id="stats"></span></div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
