<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate testimonial components">
    <meta name="theme-color" content="#2563eb">
    <title>Testimonial Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Testimonial Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate testimonial components</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="ts-quote">Quote</label>
                    <textarea id="ts-quote" class="form-textarea" rows="3">This product completely transformed our workflow. The team is now 3x more productive and collaboration has never been easier.</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ts-author">Author Name</label>
                    <input type="text" id="ts-author" value="Jane Smith" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="ts-role">Role / Company</label>
                    <input type="text" id="ts-role" value="CTO, TechCorp" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="ts-color">Accent Color</label>
                    <input type="color" id="ts-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="ts-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="ts-style">Style</label>
                    <select id="ts-style" class="form-select">
                        <option value="card">Card with Quote Mark</option>
                        <option value="minimal">Minimal</option>
                        <option value="bordered">Bordered</option>
                    </select>
                </div>
                <div class="preview-box" id="ts-preview" style="padding:20px;max-width:500px;"></div>
                <div class="result-box" id="ts-output">
                    <div class="result-label">HTML Code</div>
                    <code id="ts-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
