<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1F4CF; px to vw/vh Converter - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4CF;</span>
        <h1>px to vw/vh Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert pixels to viewport units</p>
            <div id="tool-content">
                <div class="form-group"><label class="form-label" for="pxValue">px Value</label><input type="number" id="pxValue" class="form-input" placeholder="960" step="any"></div>
                <div class="form-group"><label class="form-label" for="toUnit">Convert to</label><select id="toUnit" class="form-input"><option value="vw">vw</option><option value="vh">vh</option></select></div>
                <div class="form-group"><label class="form-label" for="viewportSize">Viewport Size (px)</label><input type="number" id="viewportSize" class="form-input" value="1920" min="1"></div>
                <div class="btn-group"><button id="convertBtn" class="btn btn-primary">&#x1F504; Convert</button><button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
