<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate gradient borders">
    <meta name="theme-color" content="#2563eb">
    <title>&#127752; Border Gradient Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127752;</span>
        <h1>Border Gradient Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate gradient borders</p>

            <div id="tool-content">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="border-width">Border Width (px)</label>
                        <div class="range-with-value">
                            <input type="range" id="border-width" min="1" max="20" value="3" class="form-range">
                            <span id="border-width-value" class="range-value">3px</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="gradient-direction">Direction</label>
                        <select id="gradient-direction" class="form-select">
                            <option value="to right">Left to Right</option>
                            <option value="to left">Right to Left</option>
                            <option value="to bottom" selected>Top to Bottom</option>
                            <option value="to top">Bottom to Top</option>
                            <option value="to bottom right">Diagonal</option>
                            <option value="135deg">135 Degrees</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="color-1">Color 1</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color-1" value="#6366f1" class="color-picker">
                            <input type="text" id="color-1-text" value="#6366f1" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="color-2">Color 2</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color-2" value="#ec4899" class="color-picker">
                            <input type="text" id="color-2-text" value="#ec4899" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-radius">Border Radius (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="border-radius" min="0" max="100" value="12" class="form-range">
                        <span id="border-radius-value" class="range-value">12px</span>
                    </div>
                </div>

                <div class="preview-area border-gradient-preview-area">
                    <div class="border-gradient-preview" id="border-preview"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="preset-rainbow" class="btn btn-secondary">Rainbow Preset</button>
                    <button id="preset-fire" class="btn btn-secondary">Fire Preset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
