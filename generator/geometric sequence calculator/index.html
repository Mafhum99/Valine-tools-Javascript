<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate geometric sequences, nth term, finite and infinite sums">
    <meta name="theme-color" content="#2563eb">
    <title>📐 Geometric Sequence Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📐</span>
        <h1>Geometric Sequence Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate geometric sequences, nth term, finite and infinite sums</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="first-term">First Term (a)</label>
                    <input type="number" id="first-term" class="form-input" placeholder="e.g. 3" step="any">
                </div>

                <div class="form-group">
                    <label class="form-label" for="common-ratio">Common Ratio (r)</label>
                    <input type="number" id="common-ratio" class="form-input" placeholder="e.g. 2" step="any">
                </div>

                <div class="form-group">
                    <label class="form-label" for="num-terms">Number of Terms (n, optional for specific term)</label>
                    <input type="number" id="num-terms" class="form-input" placeholder="e.g. 10" min="1" max="1000" step="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="specific-term">Specific Term (k, optional)</label>
                    <input type="number" id="specific-term" class="form-input" placeholder="e.g. 5" min="1" step="1">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
