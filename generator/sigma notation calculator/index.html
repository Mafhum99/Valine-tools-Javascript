<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate the sum of a series using sigma notation.">
    <meta name="theme-color" content="#2563eb">
    <title>Σ Sigma Notation Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <a href="../../index.html" class="back-btn">←</a>
        <span class="tool-header-icon">Σ</span>
        <h1>Sigma Notation Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate the summation of a function f(n) over a range of integers.</p>

            <div id="tool-content">
                <!-- ====== TOOL CONTENT START ====== -->
                <div class="form-group">
                    <label class="form-label" for="expression">Function f(n)</label>
                    <input type="text" id="expression" class="form-input" placeholder="e.g., n^2 + 2*n + 1" value="n">
                    <small class="text-muted">Use 'n' as the variable. Example: n^2, 2*n, 1/n</small>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label" for="start">Start (n = ?)</label>
                        <input type="number" id="start" class="form-input" value="1">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="end">End</label>
                        <input type="number" id="end" class="form-input" value="10">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="action-btn" class="btn btn-primary btn-block">Calculate Summation</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">Enter parameters and click Calculate.</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy Result</button>
                </div>
                <!-- ====== TOOL CONTENT END ====== -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |  
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
