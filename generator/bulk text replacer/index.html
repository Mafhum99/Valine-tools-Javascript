<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Multiple find-replace operations at once">
    <meta name="theme-color" content="#2563eb">
    <title>&#128260; Bulk Text Replacer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128260;</span>
        <h1>Bulk Text Replacer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Multiple find-replace operations at once</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Source text</label>
                    <textarea id="input" class="form-textarea" rows="5" placeholder="Enter your text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Find and Replace Rules</label>
                    <div id="rules-container"></div>
                    <button id="add-rule" class="btn btn-secondary" style="margin-top:0.5rem; font-size:0.85rem;">+ Add Rule</button>
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="useRegex"> Use Regular Expressions
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="caseSensitive"> Case Sensitive
                    </label>
                </div>

                <div class="btn-group">
                    <button id="replace" class="btn btn-primary btn-block">Replace All</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result (<span id="replacements">0</span> replacements)</div>
                    <textarea id="output" class="form-textarea" rows="8" readonly style="white-space: pre-wrap;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
