<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS tooltips">
    <meta name="theme-color" content="#2563eb">
    <title>Tooltip Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f4ac;</span>
        <h1>Tooltip Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS tooltips</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="tooltipText">Tooltip Text</label>
                    <input type="text" id="tooltipText" class="form-input" placeholder="Helpful information" maxlength="100" value="Helpful information">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipTriggerText">Trigger Text</label>
                    <input type="text" id="tooltipTriggerText" class="form-input" placeholder="Hover me" maxlength="30" value="Hover me">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipBgColor">Tooltip Background</label>
                    <input type="color" id="tooltipBgColor" class="form-color" value="#1f2937">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipTextColor">Tooltip Text Color</label>
                    <input type="color" id="tooltipTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipFontSize">Font Size (px)</label>
                    <input type="range" id="tooltipFontSize" class="form-range" min="10" max="18" value="13">
                    <span id="tooltipFontSizeValue" class="range-value">13</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipPadding">Padding (px)</label>
                    <input type="range" id="tooltipPadding" class="form-range" min="4" max="16" value="8">
                    <span id="tooltipPaddingValue" class="range-value">8</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipBorderRadius">Border Radius (px)</label>
                    <input type="range" id="tooltipBorderRadius" class="form-range" min="0" max="12" value="6">
                    <span id="tooltipBorderRadiusValue" class="range-value">6</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="tooltipPosition">Position</label>
                    <select id="tooltipPosition" class="form-input">
                        <option value="top">Top</option>
                        <option value="bottom">Bottom</option>
                        <option value="left">Left</option>
                        <option value="right">Right</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Tooltip</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="tooltipPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">HTML/CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
