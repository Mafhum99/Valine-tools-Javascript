<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Predict race times for different distances based on a recent race">
    <meta name="theme-color" content="#2563eb">
    <title>🏁 Race Time Predictor - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🏁</span>
        <h1>Race Time Predictor</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Predict race times for various distances based on your recent performance</p>
            <div class="form-group">
                <label class="form-label" for="raceDistance">Race Distance</label>
                <select id="raceDistance" class="form-select">
                    <option value="5">5K (5 km)</option>
                    <option value="10">10K (10 km)</option>
                    <option value="21.0975">Half Marathon (21.0975 km)</option>
                    <option value="42.195">Marathon (42.195 km)</option>
                    <option value="custom">Custom (km)</option>
                </select>
            </div>
            <div class="form-group hidden" id="customDistGroup">
                <label class="form-label" for="customDist">Custom Distance (km)</label>
                <input type="number" id="customDist" class="form-input" placeholder="e.g., 15" step="any">
            </div>
            <div class="form-group">
                <label class="form-label">Your Time</label>
                <div style="display:flex;gap:0.5rem;">
                    <input type="number" id="hours" class="form-input" placeholder="Hours" min="0" value="0">
                    <input type="number" id="minutes" class="form-input" placeholder="Minutes" min="0" max="59" value="0">
                    <input type="number" id="seconds" class="form-input" placeholder="Seconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="btn-group">
                <button id="predict" class="btn btn-primary btn-block">Predict Times</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
