<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate decorative wave dividers">
    <meta name="theme-color" content="#2563eb">
    <title>Wave Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f30a;</span>
        <h1>Wave Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate decorative wave dividers</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="waveType">Wave Type</label>
                    <select id="waveType" class="form-input">
                        <option value="sine">Sine Wave</option>
                        <option value="square">Square Wave</option>
                        <option value="sawtooth">Sawtooth Wave</option>
                        <option value="triangle">Triangle Wave</option>
                        <option value="curve">Smooth Curve</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="amplitude">Amplitude (px)</label>
                    <input type="range" id="amplitude" class="form-range" min="10" max="100" value="40">
                    <span id="amplitudeValue" class="range-value">40</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="frequency">Frequency</label>
                    <input type="range" id="frequency" class="form-range" min="1" max="10" value="3" step="0.5">
                    <span id="frequencyValue" class="range-value">3</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="waveColor">Wave Color</label>
                    <input type="color" id="waveColor" class="form-color" value="#2563eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="waveWidth">Width (px)</label>
                    <input type="number" id="waveWidth" class="form-input" value="400" min="100" max="800">
                </div>

                <div class="form-group">
                    <label class="form-label" for="waveHeight">Height (px)</label>
                    <input type="number" id="waveHeight" class="form-input" value="150" min="50" max="400">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Wave</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="wavePreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">SVG Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy SVG</button>
                    <button id="copyCSS" class="btn btn-secondary">&#x1f4cb; Copy CSS Clip</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
