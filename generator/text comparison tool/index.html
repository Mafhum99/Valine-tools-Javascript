<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Compare two texts, show similarities and differences">
    <meta name="theme-color" content="#2563eb">
    <title>&#128269; Text Comparison Tool - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128269;</span>
        <h1>Text Comparison Tool</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Compare two texts, show similarities and differences</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="text1">Text A</label>
                    <textarea id="text1" class="form-textarea" rows="5" placeholder="Enter first text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="text2">Text B</label>
                    <textarea id="text2" class="form-textarea" rows="5" placeholder="Enter second text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="mode">Comparison Mode</label>
                    <select id="mode" class="form-select">
                        <option value="words">Word-level comparison</option>
                        <option value="lines">Line-level comparison</option>
                        <option value="chars">Character-level comparison</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="compare" class="btn btn-primary btn-block">Compare Texts</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Comparison Results</div>
                    <div id="output" style="white-space: pre-wrap;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
