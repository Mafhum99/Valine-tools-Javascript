<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate total pixels and megapixels for screen resolutions">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F5A5; Screen Resolution Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F5A5;</span>
        <h1>Screen Resolution Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">View total pixels and megapixels for common resolutions</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="preset">Resolution Preset</label>
                    <select id="preset" class="form-input">
                        <option value="">-- Select Resolution --</option>
                        <option value="1280x720">720p (HD) - 1280x720</option>
                        <option value="1920x1080">1080p (Full HD) - 1920x1080</option>
                        <option value="2560x1440">1440p (QHD) - 2560x1440</option>
                        <option value="3840x2160">4K (UHD) - 3840x2160</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="calculateBtn" class="btn btn-primary">&#x1F522; Calculate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Resolution Details</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
