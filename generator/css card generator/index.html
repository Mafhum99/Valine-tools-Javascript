<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS card components">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F0CF; CSS Card Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F0CF;</span>
        <h1>CSS Card Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS card components</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="bgColor">Background Color</label>
                    <input type="color" id="bgColor" class="form-input form-input-color" value="#ffffff">
                    <input type="text" id="bgColorText" class="form-input" value="#ffffff" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="borderRadius">Border Radius (px)</label>
                    <input type="range" id="borderRadius" class="form-range" min="0" max="30" value="12">
                    <span id="borderRadiusVal" class="range-value">12px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shadow">Shadow Intensity</label>
                    <input type="range" id="shadow" class="form-range" min="0" max="30" value="10">
                    <span id="shadowVal" class="range-value">10</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="padding">Padding (px)</label>
                    <input type="range" id="padding" class="form-range" min="10" max="50" value="20">
                    <span id="paddingVal" class="range-value">20px</span>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div id="preview" class="card-preview">
                        <h3>Card Title</h3>
                        <p>This is a sample card component with customizable styling.</p>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
