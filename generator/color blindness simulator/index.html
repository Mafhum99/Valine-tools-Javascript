<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Simulate how colors appear with different types of color blindness">
    <meta name="theme-color" content="#2563eb">
    <title>Color Blindness Simulator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Color Blindness Simulator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Simulate how colors appear with different types of color blindness</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="cb-colors">Enter Colors (comma separated hex)</label>
                    <input type="text" id="cb-colors" value="#ff0000,#00ff00,#0000ff,#ffff00,#00ffff,#ff00ff" class="form-input" placeholder="#ff0000,#00ff00,#0000ff">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cb-type">Type of Color Blindness</label>
                    <select id="cb-type" class="form-select">
                        <option value="protanopia">Protanopia (Red-blind)</option>
                        <option value="deuteranopia">Deuteranopia (Green-blind)</option>
                        <option value="tritanopia">Tritanopia (Blue-blind)</option>
                        <option value="achromatopsia">Achromatopsia (Monochrome)</option>
                    </select>
                </div>
                <div class="preview-box" id="cb-preview" style="padding:20px;"></div>
                <div class="result-box" id="cb-output">
                    <div class="result-label">Simulated Colors</div>
                    <code id="cb-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
