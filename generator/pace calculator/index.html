<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate running/cycling pace from distance and time">
    <meta name="theme-color" content="#2563eb">
    <title>🏃 Pace Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🏃</span>
        <h1>Pace Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate your pace from distance and time</p>
            <div class="form-group">
                <label class="form-label" for="distance">Distance</label>
                <input type="number" id="distance" class="form-input" placeholder="e.g., 5" step="any">
            </div>
            <div class="form-group">
                <label class="form-label" for="distUnit">Distance Unit</label>
                <select id="distUnit" class="form-select">
                    <option value="km">Kilometers</option>
                    <option value="mi">Miles</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Time</label>
                <div style="display:flex;gap:0.5rem;">
                    <input type="number" id="hours" class="form-input" placeholder="Hours" min="0" value="0">
                    <input type="number" id="minutes" class="form-input" placeholder="Minutes" min="0" max="59" value="0">
                    <input type="number" id="seconds" class="form-input" placeholder="Seconds" min="0" max="59" value="0">
                </div>
            </div>
            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Calculate Pace</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
