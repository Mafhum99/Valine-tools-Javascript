<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert percentage score to GPA on 4.0 or 5.0 scale with letter grade">
    <meta name="theme-color" content="#2563eb">
    <title>Percentage to GPA Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gpa-result .result-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; }
        .gpa-result .result-card .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .gpa-result .result-card .value { font-size: 1.5rem; font-weight: 700; color: #2563eb; margin-top: 0.25rem; }
        .gpa-result .result-card.primary { border-left: 4px solid #2563eb; background: #eff6ff; }
        .reference-table { margin-top: 1.5rem; }
        .reference-table h3 { font-size: 1rem; color: #374151; margin-bottom: 0.5rem; }
        .gpa-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .gpa-table th, .gpa-table td { padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; text-align: center; }
        .gpa-table th { background: #f3f4f6; font-weight: 600; }
        .gpa-table .current-row { font-weight: 700; }
        .copy-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .btn-copy { padding: 0.5rem 1rem; background: #e5e7eb; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        .btn-copy:hover { background: #d1d5db; }
        #gpa-result { margin-top: 1rem; }
        .scale-toggle { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; padding: 0.75rem; background: #f3f4f6; border-radius: 0.5rem; }
        .scale-toggle label { font-weight: 600; color: #374151; cursor: pointer; }
        .scale-toggle input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎓</span>
        <h1>Percentage to GPA Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert a percentage score to GPA with letter grade on 4.0 or 5.0 scale</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="gpa-percentage">Percentage Score (0–100)</label>
                    <input type="number" id="gpa-percentage" class="form-input" placeholder="e.g. 85" min="0" max="100" step="any">
                </div>
                <div class="scale-toggle">
                    <input type="checkbox" id="gpa-scale5">
                    <label for="gpa-scale5">Use 5.0 Weighted Scale</label>
                </div>
                <div class="btn-group">
                    <button id="gpa-convert" class="btn btn-primary btn-block">Convert</button>
                    <button id="gpa-clear" class="btn btn-secondary">Clear</button>
                </div>
                <div id="gpa-result"></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
