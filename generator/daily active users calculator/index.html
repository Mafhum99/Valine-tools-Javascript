<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Daily Active Users Calculator">
    <meta name="theme-color" content="#2563eb">
    <title>📅 Daily Active Users Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📅</span>
        <h1>Daily Active Users Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Daily Active Users Calculator</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="mon">Monday Users</label>
                    <input type="number" id="mon" class="form-input" placeholder="e.g., 500">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tue">Tuesday Users</label>
                    <input type="number" id="tue" class="form-input" placeholder="e.g., 520">
                </div>
                <div class="form-group">
                    <label class="form-label" for="wed">Wednesday Users</label>
                    <input type="number" id="wed" class="form-input" placeholder="e.g., 510">
                </div>
                <div class="form-group">
                    <label class="form-label" for="thu">Thursday Users</label>
                    <input type="number" id="thu" class="form-input" placeholder="e.g., 530">
                </div>
                <div class="form-group">
                    <label class="form-label" for="fri">Friday Users</label>
                    <input type="number" id="fri" class="form-input" placeholder="e.g., 540">
                </div>
                <div class="form-group">
                    <label class="form-label" for="sat">Saturday Users</label>
                    <input type="number" id="sat" class="form-input" placeholder="e.g., 300">
                </div>
                <div class="form-group">
                    <label class="form-label" for="sun">Sunday Users</label>
                    <input type="number" id="sun" class="form-input" placeholder="e.g., 280">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
