<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Fill template with variables like &#123;name&#125;, &#123;date&#125;">
    <meta name="theme-color" content="#2563eb">
    <title>&#128221; Text Template Engine - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128221;</span>
        <h1>Text Template Engine</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Fill template with variables &#123;name&#125;, &#123;date&#125;, etc.</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="template">Template text (use &#123;variable&#125; for placeholders)</label>
                    <textarea id="template" class="form-textarea" rows="6" placeholder="Hello &#123;name&#125;,&#10;&#10;Your order &#123;order_id&#125; has been shipped on &#123;date&#125;.&#10;&#10;Total: $&#123;amount&#125;"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Variables</label>
                    <div id="variables-container"></div>
                    <button id="add-var" class="btn btn-secondary" style="margin-top:0.5rem; font-size:0.85rem;">+ Add Variable</button>
                </div>

                <div class="btn-group">
                    <button id="render" class="btn btn-primary btn-block">Render Template</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Rendered Text</div>
                    <textarea id="output" class="form-textarea" rows="8" readonly style="white-space: pre-wrap;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
