<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate portfolio grid layouts">
    <meta name="theme-color" content="#2563eb">
    <title>Portfolio Grid Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Portfolio Grid Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate portfolio grid layouts</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="pg-items">Items (title:category, one per line)</label>
                    <textarea id="pg-items" class="form-textarea" rows="3">Brand Redesign:Branding
Mobile App:UI/UX
Website Revamp:Web Design</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-columns">Columns</label>
                    <input type="range" id="pg-columns" min="2" max="4" value="3" class="form-range">
                    <span id="pg-columns-value" class="range-value">3</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-gap">Gap (px)</label>
                    <input type="range" id="pg-gap" min="8" max="32" value="16" class="form-range">
                    <span id="pg-gap-value" class="range-value">16px</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-color">Accent Color</label>
                    <input type="color" id="pg-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="pg-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="preview-box" id="pg-preview" style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:10px;"></div>
                <div class="result-box" id="pg-output">
                    <div class="result-label">HTML Code</div>
                    <code id="pg-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
