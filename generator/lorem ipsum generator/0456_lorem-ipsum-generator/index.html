<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate lorem ipsum placeholder text">
    <meta name="theme-color" content="#2563eb">
    <title>📜 Lorem Ipsum Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📜</span>
        <h1>Lorem Ipsum Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate lorem ipsum placeholder text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="paragraphCount">Number of Paragraphs</label>
                    <input type="number" id="paragraphCount" class="form-input" value="3" min="1" max="50">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sentencesPerParagraph">Sentences per Paragraph</label>
                    <input type="number" id="sentencesPerParagraph" class="form-input" value="4" min="1" max="20">
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Text</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
