<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Solve proportions for the unknown variable">
    <meta name="theme-color" content="#2563eb">
    <title>Proportion Solver - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128220;</span>
        <h1>Proportion Solver</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Solve A/B = C/D for the unknown value. Leave one field blank to solve for it.</p>

            <div class="form-group">
                <label class="form-label" for="prop-a">A</label>
                <input type="number" step="any" id="prop-a" class="form-input" placeholder="e.g. 2">
            </div>
            <div class="form-group">
                <label class="form-label" for="prop-b">B</label>
                <input type="number" step="any" id="prop-b" class="form-input" placeholder="e.g. 3">
            </div>
            <div class="form-group">
                <label class="form-label" for="prop-c">C</label>
                <input type="number" step="any" id="prop-c" class="form-input" placeholder="e.g. 4">
            </div>
            <div class="form-group">
                <label class="form-label" for="prop-d">D (leave blank to solve for this)</label>
                <input type="number" step="any" id="prop-d" class="form-input" placeholder="Leave blank to solve">
            </div>

            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Solve</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>

            <div class="result-box" id="result">
                <div class="result-label">Result</div>
                <div id="output">-</div>
            </div>

            <div class="btn-group">
                <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
