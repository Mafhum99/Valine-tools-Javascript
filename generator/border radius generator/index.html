<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS border radius values">
    <meta name="theme-color" content="#2563eb">
    <title>&#128306; Border Radius Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128306;</span>
        <h1>Border Radius Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS border radius values</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="uniform-mode" checked>
                        Uniform Radius (all corners)
                    </label>
                </div>

                <div id="uniform-controls">
                    <div class="form-group">
                        <label class="form-label" for="uniform-radius">Radius (px)</label>
                        <div class="range-with-value">
                            <input type="range" id="uniform-radius" min="0" max="100" value="12" class="form-range">
                            <span id="uniform-radius-value" class="range-value">12px</span>
                        </div>
                    </div>
                </div>

                <div id="corner-controls" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="tl">Top-Left (px)</label>
                            <div class="range-with-value">
                                <input type="range" id="tl" min="0" max="100" value="12" class="form-range">
                                <span id="tl-value" class="range-value">12px</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="tr">Top-Right (px)</label>
                            <div class="range-with-value">
                                <input type="range" id="tr" min="0" max="100" value="12" class="form-range">
                                <span id="tr-value" class="range-value">12px</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="br">Bottom-Right (px)</label>
                            <div class="range-with-value">
                                <input type="range" id="br" min="0" max="100" value="12" class="form-range">
                                <span id="br-value" class="range-value">12px</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="bl">Bottom-Left (px)</label>
                            <div class="range-with-value">
                                <input type="range" id="bl" min="0" max="100" value="12" class="form-range">
                                <span id="bl-value" class="range-value">12px</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="preview-area border-radius-preview-area">
                    <div class="border-radius-preview" id="radius-preview"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="preset-circle" class="btn btn-secondary">Circle</button>
                    <button id="preset-pill" class="btn btn-secondary">Pill</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
