<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS grid layouts">
    <meta name="theme-color" content="#2563eb">
    <title>&#x229E; CSS Grid Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x229E;</span>
        <h1>CSS Grid Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS grid layouts with grid-template</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="columns">Columns (e.g., 1fr 1fr 1fr or repeat(3, 1fr))</label>
                    <input type="text" id="columns" class="form-input" value="repeat(3, 1fr)" placeholder="repeat(3, 1fr)">
                </div>

                <div class="form-group">
                    <label class="form-label" for="rows">Rows (e.g., auto or 100px 200px)</label>
                    <input type="text" id="rows" class="form-input" value="auto" placeholder="auto">
                </div>

                <div class="form-group">
                    <label class="form-label" for="gap">Gap (px)</label>
                    <input type="range" id="gap" class="form-range" min="0" max="50" value="10">
                    <span id="gapVal" class="range-value">10px</span>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div id="preview" class="grid-preview">
                        <div class="grid-item">1</div>
                        <div class="grid-item">2</div>
                        <div class="grid-item">3</div>
                        <div class="grid-item">4</div>
                        <div class="grid-item">5</div>
                        <div class="grid-item">6</div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
