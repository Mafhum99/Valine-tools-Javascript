<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS badge components">
    <meta name="theme-color" content="#2563eb">
    <title>Badge Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Badge Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS badge components</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="badge-text">Badge Text</label>
                    <input type="text" id="badge-text" value="New" class="form-input" placeholder="Badge text">
                </div>
                <div class="form-group">
                    <label class="form-label" for="badge-variant">Variant</label>
                    <select id="badge-variant" class="form-select">
                        <option value="solid">Solid</option>
                        <option value="outline">Outline</option>
                        <option value="soft">Soft/Light</option>
                        <option value="pill">Pill</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="badge-color">Badge Color</label>
                    <input type="color" id="badge-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="badge-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="badge-size">Font Size (px)</label>
                    <input type="range" id="badge-size" min="10" max="20" value="12" class="form-range">
                    <span id="badge-size-value" class="range-value">12px</span>
                </div>
                <div class="preview-box" id="badge-preview" style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:20px;"></div>
                <div class="result-box" id="badge-output">
                    <div class="result-label">HTML Code</div>
                    <code id="badge-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                    <button id="random" class="btn btn-secondary">Random Color</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
