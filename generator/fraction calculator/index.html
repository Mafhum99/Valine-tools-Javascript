<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x2797; Fraction Calculator - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x2797;</span>
        <h1>Fraction Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Add, subtract, multiply, or divide fractions</p>
            <div id="tool-content">
                <div style="display:flex;gap:0.5rem;align-items:flex-end;flex-wrap:wrap;">
                    <div style="display:flex;flex-direction:column;gap:0.25rem;"><label class="form-label" for="num1">Num1</label><input type="number" id="num1" class="form-input" placeholder="1" style="width:80px;"></div>
                    <div style="padding-bottom:0.5rem;font-size:1.5rem;">/</div>
                    <div style="display:flex;flex-direction:column;gap:0.25rem;"><label class="form-label" for="den1">Den1</label><input type="number" id="den1" class="form-input" placeholder="2" style="width:80px;"></div>
                    <div style="display:flex;flex-direction:column;gap:0.25rem;"><label class="form-label" for="op">Op</label><select id="op" class="form-input" style="width:80px;"><option value="+">+</option><option value="-">-</option><option value="*">&times;</option><option value="/">/</option></select></div>
                    <div style="display:flex;flex-direction:column;gap:0.25rem;"><label class="form-label" for="num2">Num2</label><input type="number" id="num2" class="form-input" placeholder="1" style="width:80px;"></div>
                    <div style="padding-bottom:0.5rem;font-size:1.5rem;">/</div>
                    <div style="display:flex;flex-direction:column;gap:0.25rem;"><label class="form-label" for="den2">Den2</label><input type="number" id="den2" class="form-input" placeholder="4" style="width:80px;"></div>
                </div>
                <div class="btn-group"><button id="calculateBtn" class="btn btn-primary">&#x1F522; Calculate</button><button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
