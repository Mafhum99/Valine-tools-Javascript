<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS transition properties">
    <meta name="theme-color" content="#2563eb">
    <title>&#128260; CSS Transition Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128260;</span>
        <h1>CSS Transition Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS transition properties</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="transition-property">Property</label>
                    <select id="transition-property" class="form-select">
                        <option value="all">All Properties</option>
                        <option value="background-color">Background Color</option>
                        <option value="color">Text Color</option>
                        <option value="transform">Transform</option>
                        <option value="opacity">Opacity</option>
                        <option value="box-shadow">Box Shadow</option>
                        <option value="border-color">Border Color</option>
                        <option value="width">Width</option>
                        <option value="height">Height</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="transition-duration">Duration (s)</label>
                        <div class="range-with-value">
                            <input type="range" id="transition-duration" min="0.05" max="3" step="0.05" value="0.3" class="form-range">
                            <span id="transition-duration-value" class="range-value">0.30s</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="transition-easing">Easing</label>
                        <select id="transition-easing" class="form-select">
                            <option value="ease">Ease</option>
                            <option value="linear">Linear</option>
                            <option value="ease-in">Ease In</option>
                            <option value="ease-out">Ease Out</option>
                            <option value="ease-in-out">Ease In Out</option>
                            <option value="step-start">Step Start</option>
                            <option value="step-end">Step End</option>
                            <option value="cubic-bezier(0.68, -0.55, 0.265, 1.55)">Back Out</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="transition-delay">Delay (s)</label>
                    <div class="range-with-value">
                        <input type="range" id="transition-delay" min="0" max="2" step="0.05" value="0" class="form-range">
                        <span id="transition-delay-value" class="range-value">0s</span>
                    </div>
                </div>

                <div class="preview-area transition-preview-area">
                    <div class="transition-preview-box" id="transition-preview">Hover Me</div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="preset-smooth" class="btn btn-secondary">Smooth Preset</button>
                    <button id="preset-snap" class="btn btn-secondary">Snap Preset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
