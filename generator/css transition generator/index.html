<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS transitions">
    <meta name="theme-color" content="#2563eb">
    <title>&#x23F1; CSS Transition Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x23F1;</span>
        <h1>CSS Transition Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS transition properties</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="property">Property</label>
                    <select id="property" class="form-select">
                        <option value="all">All</option>
                        <option value="opacity">Opacity</option>
                        <option value="transform">Transform</option>
                        <option value="background-color">Background Color</option>
                        <option value="color">Color</option>
                        <option value="width">Width</option>
                        <option value="height">Height</option>
                        <option value="box-shadow">Box Shadow</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="duration">Duration (s)</label>
                    <input type="number" id="duration" class="form-input" value="0.3" min="0.01" max="10" step="0.1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="timingFunction">Timing Function</label>
                    <select id="timingFunction" class="form-select">
                        <option value="ease">Ease</option>
                        <option value="linear">Linear</option>
                        <option value="ease-in">Ease In</option>
                        <option value="ease-out">Ease Out</option>
                        <option value="ease-in-out">Ease In Out</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="delay">Delay (s)</label>
                    <input type="number" id="delay" class="form-input" value="0" min="0" max="5" step="0.1">
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview (hover to see transition)</div>
                    <div class="preview-container">
                        <div id="preview" class="transition-preview">Hover Me</div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
