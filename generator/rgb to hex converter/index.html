<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert RGB color values to HEX color codes">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F504; RGB to Hex Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F504;</span>
        <h1>RGB to Hex Converter</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert RGB color values to HEX color codes</p>

            <div id="tool-content">
                <div style="display:flex;gap:0.5rem;">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label" for="r">R (0-255)</label>
                        <input type="number" id="r" class="form-input" value="59" min="0" max="255">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label" for="g">G (0-255)</label>
                        <input type="number" id="g" class="form-input" value="130" min="0" max="255">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label" for="b">B (0-255)</label>
                        <input type="number" id="b" class="form-input" value="246" min="0" max="255">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="convert" class="btn btn-primary btn-block">Convert</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">
                        <div id="color-preview" style="width:100%;height:60px;border-radius:8px;margin-bottom:1rem;background-color:#3b82f6;"></div>
                        <div class="result-grid" id="result-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
