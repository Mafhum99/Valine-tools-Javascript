<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate safety stock levels">
    <meta name="theme-color" content="#2563eb">
    <title>Safety Stock Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F6E1;&#xFE0F;</span>
        <h1>Safety Stock Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate safety stock using (Max Daily Usage &times; Max Lead Time) - (Avg Daily Usage &times; Avg Lead Time).</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="max_daily_usage">Max Daily Usage</label>
                    <input type="number" id="max_daily_usage" class="form-input" placeholder="e.g. 120">
                </div>
                <div class="form-group">
                    <label class="form-label" for="avg_daily_usage">Avg Daily Usage</label>
                    <input type="number" id="avg_daily_usage" class="form-input" placeholder="e.g. 80">
                </div>
                <div class="form-group">
                    <label class="form-label" for="max_lead_time">Max Lead Time (days)</label>
                    <input type="number" id="max_lead_time" class="form-input" placeholder="e.g. 14">
                </div>
                <div class="form-group">
                    <label class="form-label" for="avg_lead_time">Avg Lead Time (days)</label>
                    <input type="number" id="avg_lead_time" class="form-input" placeholder="e.g. 10">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
