<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Solve ODEs using Euler's method">
    <meta name="theme-color" content="#2563eb">
    <title>📈 Euler's Method Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📈</span>
        <h1>Euler's Method Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Solve ODEs using Euler's method</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="ode-func">ODE Function f(t, y)</label>
                    <input type="text" id="ode-func" class="form-input" placeholder="e.g., -2*t*y, t+y, t*y">
                </div>

                <div class="form-group">
                    <label class="form-label" for="init-cond">Initial Condition y(t₀) = y₀</label>
                    <input type="number" id="init-cond" class="form-input" placeholder="e.g., 1" step="any">
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label" for="start-time">Start Time (t₀)</label>
                        <input type="number" id="start-time" class="form-input" placeholder="0" step="any" value="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="end-time">End Time (t₁)</label>
                        <input type="number" id="end-time" class="form-input" placeholder="1" step="any" value="1">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="step-size">Step Size (h)</label>
                    <input type="number" id="step-size" class="form-input" placeholder="0.1" step="any" value="0.1" min="0.0001">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <pre id="output" class="result-content" style="text-align: left; white-space: pre-wrap; font-family: monospace; font-size: 0.875rem;">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
