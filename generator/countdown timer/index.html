<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Countdown timer to a target date and time">
    <meta name="theme-color" content="#2563eb">
    <title>&#x23F3; Countdown Timer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x23F3;</span>
        <h1>Countdown Timer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Countdown timer to a target date and time</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="targetDate">Target Date & Time</label>
                    <input type="datetime-local" id="targetDate" class="form-input">
                </div>

                <div class="btn-group">
                    <button id="start" class="btn btn-primary btn-block">Start</button>
                    <button id="stop" class="btn btn-secondary">Stop</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Countdown</div>
                    <div id="output">
                        <div class="countdown-display" style="text-align:center;padding:1.5rem 0;">
                            <div style="font-size:2.5rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:2px;" id="countdown">--:--:--:--</div>
                            <div class="countdown-labels" style="display:flex;justify-content:center;gap:1.5rem;margin-top:0.5rem;color:#6b7280;">
                                <span>Days</span><span>Hours</span><span>Min</span><span>Sec</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .countdown-expired { color: #ef4444 !important; }
        .countdown-active { color: #10b981; }
    </style>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
