<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate gradient color combinations">
    <meta name="theme-color" content="#2563eb">
    <title>Gradient Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Gradient Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate gradient color combinations</p>

            <div id="tool-content">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="color1">Start Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color1" value="#2563eb" class="color-picker">
                            <input type="text" id="color1-text" value="#2563eb" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="color2">End Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color2" value="#7c3aed" class="color-picker">
                            <input type="text" id="color2-text" value="#7c3aed" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="direction">Direction</label>
                    <select id="direction" class="form-select">
                        <option value="to right">Left to Right</option>
                        <option value="to left">Right to Left</option>
                        <option value="to bottom">Top to Bottom</option>
                        <option value="to top">Bottom to Top</option>
                        <option value="to bottom right" selected>Diagonal (Top-Left to Bottom-Right)</option>
                        <option value="to bottom left">Diagonal (Top-Right to Bottom-Left)</option>
                        <option value="to top right">Diagonal (Bottom-Left to Top-Right)</option>
                        <option value="to top left">Diagonal (Bottom-Right to Top-Left)</option>
                    </select>
                </div>

                <div class="preview-box" id="gradient-preview"></div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code">background: linear-gradient(to bottom right, #2563eb, #7c3aed);</code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
