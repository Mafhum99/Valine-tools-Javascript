<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Find words that rhyme with input">
    <meta name="theme-color" content="#2563eb">
    <title>&#127926; Rhyming Dictionary - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127926;</span>
        <h1>Rhyming Dictionary</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Find words that rhyme with input</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Enter a word</label>
                    <input type="text" id="input" class="form-input" placeholder="e.g., love, time, dream...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="rhymeType">Rhyme Type</label>
                    <select id="rhymeType" class="form-select">
                        <option value="perfect">Perfect Rhymes (same ending sound)</option>
                        <option value="near">Near Rhymes (similar sounds)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="find" class="btn btn-primary btn-block">Find Rhymes</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Rhyming Words (<span id="count">0</span>)</div>
                    <div id="output" style="white-space: pre-wrap; line-height:2;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Rhymes</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
