<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS repeating diagonal stripe patterns">
    <meta name="theme-color" content="#2563eb">
    <title>Pattern Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Pattern Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS repeating diagonal stripe patterns</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="pattern-color1">Primary Color</label>
                    <input type="color" id="pattern-color1" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="pattern-color1-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="pattern-color2">Secondary Color</label>
                    <input type="color" id="pattern-color2" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="pattern-color2-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="pattern-size">Stripe Size (px)</label>
                    <input type="range" id="pattern-size" min="4" max="80" value="20" class="form-range">
                    <span id="pattern-size-value" class="range-value">20px</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pattern-angle">Angle (degrees)</label>
                    <input type="range" id="pattern-angle" min="0" max="360" value="45" class="form-range">
                    <span id="pattern-angle-value" class="range-value">45deg</span>
                </div>

                <div class="preview-box" id="pattern-preview" style="width:100%;height:200px;border-radius:var(--radius);border:1px solid var(--gray-300);"></div>

                <div class="result-box" id="pattern-output">
                    <div class="result-label">CSS Code</div>
                    <code id="pattern-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
