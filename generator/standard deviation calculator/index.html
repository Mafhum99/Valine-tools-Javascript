<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate sample and population standard deviation">
    <meta name="theme-color" content="#2563eb">
    <title>Standard Deviation Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#9776;</span>
        <h1>Standard Deviation Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate both sample and population standard deviation of a comma-separated dataset.</p>

            <div class="form-group">
                <label class="form-label" for="dataset">Data Values (comma-separated)</label>
                <input type="text" id="dataset" class="form-input" placeholder="e.g. 10, 20, 30, 40, 50">
            </div>

            <div class="btn-group">
                <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>

            <div class="result-box" id="result">
                <div class="result-label">Result</div>
                <div id="output">-</div>
            </div>

            <div class="btn-group">
                <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
