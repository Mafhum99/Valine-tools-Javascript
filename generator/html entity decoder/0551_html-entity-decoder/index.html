<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Decode HTML entities to characters">
    <meta name="theme-color" content="#2563eb">
    <title>&#128275; HTML Entity Decoder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128275;</span>
        <h1>HTML Entity Decoder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Decode HTML entities to characters</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text with HTML entities</label>
                    <textarea id="input" class="form-textarea" rows="6" placeholder="e.g., &amp;lt;hello&amp;gt; &amp;amp; &#38; &#60;world&#62;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="decode" class="btn btn-primary btn-block">Decode Entities</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Decoded Result</div>
                    <div id="output" style="white-space: pre-wrap; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>

                <div class="form-group mt-3">
                    <label class="form-label">Common HTML Entities Reference</label>
                    <div id="reference" style="font-size: 0.85rem; color: #6b7280; line-height: 1.8;">
                        &amp;amp; &#8594; &amp; | &amp;lt; &#8594; &lt; | &amp;gt; &#8594; &gt; | &amp;quot; &#8594; " | &amp;#39; &#8594; ' | &amp;nbsp; &#8594; (space) | &amp;copy; &#8594; &copy; | &amp;reg; &#8594; &reg; | &amp;trade; &#8594; &trade;
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
