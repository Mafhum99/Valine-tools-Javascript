<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS transform effects">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F504; CSS Transform Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F504;</span>
        <h1>CSS Transform Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS transform effects</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="type">Transform Type</label>
                    <select id="type" class="form-select">
                        <option value="rotate">Rotate</option>
                        <option value="scale">Scale</option>
                        <option value="skew">Skew</option>
                        <option value="translate">Translate</option>
                    </select>
                </div>

                <div class="form-group" id="rotateParams">
                    <label class="form-label" for="rotateVal">Rotation (deg)</label>
                    <input type="range" id="rotateVal" class="form-range" min="0" max="360" value="45">
                    <span id="rotateValDisplay" class="range-value">45deg</span>
                </div>

                <div class="form-group" id="scaleParams" style="display:none;">
                    <label class="form-label" for="scaleX">Scale X</label>
                    <input type="range" id="scaleX" class="form-range" min="0.1" max="3" value="1.5" step="0.1">
                    <span id="scaleXVal" class="range-value">1.5</span>
                    <label class="form-label" for="scaleY">Scale Y</label>
                    <input type="range" id="scaleY" class="form-range" min="0.1" max="3" value="1.5" step="0.1">
                    <span id="scaleYVal" class="range-value">1.5</span>
                </div>

                <div class="form-group" id="skewParams" style="display:none;">
                    <label class="form-label" for="skewX">Skew X (deg)</label>
                    <input type="range" id="skewX" class="form-range" min="-45" max="45" value="10">
                    <span id="skewXVal" class="range-value">10deg</span>
                    <label class="form-label" for="skewY">Skew Y (deg)</label>
                    <input type="range" id="skewY" class="form-range" min="-45" max="45" value="10">
                    <span id="skewYVal" class="range-value">10deg</span>
                </div>

                <div class="form-group" id="translateParams" style="display:none;">
                    <label class="form-label" for="translateX">Translate X (px)</label>
                    <input type="range" id="translateX" class="form-range" min="-100" max="100" value="20">
                    <span id="translateXVal" class="range-value">20px</span>
                    <label class="form-label" for="translateY">Translate Y (px)</label>
                    <input type="range" id="translateY" class="form-range" min="-100" max="100" value="20">
                    <span id="translateYVal" class="range-value">20px</span>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview" class="transform-preview">Box</div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
