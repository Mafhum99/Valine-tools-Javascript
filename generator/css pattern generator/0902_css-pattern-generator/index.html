<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS repeating patterns (stripes, dots, checkerboard)">
    <meta name="theme-color" content="#2563eb">
    <title>CSS Pattern Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>CSS Pattern Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS repeating patterns with different styles</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="pattern-type">Pattern Type</label>
                    <select id="pattern-type" class="form-select">
                        <option value="stripes">Stripes</option>
                        <option value="dots">Dots</option>
                        <option value="checkerboard">Checkerboard</option>
                        <option value="crosshatch">Crosshatch</option>
                        <option value="zigzag">Zigzag</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="css-color1">Primary Color</label>
                    <input type="color" id="css-color1" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="css-color1-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="css-color2">Background Color</label>
                    <input type="color" id="css-color2" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="css-color2-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="css-pattern-size">Size (px)</label>
                    <input type="range" id="css-pattern-size" min="4" max="60" value="20" class="form-range">
                    <span id="css-pattern-size-value" class="range-value">20px</span>
                </div>

                <div class="preview-box" id="css-pattern-preview" style="width:100%;height:200px;border-radius:var(--radius);border:1px solid var(--gray-300);"></div>

                <div class="result-box" id="css-pattern-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-pattern-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="random" class="btn btn-secondary">Random Colors</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
