<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS background patterns">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F3B2; CSS Pattern Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F3B2;</span>
        <h1>CSS Pattern Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS background patterns</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="patternType">Pattern Type</label>
                    <select id="patternType" class="form-select">
                        <option value="stripes">Stripes</option>
                        <option value="dots">Dots</option>
                        <option value="checkers">Checkers</option>
                        <option value="zigzag">Zigzag</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="color1">Color 1</label>
                    <input type="color" id="color1" class="form-input form-input-color" value="#2563eb">
                    <input type="text" id="color1Text" class="form-input" value="#2563eb" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="color2">Color 2</label>
                    <input type="color" id="color2" class="form-input form-input-color" value="#ffffff">
                    <input type="text" id="color2Text" class="form-input" value="#ffffff" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="size">Size (px)</label>
                    <input type="range" id="size" class="form-range" min="5" max="50" value="20">
                    <span id="sizeVal" class="range-value">20px</span>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div id="preview" class="pattern-preview"></div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
