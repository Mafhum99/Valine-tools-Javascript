<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS filter effects">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F50D; CSS Filter Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F50D;</span>
        <h1>CSS Filter Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS filter effects</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label">Blur (px)</label>
                    <input type="range" id="blur" class="form-range" min="0" max="20" value="0" step="0.5">
                    <span id="blurVal" class="range-value">0px</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Brightness</label>
                    <input type="range" id="brightness" class="form-range" min="0" max="300" value="100">
                    <span id="brightnessVal" class="range-value">100%</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Contrast</label>
                    <input type="range" id="contrast" class="form-range" min="0" max="300" value="100">
                    <span id="contrastVal" class="range-value">100%</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Grayscale</label>
                    <input type="range" id="grayscale" class="form-range" min="0" max="100" value="0">
                    <span id="grayscaleVal" class="range-value">0%</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Sepia</label>
                    <input type="range" id="sepia" class="form-range" min="0" max="100" value="0">
                    <span id="sepiaVal" class="range-value">0%</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Saturate</label>
                    <input type="range" id="saturate" class="form-range" min="0" max="300" value="100">
                    <span id="saturateVal" class="range-value">100%</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Hue Rotate (deg)</label>
                    <input type="range" id="hueRotate" class="form-range" min="0" max="360" value="0">
                    <span id="hueRotateVal" class="range-value">0deg</span>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview" class="filter-preview"></div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
