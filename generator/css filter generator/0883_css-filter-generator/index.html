<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS filter effects">
    <meta name="theme-color" content="#2563eb">
    <title>CSS Filter Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>CSS Filter Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS filter effects</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="blur">Blur (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="blur" min="0" max="20" step="0.5" value="0" class="form-range">
                        <span id="blur-value" class="range-value">0px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="brightness">Brightness</label>
                    <div class="range-with-value">
                        <input type="range" id="brightness" min="0" max="300" step="5" value="100" class="form-range">
                        <span id="brightness-value" class="range-value">100%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="contrast">Contrast</label>
                    <div class="range-with-value">
                        <input type="range" id="contrast" min="0" max="300" step="5" value="100" class="form-range">
                        <span id="contrast-value" class="range-value">100%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="saturate">Saturate</label>
                    <div class="range-with-value">
                        <input type="range" id="saturate" min="0" max="300" step="5" value="100" class="form-range">
                        <span id="saturate-value" class="range-value">100%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="hue-rotate">Hue Rotate (degrees)</label>
                    <div class="range-with-value">
                        <input type="range" id="hue-rotate" min="0" max="360" step="1" value="0" class="form-range">
                        <span id="hue-rotate-value" class="range-value">0deg</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="opacity">Opacity</label>
                    <div class="range-with-value">
                        <input type="range" id="opacity" min="0" max="100" step="1" value="100" class="form-range">
                        <span id="opacity-value" class="range-value">100%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="sepia">Sepia</label>
                    <div class="range-with-value">
                        <input type="range" id="sepia" min="0" max="100" step="1" value="0" class="form-range">
                        <span id="sepia-value" class="range-value">0%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="grayscale">Grayscale</label>
                    <div class="range-with-value">
                        <input type="range" id="grayscale" min="0" max="100" step="1" value="0" class="form-range">
                        <span id="grayscale-value" class="range-value">0%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="invert">Invert</label>
                    <div class="range-with-value">
                        <input type="range" id="invert" min="0" max="100" step="1" value="0" class="form-range">
                        <span id="invert-value" class="range-value">0%</span>
                    </div>
                </div>

                <div class="preview-box" id="preview-container">
                    <div class="preview-element" id="preview"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                    <button id="reset" class="btn btn-secondary">Reset</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
