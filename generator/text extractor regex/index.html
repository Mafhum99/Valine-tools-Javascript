<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Extract text matching regex patterns">
    <meta name="theme-color" content="#2563eb">
    <title>&#128269; Text Extractor (Regex) - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128269;</span>
        <h1>Text Extractor (Regex)</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Extract text matching regex patterns</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Source text</label>
                    <textarea id="input" class="form-textarea" rows="5" placeholder="Paste text to extract from..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pattern">Regex Pattern</label>
                    <input type="text" id="pattern" class="form-input" placeholder='e.g., \b\w+@\w+\.\w+\b for emails'>
                </div>

                <div class="form-group">
                    <label class="form-label" for="flags">Flags</label>
                    <select id="flags" class="form-select">
                        <option value="gi">Global + Case Insensitive (gi)</option>
                        <option value="g">Global only (g)</option>
                        <option value="i">Case Insensitive only (i)</option>
                        <option value="">None</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="extract" class="btn btn-primary btn-block">Extract Matches</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Extracted Matches (<span id="count">0</span>)</div>
                    <textarea id="output" class="form-textarea" rows="8" readonly style="white-space: pre-wrap;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Matches</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
