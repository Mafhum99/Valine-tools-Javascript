<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate tetradic color schemes">
    <meta name="theme-color" content="#2563eb">
    <title>Tetradic Color Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🟦</span>
        <h1>Tetradic Color Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate 4-color tetradic palette at 90 degree intervals</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color-input">Pick a Color</label>
                    <input type="color" id="color-input" class="form-input" value="#3b82f6" style="width: 100%; height: 60px; padding: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label class="form-label" for="hex-input">Or enter HEX value</label>
                    <input type="text" id="hex-input" class="form-input" placeholder="#3b82f6" value="#3b82f6" maxlength="7">
                </div>

                <div class="color-quad-container">
                    <div class="color-quad-item">
                        <div class="color-preview" id="color1-preview"></div>
                        <div class="color-pair-label">Color 1 (0)</div>
                        <div class="color-value-item">
                            <span class="color-value" id="color1-hex"></span>
                            <button class="copy-btn" data-target="color1-hex">📋</button>
                        </div>
                    </div>
                    <div class="color-quad-item">
                        <div class="color-preview" id="color2-preview"></div>
                        <div class="color-pair-label">Color 2 (+90)</div>
                        <div class="color-value-item">
                            <span class="color-value" id="color2-hex"></span>
                            <button class="copy-btn" data-target="color2-hex">📋</button>
                        </div>
                    </div>
                    <div class="color-quad-item">
                        <div class="color-preview" id="color3-preview"></div>
                        <div class="color-pair-label">Color 3 (+180)</div>
                        <div class="color-value-item">
                            <span class="color-value" id="color3-hex"></span>
                            <button class="copy-btn" data-target="color3-hex">📋</button>
                        </div>
                    </div>
                    <div class="color-quad-item">
                        <div class="color-preview" id="color4-preview"></div>
                        <div class="color-pair-label">Color 4 (+270)</div>
                        <div class="color-value-item">
                            <span class="color-value" id="color4-hex"></span>
                            <button class="copy-btn" data-target="color4-hex">📋</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
