<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Add or subtract time from date">
    <meta name="theme-color" content="#2563eb">
    <title>➕ Date Add/Subtract Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">➕</span>
        <h1>Date Add/Subtract Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Add or subtract time from date</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Start Date</label>
                    <input type="date" id="input" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label" for="operation">Operation</label>
                    <select id="operation" class="form-input">
                        <option value="add">Add (+)</option>
                        <option value="subtract">Subtract (−)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="amount">Amount</label>
                    <input type="number" id="amount" class="form-input" value="1" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="unit">Unit</label>
                    <select id="unit" class="form-input">
                        <option value="days">Days</option>
                        <option value="weeks">Weeks</option>
                        <option value="months">Months</option>
                        <option value="years">Years</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">➕ Calculate Date</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result Date</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
