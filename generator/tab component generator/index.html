<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate tab components">
    <meta name="theme-color" content="#2563eb">
    <title>Tab Component Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Tab Component Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate tab components</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="tab-names">Tab Names (comma separated)</label>
                    <input type="text" id="tab-names" value="Home, Profile, Settings, Messages" class="form-input" placeholder="Tab 1, Tab 2, Tab 3">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tab-color">Active Color</label>
                    <input type="color" id="tab-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="tab-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tab-style">Style</label>
                    <select id="tab-style" class="form-select">
                        <option value="underline">Underline</option>
                        <option value="pill">Pill Tabs</option>
                        <option value="bordered">Bordered</option>
                        <option value="boxed">Boxed/Filled</option>
                    </select>
                </div>
                <div class="preview-box" id="tab-preview" style="padding:20px;font-family:sans-serif;"></div>
                <div class="result-box" id="tab-output">
                    <div class="result-label">HTML Code</div>
                    <code id="tab-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
