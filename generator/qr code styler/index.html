<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Style QR codes with colors and shapes">
    <meta name="theme-color" content="#2563eb">
    <title>QR Code Styler - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f3a8;</span>
        <h1>QR Code Styler</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Style QR codes with colors and shapes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="stylerQRInput">Text or URL</label>
                    <input type="text" id="stylerQRInput" class="form-input" placeholder="https://example.com" value="https://example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerPatternStyle">Pattern Style</label>
                    <select id="stylerPatternStyle" class="form-input">
                        <option value="square">Square</option>
                        <option value="rounded">Rounded</option>
                        <option value="circle">Circle Dots</option>
                        <option value="diamond">Diamond</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerModuleColor">Module Color</label>
                    <input type="color" id="stylerModuleColor" class="form-color" value="#2563eb">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerBgColor">Background Color</label>
                    <input type="color" id="stylerBgColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerFinderColor">Finder Pattern Color</label>
                    <input type="color" id="stylerFinderColor" class="form-color" value="#1e40af">
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerModuleSize">Module Size (px)</label>
                    <input type="range" id="stylerModuleSize" class="form-range" min="4" max="16" value="8">
                    <span id="stylerModuleSizeValue" class="range-value">8</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="stylerMargin">Margin (modules)</label>
                    <input type="range" id="stylerMargin" class="form-range" min="2" max="8" value="4">
                    <span id="stylerMarginValue" class="range-value">4</span>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Styled QR</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="qrPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">SVG Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy SVG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
