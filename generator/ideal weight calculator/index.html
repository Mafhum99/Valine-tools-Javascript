<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate ideal body weight">
    <meta name="theme-color" content="#2563eb">
    <title>⚖️ Ideal Weight Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">⚖️</span>
        <h1>Ideal Weight Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate ideal body weight</p>
            
            <div id="tool-content">
                <!-- Tool content goes here -->
                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <div style="display:flex;gap:1rem;margin-bottom:0.5rem;">
                        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="radio" name="gender" id="gender-male" checked> Male
                        </label>
                        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                            <input type="radio" name="gender" id="gender-female"> Female
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="height">Height</label>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="number" id="height" class="form-input" style="flex:1;" placeholder="Enter height" step="any">
                        <select id="unit" class="form-input" style="width:80px;">
                            <option value="cm">cm</option>
                            <option value="in">in</option>
                        </select>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate Ideal Weight</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                
                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">Enter your gender and height to calculate ideal weight</div>
                </div>
                
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
