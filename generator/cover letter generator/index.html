<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate professional cover letters">
    <meta name="theme-color" content="#2563eb">
    <title>✉️ Cover Letter Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">✉️</span>
        <h1>Cover Letter Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate professional cover letters</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="full-name">Your Full Name</label>
                    <input type="text" id="full-name" class="form-input" placeholder="e.g., John Doe">
                </div>

                <div class="form-group">
                    <label class="form-label" for="company-name">Company Name</label>
                    <input type="text" id="company-name" class="form-input" placeholder="e.g., Google, Microsoft...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="position">Position Applying For</label>
                    <input type="text" id="position" class="form-input" placeholder="e.g., Senior Software Engineer">
                </div>

                <div class="form-group">
                    <label class="form-label" for="key-skills">Key Skills / Experience</label>
                    <textarea id="key-skills" class="form-textarea" placeholder="List your key skills or notable achievements (one per line)..." rows="4"></textarea>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Cover Letter</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
