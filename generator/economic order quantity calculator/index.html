<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate optimal order quantity (EOQ)">
    <meta name="theme-color" content="#2563eb">
    <title>Economic Order Quantity Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4E6;</span>
        <h1>Economic Order Quantity Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate optimal order quantity using sqrt((2 &times; Demand &times; Order Cost) / Holding Cost).</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="annual_demand">Annual Demand</label>
                    <input type="number" id="annual_demand" class="form-input" placeholder="e.g. 10000">
                </div>
                <div class="form-group">
                    <label class="form-label" for="order_cost">Order Cost</label>
                    <input type="number" id="order_cost" class="form-input" placeholder="e.g. 50">
                </div>
                <div class="form-group">
                    <label class="form-label" for="holding_cost_per_unit">Holding Cost per Unit</label>
                    <input type="number" id="holding_cost_per_unit" class="form-input" placeholder="e.g. 2">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
