<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert CSV data to JSON format">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F504; CSV to JSON Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F504;</span>
        <h1>CSV to JSON Converter</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert CSV data to JSON format</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">CSV Input</label>
                    <textarea id="input" class="form-textarea" rows="8" placeholder="name,age,city&#10;John,30,New York&#10;Jane,25,London"></textarea>
                </div>

                <div class="btn-group">
                    <button id="convert" class="btn btn-primary">&#x1F504; Convert</button>
                    <button id="clear" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
