<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1F522; Number Base Converter - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F522;</span>
        <h1>Number Base Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert numbers between different bases</p>
            <div id="tool-content">
                <div class="form-group"><label class="form-label" for="number">Number</label><input type="text" id="number" class="form-input" placeholder="255"></div>
                <div class="form-group"><label class="form-label" for="fromBase">From Base</label><select id="fromBase" class="form-input"><option value="2">Binary (2)</option><option value="8">Octal (8)</option><option value="10" selected>Decimal (10)</option><option value="16">Hexadecimal (16)</option></select></div>
                <div class="form-group"><label class="form-label" for="toBase">To Base</label><select id="toBase" class="form-input"><option value="2">Binary (2)</option><option value="8">Octal (8)</option><option value="10">Decimal (10)</option><option value="16" selected>Hexadecimal (16)</option></select></div>
                <div class="btn-group"><button id="convertBtn" class="btn btn-primary">&#x1F504; Convert</button><button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
