<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate law of sines">
    <meta name="theme-color" content="#2563eb">
    <title>📏 Law of Sines Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header"><span class="tool-header-icon">📏</span><h1>Law of Sines Calculator</h1></header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Find missing sides or angles using a/sin(A) = b/sin(B) = c/sin(C)</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="mode">Mode</label>
                    <select id="mode" class="form-select">
                        <option value="find-side">Find side (given one side + 2 angles)</option>
                        <option value="find-angle">Find angle (given 2 sides + 1 angle)</option>
                        <option value="ssa">SSA Ambiguous Case</option>
                    </select>
                </div>
                <div class="form-group"><label class="form-label" for="side-a">Side a</label><input type="number" step="any" id="side-a" class="form-input" placeholder="Side a"></div>
                <div class="form-group"><label class="form-label" for="side-b">Side b</label><input type="number" step="any" id="side-b" class="form-input" placeholder="Side b"></div>
                <div class="form-group"><label class="form-label" for="side-c">Side c</label><input type="number" step="any" id="side-c" class="form-input" placeholder="Side c"></div>
                <div class="form-group"><label class="form-label" for="angle-a">Angle A (degrees)</label><input type="number" step="any" id="angle-a" class="form-input" placeholder="Angle A"></div>
                <div class="form-group"><label class="form-label" for="angle-b">Angle B (degrees)</label><input type="number" step="any" id="angle-b" class="form-input" placeholder="Angle B"></div>
                <div class="form-group"><label class="form-label" for="angle-c">Angle C (degrees)</label><input type="number" step="any" id="angle-c" class="form-input" placeholder="Angle C"></div>
                <div class="btn-group"><button id="calculate" class="btn btn-primary btn-block">Calculate</button><button id="clear" class="btn btn-secondary">Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer"><p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> | <div class="footer-actions"><a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a><a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a></div></footer>
</body>
</html>
