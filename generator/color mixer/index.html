<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Mix two colors to create a new blended color">
    <meta name="theme-color" content="#2563eb">
    <title>Color Mixer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Color Mixer</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Mix two colors to create a new blended color</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="cm-color1">Color 1</label>
                    <input type="color" id="cm-color1" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="cm-color1-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cm-color2">Color 2</label>
                    <input type="color" id="cm-color2" value="#ef4444" class="color-picker-inline">
                    <input type="text" id="cm-color2-text" value="#ef4444" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cm-ratio">Mix Ratio</label>
                    <input type="range" id="cm-ratio" min="0" max="100" value="50" class="form-range">
                    <span id="cm-ratio-value" class="range-value">50%</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cm-method">Mix Method</label>
                    <select id="cm-method" class="form-select">
                        <option value="rgb">RGB Average</option>
                        <option value="hsl">HSL Blend</option>
                    </select>
                </div>
                <div class="preview-box" id="cm-preview" style="display:flex;gap:8px;padding:20px;align-items:center;"></div>
                <div class="result-box" id="cm-output">
                    <div class="result-label">Mixed Color</div>
                    <code id="cm-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
