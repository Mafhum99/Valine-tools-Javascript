<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate arcsin, arccos, arctan">
    <meta name="theme-color" content="#2563eb">
    <title>🔄 Inverse Trigonometry Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔄</span>
        <h1>Inverse Trigonometry Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate arcsin, arccos, arctan</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input-value">Value</label>
                    <input type="number" step="any" id="input-value" class="form-input" placeholder="Enter value...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="function">Function</label>
                    <select id="function" class="form-select">
                        <option value="arcsin">arcsin (sin⁻¹)</option>
                        <option value="arccos">arccos (cos⁻¹)</option>
                        <option value="arctan">arctan (tan⁻¹)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="unit">Output Unit</label>
                    <select id="unit" class="form-select">
                        <option value="radians">Radians</option>
                        <option value="degrees">Degrees</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
