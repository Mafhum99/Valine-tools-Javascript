<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate neumorphic (soft UI) shadows">
    <meta name="theme-color" content="#2563eb">
    <title>Neumorphic Shadow Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Neumorphic Shadow Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate neumorphic (soft UI) shadows</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="base-color">Base Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="base-color" value="#e0e0e0" class="color-picker">
                        <input type="text" id="base-color-text" value="#e0e0e0" class="form-input color-text" maxlength="7">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="size">Shadow Size (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="size" min="1" max="50" value="10" class="form-range">
                        <span id="size-value" class="range-value">10px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="intensity">Intensity</label>
                    <div class="range-with-value">
                        <input type="range" id="intensity" min="0" max="100" value="30" class="form-range">
                        <span id="intensity-value" class="range-value">0.30</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blur">Blur Radius (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="blur" min="0" max="100" value="20" class="form-range">
                        <span id="blur-value" class="range-value">20px</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="shape">Shape</label>
                    <select id="shape" class="form-select">
                        <option value="flat" selected>Flat</option>
                        <option value="concave">Concave</option>
                        <option value="convex">Convex</option>
                        <option value="pressed">Pressed (Inset)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="border-radius">Border Radius (px)</label>
                    <div class="range-with-value">
                        <input type="range" id="border-radius" min="0" max="100" value="20" class="form-range">
                        <span id="border-radius-value" class="range-value">20px</span>
                    </div>
                </div>

                <div class="shadow-preview-area" id="preview-area">
                    <div class="shadow-preview-box" id="preview-box"></div>
                </div>

                <div class="result-box" id="css-output">
                    <div class="result-label">CSS Code</div>
                    <code id="css-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
