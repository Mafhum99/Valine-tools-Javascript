<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Compare cost-plus, markup, and margin pricing strategies">
    <meta name="theme-color" content="#2563eb">
    <title>Pricing Strategy Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧮</span>
        <h1>Pricing Strategy Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Compare cost-plus, markup, and margin pricing strategies</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="cost">Product Cost ($)</label>
                    <input type="number" id="cost" class="form-input" placeholder="e.g. 50" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="desired_margin">Desired Margin (%)</label>
                    <input type="number" id="desired_margin" class="form-input" placeholder="e.g. 30" step="0.01" min="0" max="99.99">
                </div>
                <div class="form-group">
                    <label class="form-label" for="markup_percent">Markup Percentage (%)</label>
                    <input type="number" id="markup_percent" class="form-input" placeholder="e.g. 50" step="0.01" min="0">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
