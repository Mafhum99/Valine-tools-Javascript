<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate hero sections">
    <meta name="theme-color" content="#2563eb">
    <title>Hero Section Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f31f;</span>
        <h1>Hero Section Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate hero sections</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="heroTitle">Title</label>
                    <input type="text" id="heroTitle" class="form-input" placeholder="Build Something Amazing" maxlength="80" value="Build Something Amazing">
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroSubtitle">Subtitle</label>
                    <textarea id="heroSubtitle" class="form-input" placeholder="The best platform for your needs" rows="2" maxlength="150">The best platform for your needs</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroCTA">CTA Button Text</label>
                    <input type="text" id="heroCTA" class="form-input" placeholder="Get Started" maxlength="30" value="Get Started">
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroBgColor">Background Color</label>
                    <input type="color" id="heroBgColor" class="form-color" value="#0f172a">
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroTextColor">Text Color</label>
                    <input type="color" id="heroTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroAccentColor">Accent / Button Color</label>
                    <input type="color" id="heroAccentColor" class="form-color" value="#3b82f6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroHeight">Height (px)</label>
                    <input type="range" id="heroHeight" class="form-range" min="300" max="800" value="500" step="10">
                    <span id="heroHeightValue" class="range-value">500</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="heroStyle">Layout Style</label>
                    <select id="heroStyle" class="form-input">
                        <option value="center">Centered</option>
                        <option value="left">Left Aligned</option>
                        <option value="split">Split (Text + Visual)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Hero</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="heroPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">HTML/CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
