<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Encode strings for URLs">
    <meta name="theme-color" content="#2563eb">
    <title>URL Encoder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128274;</span>
        <h1>URL Encoder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Encode strings for URLs</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text to Encode</label>
                    <textarea id="input" class="form-textarea" placeholder="Enter text to encode..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="encoding-type">Encoding Type</label>
                    <select id="encoding-type" class="form-select">
                        <option value="component">encodeURIComponent (full encoding)</option>
                        <option value="uri">encodeURI (partial encoding)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="encode" class="btn btn-primary btn-block">Encode</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Encoded Text</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
