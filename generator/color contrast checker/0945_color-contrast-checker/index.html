<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Check color contrast for accessibility (WCAG)">
    <meta name="theme-color" content="#2563eb">
    <title>Color Contrast Checker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Color Contrast Checker</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Check color contrast for accessibility (WCAG)</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="cc-foreground">Text/Foreground Color</label>
                    <input type="color" id="cc-foreground" value="#ffffff" class="color-picker-inline">
                    <input type="text" id="cc-foreground-text" value="#ffffff" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="cc-background">Background Color</label>
                    <input type="color" id="cc-background" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="cc-background-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="preview-box" id="cc-preview" style="padding:24px;border-radius:var(--radius);display:flex;flex-direction:column;gap:8px;"></div>
                <div class="result-box" id="cc-output">
                    <div class="result-label">Results</div>
                    <code id="cc-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy Results</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
