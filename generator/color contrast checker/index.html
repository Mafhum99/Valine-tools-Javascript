<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Check color contrast ratio and WCAG compliance">
    <meta name="theme-color" content="#2563eb">
    <title>&#x26A7; Color Contrast Checker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x26A7;</span>
        <h1>Color Contrast Checker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Check color contrast ratio and WCAG compliance</p>

            <div id="tool-content">
                <div style="display:flex;gap:0.5rem;">
                    <div class="form-group" style="flex:1;">
                        <label class="form-label" for="color1">Text Color</label>
                        <input type="color" id="color1" class="form-input" value="#000000" style="height:50px;cursor:pointer;">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label class="form-label" for="color2">Background Color</label>
                        <input type="color" id="color2" class="form-input" value="#ffffff" style="height:50px;cursor:pointer;">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="check" class="btn btn-primary btn-block">Check Contrast</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Contrast Results</div>
                    <div id="output"></div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .contrast-preview { padding:1.5rem;border-radius:8px;margin:0.75rem 0;text-align:center;font-size:1.1rem;border:1px solid #e5e7eb; }
        .pass { color:#10b981;font-weight:600; }
        .fail { color:#ef4444;font-weight:600; }
        .wcag-table { width:100%;border-collapse:collapse;margin-top:0.75rem;font-size:0.85rem; }
        .wcag-table th, .wcag-table td { padding:0.5rem;border-bottom:1px solid #e5e7eb;text-align:center; }
        .wcag-table th { background:#f9fafb;font-weight:600; }
    </style>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
