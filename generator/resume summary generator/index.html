<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate professional resume summaries">
    <meta name="theme-color" content="#2563eb">
    <title>📝 Resume Summary Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📝</span>
        <h1>Resume Summary Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate professional resume summaries</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="years-exp">Years of Experience</label>
                    <input type="number" id="years-exp" class="form-input" placeholder="e.g., 5" min="0" max="50">
                </div>

                <div class="form-group">
                    <label class="form-label" for="current-role">Current / Most Recent Role</label>
                    <input type="text" id="current-role" class="form-input" placeholder="e.g., Full Stack Developer">
                </div>

                <div class="form-group">
                    <label class="form-label" for="target-role">Target Role</label>
                    <input type="text" id="target-role" class="form-input" placeholder="e.g., Senior Software Engineer">
                </div>

                <div class="form-group">
                    <label class="form-label" for="top-skills">Top Skills</label>
                    <textarea id="top-skills" class="form-textarea" placeholder="List your top skills (one per line)..." rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="summary-tone">Summary Tone</label>
                    <select id="summary-tone" class="form-select">
                        <option value="professional">Professional</option>
                        <option value="enthusiastic">Enthusiastic</option>
                        <option value="executive">Executive / Leadership</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Summary</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
