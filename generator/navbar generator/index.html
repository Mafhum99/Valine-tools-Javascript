<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate navigation bars">
    <meta name="theme-color" content="#2563eb">
    <title>Navbar Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f9ed;</span>
        <h1>Navbar Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate navigation bars</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="navbarLogo">Logo / Brand</label>
                    <input type="text" id="navbarLogo" class="form-input" placeholder="MyBrand" maxlength="30" value="MyBrand">
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarLinks">Links (comma-separated)</label>
                    <input type="text" id="navbarLinks" class="form-input" placeholder="Home, About, Services, Contact" value="Home, About, Services, Contact">
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarBgColor">Background Color</label>
                    <input type="color" id="navbarBgColor" class="form-color" value="#1f2937">
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarTextColor">Text Color</label>
                    <input type="color" id="navbarTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarHoverColor">Hover Color</label>
                    <input type="color" id="navbarHoverColor" class="form-color" value="#3b82f6">
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarHeight">Height (px)</label>
                    <input type="range" id="navbarHeight" class="form-range" min="40" max="100" value="60">
                    <span id="navbarHeightValue" class="range-value">60</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="navbarStyle">Navbar Style</label>
                    <select id="navbarStyle" class="form-input">
                        <option value="horizontal">Horizontal</option>
                        <option value="centered">Centered</option>
                        <option value="split">Split (Logo Left, Links Right)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Navbar</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="navbarPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">HTML/CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy Code</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
