<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Test regular expressions against strings">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F50D; Regex Tester - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F50D;</span>
        <h1>Regex Tester</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Test regular expression patterns against text</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Regex Pattern</label>
                    <input type="text" id="input" class="form-input" placeholder="\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b">
                </div>

                <div class="form-group">
                    <label class="form-label" for="teststring">Test String</label>
                    <textarea id="teststring" class="form-textarea" rows="6" placeholder="Enter text to test against the regex pattern..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="testBtn" class="btn btn-primary">&#x1F50D; Test</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Matches</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
