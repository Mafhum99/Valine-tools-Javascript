<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Test regex against input text, show matches">
    <meta name="theme-color" content="#2563eb">
    <title>&#128300; Regex Tester - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128300;</span>
        <h1>Regex Tester</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Test regex against input text, show matches</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Test text</label>
                    <textarea id="input" class="form-textarea" rows="5" placeholder="Enter text to test against..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pattern">Regex Pattern</label>
                    <input type="text" id="pattern" class="form-input" placeholder='e.g., \b[A-Za-z]+\b'>
                </div>

                <div class="form-group">
                    <label class="form-label" for="flags">Flags</label>
                    <select id="flags" class="form-select">
                        <option value="gi">Global + Case Insensitive (gi)</option>
                        <option value="g">Global only (g)</option>
                        <option value="i">Case Insensitive only (i)</option>
                        <option value="">None</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="test" class="btn btn-primary btn-block">Test Regex</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output" style="white-space: pre-wrap; word-break: break-all;">-</div>
                </div>

                <div id="highlight-box" class="result-box mt-2" style="display:none;">
                    <div class="result-label">Highlighted Matches</div>
                    <div id="highlight-output" style="white-space: pre-wrap; word-break: break-all;"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
