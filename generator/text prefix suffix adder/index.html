<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Add prefix and suffix to each line">
    <meta name="theme-color" content="#2563eb">
    <title>&#128279; Text Prefix/Suffix Adder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128279;</span>
        <h1>Text Prefix/Suffix Adder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Add prefix and suffix to each line</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Input text</label>
                    <textarea id="input" class="form-textarea" rows="5" placeholder="Enter your text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="prefix">Prefix (added before each line)</label>
                    <input type="text" id="prefix" class="form-input" placeholder='e.g., " - " or &lt;li&gt;'>
                </div>

                <div class="form-group">
                    <label class="form-label" for="suffix">Suffix (added after each line)</label>
                    <input type="text" id="suffix" class="form-input" placeholder='e.g., "," or &lt;/li&gt;'>
                </div>

                <div class="btn-group">
                    <button id="apply" class="btn btn-primary btn-block">Apply Prefix/Suffix</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <textarea id="output" class="form-textarea" rows="8" readonly style="white-space: pre-wrap;"></textarea>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
