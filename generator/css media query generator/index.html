<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS media queries">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F4F1; CSS Media Query Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4F1;</span>
        <h1>CSS Media Query Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS @media queries for responsive design</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="device">Device Preset</label>
                    <select id="device" class="form-select">
                        <option value="mobile">Mobile (max-width: 480px)</option>
                        <option value="tablet">Tablet (max-width: 768px)</option>
                        <option value="desktop">Desktop (min-width: 1024px)</option>
                        <option value="custom">Custom</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="breakpoint">Breakpoint (px)</label>
                    <input type="number" id="breakpoint" class="form-input" value="480" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="condition">Condition</label>
                    <select id="condition" class="form-select">
                        <option value="max-width">Max Width</option>
                        <option value="min-width">Min Width</option>
                        <option value="max-height">Max Height</option>
                        <option value="min-height">Min Height</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
