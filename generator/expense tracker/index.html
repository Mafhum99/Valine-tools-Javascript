<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Track your expenses">
    <meta name="theme-color" content="#2563eb">
    <title>📝 Expense Tracker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📝</span>
        <h1>Expense Tracker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Track your expenses</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Expense Description</label>
                    <input type="text" id="input" class="form-input" placeholder="Enter value...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="expenseAmount">Amount ($)</label>
                    <input type="number" id="expenseAmount" class="form-input" value="0" step="0.01" min="0">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">➕ Add Expense</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Expense List</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
