<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert between pace and speed units">
    <meta name="theme-color" content="#2563eb">
    <title>🔄 Pace Converter - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔄</span>
        <h1>Pace Converter</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert between min/km and min/mile pace</p>
            <div class="form-group">
                <label class="form-label" for="paceMinutes">Minutes</label>
                <input type="number" id="paceMinutes" class="form-input" placeholder="e.g., 5" min="0" value="0">
            </div>
            <div class="form-group">
                <label class="form-label" for="paceSeconds">Seconds</label>
                <input type="number" id="paceSeconds" class="form-input" placeholder="e.g., 30" min="0" max="59" value="0">
            </div>
            <div class="form-group">
                <label class="form-label" for="paceUnit">Pace Unit</label>
                <select id="paceUnit" class="form-select">
                    <option value="minkm">min/km</option>
                    <option value="minmi">min/mile</option>
                </select>
            </div>
            <div class="btn-group">
                <button id="convert" class="btn btn-primary btn-block">Convert Pace</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            <div class="result-box" id="result"><div class="result-label">Result</div><div id="output">-</div></div>
            <div class="btn-group"><button id="copy" class="btn btn-secondary">📋 Copy Result</button></div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
