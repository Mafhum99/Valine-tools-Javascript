<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate pagination components">
    <meta name="theme-color" content="#2563eb">
    <title>Pagination Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Pagination Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate pagination components</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="pg-total">Total Pages</label>
                    <input type="number" id="pg-total" value="10" min="1" max="100" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-current">Current Page</label>
                    <input type="number" id="pg-current" value="5" min="1" max="100" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-color">Active Color</label>
                    <input type="color" id="pg-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="pg-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="pg-style">Style</label>
                    <select id="pg-style" class="form-select">
                        <option value="rounded">Rounded Buttons</option>
                        <option value="square">Square Buttons</option>
                        <option value="simple">Simple Numbers</option>
                    </select>
                </div>
                <div class="preview-box" id="pg-preview" style="padding:20px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-family:sans-serif;"></div>
                <div class="result-box" id="pg-output">
                    <div class="result-label">HTML Code</div>
                    <code id="pg-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
