<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Solve quadratic equations (ax²+bx+c=0)">
    <meta name="theme-color" content="#2563eb">
    <title>📊 Quadratic Equation Solver - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #output { font-family: inherit; white-space: normal; }
        .result-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #e2e8f0; }
        .result-label { font-weight: 600; color: #475569; }
        .result-value { color: #1e293b; font-weight: 500; }
        .formula-box { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem; text-align: center; font-size: 1.1rem; color: #2563eb; font-weight: bold; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📊</span>
        <h1>Quadratic Equation Solver</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Solve quadratic equations (ax² + bx + c = 0)</p>
            
            <div id="tool-content">
                <div class="formula-box">ax² + bx + c = 0</div>

                <div class="form-group">
                    <label class="form-label" for="coeffA">Coefficient a</label>
                    <input type="number" id="coeffA" class="form-input" step="any" placeholder="e.g. 1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="coeffB">Coefficient b</label>
                    <input type="number" id="coeffB" class="form-input" step="any" placeholder="e.g. -5">
                </div>

                <div class="form-group">
                    <label class="form-label" for="coeffC">Coefficient c</label>
                    <input type="number" id="coeffC" class="form-input" step="any" placeholder="e.g. 6">
                </div>
                
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Solve Equation</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div id="errorBox" class="error-message" style="display: none; color: #ef4444; margin-top: 1rem;"></div>
                
                <div class="result-box" id="result" style="display: none;">
                    <div class="result-label">Solution</div>
                    <div id="output"></div>
                </div>
                
                <div class="btn-group" id="copyBtnGroup" style="display: none;">
                    <button id="copy" class="btn btn-secondary">📋 Copy Solution</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
