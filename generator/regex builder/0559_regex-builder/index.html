<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Build regex from user criteria">
    <meta name="theme-color" content="#2563eb">
    <title>&#128295; Regex Builder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128295;</span>
        <h1>Regex Builder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Build regex from user criteria</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label">Match Type</label>
                    <select id="matchType" class="form-select">
                        <option value="literal">Exact Text</option>
                        <option value="word">Whole Word</option>
                        <option value="startswith">Starts With</option>
                        <option value="endswith">Ends With</option>
                        <option value="contains">Contains</option>
                        <option value="email">Email Address</option>
                        <option value="url">URL</option>
                        <option value="phone">Phone Number</option>
                        <option value="number">Number</option>
                        <option value="date">Date (MM/DD/YYYY)</option>
                        <option value="ip">IP Address</option>
                        <option value="hex">Hex Color</option>
                        <option value="custom">Custom Character Class</option>
                    </select>
                </div>

                <div class="form-group" id="textInput">
                    <label class="form-label" for="searchText">Text to match</label>
                    <input type="text" id="searchText" class="form-input" placeholder="Enter text...">
                </div>

                <div class="form-group" id="customCharInput" style="display:none;">
                    <label class="form-label" for="customChars">Character Class</label>
                    <input type="text" id="customChars" class="form-input" placeholder="e.g., a-z0-9">
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="caseSensitive"> Case Sensitive
                    </label>
                </div>

                <div class="form-group">
                    <label class="form-check">
                        <input type="checkbox" id="globalMatch" checked> Global Match (find all)
                    </label>
                </div>

                <div class="btn-group">
                    <button id="build" class="btn btn-primary btn-block">Build Regex</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Regex</div>
                    <div id="output" style="font-family:monospace; font-size:1.1rem; white-space:pre-wrap;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Regex</button>
                </div>

                <div class="form-group mt-3">
                    <label class="form-label" for="testText">Test the Regex (optional)</label>
                    <textarea id="testText" class="form-textarea" rows="3" placeholder="Enter text to test against generated regex..."></textarea>
                    <div id="testResult" style="margin-top:0.5rem; font-size:0.9rem;"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
