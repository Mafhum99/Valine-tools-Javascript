<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS ribbon badges">
    <meta name="theme-color" content="#2563eb">
    <title>Ribbon Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1f380;</span>
        <h1>Ribbon Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS ribbon badges</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="ribbonText">Ribbon Text</label>
                    <input type="text" id="ribbonText" class="form-input" placeholder="SALE" maxlength="20" value="SALE">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonPosition">Position</label>
                    <select id="ribbonPosition" class="form-input">
                        <option value="top-right">Top Right Corner</option>
                        <option value="top-left">Top Left Corner</option>
                        <option value="bottom-right">Bottom Right Corner</option>
                        <option value="bottom-left">Bottom Left Corner</option>
                        <option value="top-center">Top Center</option>
                        <option value="center">Center Badge</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonColor">Ribbon Color</label>
                    <input type="color" id="ribbonColor" class="form-color" value="#ef4444">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonTextColor">Text Color</label>
                    <input type="color" id="ribbonTextColor" class="form-color" value="#ffffff">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonFontSize">Font Size (px)</label>
                    <input type="range" id="ribbonFontSize" class="form-range" min="10" max="24" value="14">
                    <span id="ribbonFontSizeValue" class="range-value">14</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonPadding">Padding (px)</label>
                    <input type="range" id="ribbonPadding" class="form-range" min="5" max="30" value="10">
                    <span id="ribbonPaddingValue" class="range-value">10</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonStyle">Ribbon Style</label>
                    <select id="ribbonStyle" class="form-input">
                        <option value="corner">Corner Ribbon</option>
                        <option value="badge">Simple Badge</option>
                        <option value="folded">Folded Ribbon</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Ribbon</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="preview-box" id="preview">
                    <div class="result-label">Preview</div>
                    <div id="ribbonPreview"></div>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">CSS Code</div>
                    <pre id="output" class="code-output">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#x1f4cb; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
