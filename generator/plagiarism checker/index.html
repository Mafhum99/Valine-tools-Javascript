<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Check text similarity percentage (basic plagiarism check)">
    <meta name="theme-color" content="#2563eb">
    <title>&#128270; Plagiarism Checker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128270;</span>
        <h1>Plagiarism Checker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Check text similarity percentage (basic plagiarism check)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="text1">Original Text</label>
                    <textarea id="text1" class="form-textarea" rows="5" placeholder="Paste original text..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="text2">Text to Check</label>
                    <textarea id="text2" class="form-textarea" rows="5" placeholder="Paste text to check for plagiarism..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="method">Analysis Method</label>
                    <select id="method" class="form-select">
                        <option value="ngram">N-gram Overlap (Recommended)</option>
                        <option value="word">Word Match</option>
                        <option value="sequence">Longest Common Subsequence</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="check" class="btn btn-primary btn-block">Check Similarity</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Similarity Analysis</div>
                    <div id="output" style="white-space: pre-wrap;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
