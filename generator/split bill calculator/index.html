<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Split bill among multiple people">
    <meta name="theme-color" content="#2563eb">
    <title>🧾 Split Bill Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🧾</span>
        <h1>Split Bill Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Split bill among multiple people</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Total Bill Amount</label>
                    <input type="number" id="input" class="form-input" placeholder="Enter value..." value="100">
                </div>

                <div class="form-group">
                    <label class="form-label" for="taxPercent">Tax Percentage</label>
                    <input type="number" id="taxPercent" class="form-input" value="0" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tipPercent">Tip Percentage</label>
                    <input type="number" id="tipPercent" class="form-input" value="15" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label" for="numPeople">Number of People</label>
                    <input type="number" id="numPeople" class="form-input" value="2" min="1">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">🧾 Split Bill</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Split Result</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
