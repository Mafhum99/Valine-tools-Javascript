<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate organic blob SVG shapes">
    <meta name="theme-color" content="#2563eb">
    <title>Blob Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Blob Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate organic blob SVG shapes</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="blob-size">Size (px)</label>
                    <input type="number" id="blob-size" value="200" min="50" max="500" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-complexity">Complexity (Points)</label>
                    <div class="range-with-value">
                        <input type="range" id="blob-complexity" min="4" max="16" step="1" value="8" class="form-range">
                        <span id="blob-complexity-value" class="range-value">8</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-randomness">Randomness</label>
                    <div class="range-with-value">
                        <input type="range" id="blob-randomness" min="10" max="100" step="5" value="50" class="form-range">
                        <span id="blob-randomness-value" class="range-value">50%</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-smoothness">Smoothness</label>
                    <div class="range-with-value">
                        <input type="range" id="blob-smoothness" min="0.1" max="1" step="0.05" value="0.5" class="form-range">
                        <span id="blob-smoothness-value" class="range-value">0.5</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-color">Fill Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="blob-color" value="#6366f1" class="color-picker">
                        <input type="text" id="blob-color-text" value="#6366f1" class="form-input color-text" maxlength="7">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-color-2">Gradient End Color</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="blob-color-2" value="#ec4899" class="color-picker">
                        <input type="text" id="blob-color-2-text" value="#ec4899" class="form-input color-text" maxlength="7">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="blob-use-gradient">Fill Type</label>
                    <select id="blob-use-gradient" class="form-select">
                        <option value="gradient">Gradient</option>
                        <option value="solid">Solid Color</option>
                    </select>
                </div>

                <div class="svg-preview" id="svg-preview"></div>

                <div class="result-box" id="svg-output">
                    <div class="result-label">SVG Code</div>
                    <code id="svg-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy SVG</button>
                    <button id="randomize" class="btn btn-primary">Generate New Blob</button>
                    <button id="download" class="btn btn-secondary">Download SVG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
