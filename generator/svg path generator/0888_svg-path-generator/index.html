<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate SVG path data">
    <meta name="theme-color" content="#2563eb">
    <title>SVG Path Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>SVG Path Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate SVG path data</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="path-type">Path Type</label>
                    <select id="path-type" class="form-select">
                        <option value="line">Straight Line</option>
                        <option value="curve">Cubic Bezier Curve</option>
                        <option value="quadratic">Quadratic Bezier Curve</option>
                        <option value="arc">Arc</option>
                        <option value="rectangle">Rectangle Path</option>
                        <option value="circle">Circle Path</option>
                    </select>
                </div>

                <!-- Line Controls -->
                <div id="line-controls" class="path-controls">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="line-x1">X1</label>
                            <input type="number" id="line-x1" value="20" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="line-y1">Y1</label>
                            <input type="number" id="line-y1" value="20" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="line-x2">X2</label>
                            <input type="number" id="line-x2" value="180" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="line-y2">Y2</label>
                            <input type="number" id="line-y2" value="80" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Curve Controls -->
                <div id="curve-controls" class="path-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="curve-x1">Start X</label>
                            <input type="number" id="curve-x1" value="20" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="curve-y1">Start Y</label>
                            <input type="number" id="curve-y1" value="80" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="curve-cp1x">Control Point 1 X</label>
                            <input type="number" id="curve-cp1x" value="60" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="curve-cp1y">Control Point 1 Y</label>
                            <input type="number" id="curve-cp1y" value="10" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="curve-cp2x">Control Point 2 X</label>
                            <input type="number" id="curve-cp2x" value="140" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="curve-cp2y">Control Point 2 Y</label>
                            <input type="number" id="curve-cp2y" value="150" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="curve-ex">End X</label>
                            <input type="number" id="curve-ex" value="180" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="curve-ey">End Y</label>
                            <input type="number" id="curve-ey" value="80" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Quadratic Controls -->
                <div id="quadratic-controls" class="path-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="quad-x1">Start X</label>
                            <input type="number" id="quad-x1" value="20" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="quad-y1">Start Y</label>
                            <input type="number" id="quad-y1" value="80" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="quad-cpx">Control Point X</label>
                            <input type="number" id="quad-cpx" value="100" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="quad-cpy">Control Point Y</label>
                            <input type="number" id="quad-cpy" value="10" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="quad-ex">End X</label>
                            <input type="number" id="quad-ex" value="180" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="quad-ey">End Y</label>
                            <input type="number" id="quad-ey" value="80" class="form-input">
                        </div>
                    </div>
                </div>

                <!-- Arc Controls -->
                <div id="arc-controls" class="path-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="arc-x1">Start X</label>
                            <input type="number" id="arc-x1" value="20" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="arc-y1">Start Y</label>
                            <input type="number" id="arc-y1" value="80" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="arc-rx">Radius X</label>
                            <input type="number" id="arc-rx" value="60" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="arc-ry">Radius Y</label>
                            <input type="number" id="arc-ry" value="60" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="arc-rotation">Rotation (deg)</label>
                            <input type="number" id="arc-rotation" value="0" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="arc-ex">End X</label>
                            <input type="number" id="arc-ex" value="180" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="arc-ey">End Y</label>
                            <input type="number" id="arc-ey" value="80" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="arc-large">Large Arc</label>
                            <select id="arc-large" class="form-select">
                                <option value="0">0 (Small)</option>
                                <option value="1">1 (Large)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="arc-sweep">Sweep</label>
                        <select id="arc-sweep" class="form-select">
                            <option value="1">1 (Clockwise)</option>
                            <option value="0">0 (Counter-clockwise)</option>
                        </select>
                    </div>
                </div>

                <!-- Rectangle Controls -->
                <div id="rectangle-controls" class="path-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="rect-x">X</label>
                            <input type="number" id="rect-x" value="20" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="rect-y">Y</label>
                            <input type="number" id="rect-y" value="20" class="form-input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="rect-w">Width</label>
                            <input type="number" id="rect-w" value="160" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="rect-h">Height</label>
                            <input type="number" id="rect-h" value="100" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="rect-rx">Corner Radius</label>
                        <input type="number" id="rect-rx" value="0" min="0" class="form-input">
                    </div>
                </div>

                <!-- Circle Controls -->
                <div id="circle-controls" class="path-controls" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="circle-cx">Center X</label>
                            <input type="number" id="circle-cx" value="100" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="circle-cy">Center Y</label>
                            <input type="number" id="circle-cy" value="70" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="circle-r">Radius</label>
                        <input type="number" id="circle-r" value="50" min="1" class="form-input">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="stroke-color">Stroke Color</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="stroke-color" value="#6366f1" class="color-picker">
                            <input type="text" id="stroke-color-text" value="#6366f1" class="form-input color-text" maxlength="7">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="stroke-width">Stroke Width</label>
                        <input type="number" id="stroke-width" value="3" min="1" max="20" class="form-input">
                    </div>
                </div>

                <div class="svg-preview" id="svg-preview"></div>

                <div class="result-box" id="path-output">
                    <div class="result-label">SVG Path Code</div>
                    <code id="path-code"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy Path</button>
                    <button id="copy-full" class="btn btn-secondary">Copy Full SVG</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
