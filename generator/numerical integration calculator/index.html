<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Numerical integration using Trapezoidal Rule and Simpson's Rule">
    <meta name="theme-color" content="#2563eb">
    <title>Numerical Integration Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .int-result .result-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 0.75rem; }
        .int-result .result-card .label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .int-result .result-card .value { font-size: 1.5rem; font-weight: 700; color: #2563eb; margin-top: 0.25rem; }
        .int-result .result-card .value-sci { font-size: 0.875rem; color: #6b7280; font-family: monospace; margin-top: 0.25rem; }
        .int-result .params { display: flex; gap: 1rem; flex-wrap: wrap; margin: 0.75rem 0; font-size: 0.875rem; color: #374151; }
        .int-result .params span { background: #e5e7eb; padding: 0.25rem 0.75rem; border-radius: 0.375rem; }
        .int-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; font-family: monospace; margin-top: 0.5rem; }
        .int-table th, .int-table td { padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; text-align: center; }
        .int-table th { background: #f3f4f6; font-weight: 600; }
        .int-table .endpoint { background: #dbeafe; }
        .copy-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .btn-copy { padding: 0.5rem 1rem; background: #e5e7eb; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; font-weight: 600; }
        .btn-copy:hover { background: #d1d5db; }
        #int-result { margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">∫</span>
        <h1>Numerical Integration Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Compute definite integrals using Trapezoidal or Simpson's Rule</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="int-fx">Function f(x)</label>
                    <input type="text" id="int-fx" class="form-input" placeholder="e.g. x^2, sin(x), x^3 + 2*x">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div class="form-group">
                        <label class="form-label" for="int-a">Lower Bound (a)</label>
                        <input type="number" id="int-a" class="form-input" placeholder="e.g. 0" step="any">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="int-b">Upper Bound (b)</label>
                        <input type="number" id="int-b" class="form-input" placeholder="e.g. 1" step="any">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="int-method">Method</label>
                    <select id="int-method" class="form-select">
                        <option value="trapezoidal">Trapezoidal Rule</option>
                        <option value="simpson">Simpson's Rule</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="int-n">Number of Segments (n)</label>
                    <input type="number" id="int-n" class="form-input" placeholder="e.g. 10" min="2" step="1" value="10">
                </div>
                <div class="btn-group">
                    <button id="int-calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="int-clear" class="btn btn-secondary">Clear</button>
                </div>
                <div id="int-result"></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
