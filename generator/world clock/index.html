<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="View current time in different world timezones">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F30D; World Clock - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F30D;</span>
        <h1>World Clock</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">View current time in different world timezones</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="timezone">Select Timezone</label>
                    <select id="timezone" class="form-input">
                        <option value="UTC">UTC</option>
                        <option value="America/New_York">New York (EST/EDT)</option>
                        <option value="America/Chicago">Chicago (CST/CDT)</option>
                        <option value="America/Denver">Denver (MST/MDT)</option>
                        <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
                        <option value="America/Sao_Paulo">Sao Paulo</option>
                        <option value="Europe/London">London (GMT/BST)</option>
                        <option value="Europe/Paris">Paris (CET/CEST)</option>
                        <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                        <option value="Europe/Moscow">Moscow</option>
                        <option value="Asia/Dubai">Dubai</option>
                        <option value="Asia/Kolkata">Mumbai (IST)</option>
                        <option value="Asia/Bangkok">Bangkok</option>
                        <option value="Asia/Shanghai">Beijing</option>
                        <option value="Asia/Tokyo">Tokyo (JST)</option>
                        <option value="Asia/Seoul">Seoul (KST)</option>
                        <option value="Australia/Sydney">Sydney</option>
                        <option value="Pacific/Auckland">Auckland</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="show" class="btn btn-primary btn-block">Show Time</button>
                    <button id="toggle-live" class="btn btn-secondary">Live Update: Off</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Current Time</div>
                    <div id="output">-</div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
