<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate optimal line height for typography">
    <meta name="theme-color" content="#2563eb">
    <title>Line Height Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Line Height Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate optimal line height for typography</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="lh-fontsize">Font Size (px)</label>
                    <input type="range" id="lh-fontsize" min="10" max="48" value="16" class="form-range">
                    <span id="lh-fontsize-value" class="range-value">16px</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lh-lineheight">Line Height (multiplier)</label>
                    <input type="range" id="lh-lineheight" min="1" max="2.5" step="0.05" value="1.6" class="form-range">
                    <span id="lh-lineheight-value" class="range-value">1.6</span>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lh-type">Content Type</label>
                    <select id="lh-type" class="form-select">
                        <option value="body">Body Text</option>
                        <option value="heading">Headings</option>
                        <option value="caption">Captions/Small Text</option>
                    </select>
                </div>
                <div class="preview-box" id="lh-preview" style="padding:20px;"></div>
                <div class="result-box" id="lh-output">
                    <div class="result-label">CSS Code</div>
                    <code id="lh-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
