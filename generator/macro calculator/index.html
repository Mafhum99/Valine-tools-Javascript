<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate macronutrient needs based on calories and ratios">
    <meta name="theme-color" content="#2563eb">
    <title>Macro Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🥗</span>
        <h1>Macro Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate macronutrient grams from total calories and macro percentages</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="total-calories">Total Calories (kcal)</label>
                    <input type="number" id="total-calories" class="form-input" placeholder="e.g. 2000" min="0" step="any">
                </div>
                <div class="form-group">
                    <label class="form-label" for="protein-pct">Protein (%)</label>
                    <input type="number" id="protein-pct" class="form-input" placeholder="e.g. 30" min="0" max="100" step="any">
                </div>
                <div class="form-group">
                    <label class="form-label" for="carbs-pct">Carbs (%)</label>
                    <input type="number" id="carbs-pct" class="form-input" placeholder="e.g. 40" min="0" max="100" step="any">
                </div>
                <div class="form-group">
                    <label class="form-label" for="fat-pct">Fat (%)</label>
                    <input type="number" id="fat-pct" class="form-input" placeholder="e.g. 30" min="0" max="100" step="any">
                </div>
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">🐙 GitHub</a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">☕ Support me</a>
        </div>
    </footer>
</body>
</html>
