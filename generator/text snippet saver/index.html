<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Save text snippets">
    <meta name="theme-color" content="#2563eb">
    <title>Text Snippet Saver - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💾</span>
        <h1>Text Snippet Saver</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Save and reuse text snippets</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="snippet-title">Title</label>
                    <input type="text" id="snippet-title" class="form-input" placeholder="Snippet title...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="snippet-content">Content</label>
                    <textarea id="snippet-content" class="form-input form-textarea" rows="5" placeholder="Enter text snippet..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="snippet-tag">Tag (optional)</label>
                    <input type="text" id="snippet-tag" class="form-input" placeholder="e.g., email, code, quote">
                </div>

                <div class="btn-group">
                    <button id="save-snippet" class="btn btn-primary btn-block">Save Snippet</button>
                </div>

                <div id="snippets-list" class="mt-3">
                    <div class="d-flex justify-between align-center mb-2">
                        <h3 class="text-lg font-semibold">Saved Snippets</h3>
                        <button id="clear-snippets" class="btn btn-sm btn-danger">Clear All</button>
                    </div>
                    <div id="snippets-container"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
