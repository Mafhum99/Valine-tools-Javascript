<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Decode URL-encoded strings">
    <meta name="theme-color" content="#2563eb">
    <title>URL Decoder - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128275;</span>
        <h1>URL Decoder</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Decode URL-encoded strings</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">URL-Encoded Text</label>
                    <textarea id="input" class="form-textarea" placeholder="e.g. Hello%20World%21"></textarea>
                </div>

                <div class="btn-group">
                    <button id="decode" class="btn btn-primary btn-block">Decode</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Decoded Text</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
