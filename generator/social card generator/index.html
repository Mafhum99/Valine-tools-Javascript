<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate social media card previews">
    <meta name="theme-color" content="#2563eb">
    <title>Social Card Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Social Card Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate social media card previews</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="sc-site">Site Name</label>
                    <input type="text" id="sc-site" value="mysite.com" class="form-input" placeholder="example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sc-title">Card Title</label>
                    <input type="text" id="sc-title" value="Amazing Article Title" class="form-input" placeholder="Card title">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sc-desc">Card Description</label>
                    <input type="text" id="sc-desc" value="Click to read this amazing article about web development and design." class="form-input" placeholder="Short description">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sc-color">Border/Brand Color</label>
                    <input type="color" id="sc-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="sc-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>

                <div class="form-group">
                    <label class="form-label" for="sc-platform">Platform Style</label>
                    <select id="sc-platform" class="form-select">
                        <option value="twitter">Twitter/X</option>
                        <option value="facebook">Facebook</option>
                        <option value="linkedin">LinkedIn</option>
                    </select>
                </div>

                <div class="preview-box" id="sc-preview" style="max-width:500px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray-300);"></div>

                <div class="result-box" id="sc-output">
                    <div class="result-label">HTML Code</div>
                    <code id="sc-css"></code>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                    <button id="random" class="btn btn-secondary">Random Color</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
