<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate CSS ribbons">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F380; CSS Ribbon Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F380;</span>
        <h1>CSS Ribbon Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate CSS ribbon badges</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="color">Ribbon Color</label>
                    <input type="color" id="color" class="form-input form-input-color" value="#ef4444">
                    <input type="text" id="colorText" class="form-input" value="#ef4444" maxlength="7">
                </div>

                <div class="form-group">
                    <label class="form-label" for="ribbonPosition">Position</label>
                    <select id="ribbonPosition" class="form-select">
                        <option value="top-left">Top Left</option>
                        <option value="top-right">Top Right</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="text">Ribbon Text</label>
                    <input type="text" id="text" class="form-input" value="SALE" placeholder="SALE">
                </div>

                <div class="btn-group">
                    <button id="generateBtn" class="btn btn-primary">&#x26A1; Generate</button>
                    <button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Preview</div>
                    <div class="preview-container">
                        <div id="preview" class="ribbon-card">
                            <div class="ribbon" id="ribbon">SALE</div>
                            <p style="padding: 2rem; text-align: center; color: var(--gray-600);">Card Content</p>
                        </div>
                    </div>
                    <div class="result-label mt-2">CSS Code</div>
                    <pre id="output" class="code-block">-</pre>
                </div>

                <div class="btn-group">
                    <button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy CSS</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
