<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Convert between px, rem, and em units">
    <meta name="theme-color" content="#2563eb">
    <title>REM Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>REM Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Convert between px, rem, and em units</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="rem-root">Root Font Size (px)</label>
                    <input type="number" id="rem-root" value="16" min="10" max="24" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label" for="rem-values">Pixel Values (comma separated)</label>
                    <input type="text" id="rem-values" value="12,14,16,18,20,24,32,36,48" class="form-input" placeholder="12,14,16,18,20">
                </div>
                <div class="result-box" id="rem-output">
                    <div class="result-label">Conversion Table</div>
                    <code id="rem-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy CSS</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
