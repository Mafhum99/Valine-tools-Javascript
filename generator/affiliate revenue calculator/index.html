<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Affiliate Revenue Calculator">
    <meta name="theme-color" content="#2563eb">
    <title>💰 Affiliate Revenue Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">💰</span>
        <h1>Affiliate Revenue Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Affiliate Revenue Calculator</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="affiliates">Number of Affiliates</label>
                    <input type="number" id="affiliates" class="form-input" placeholder="e.g., 50">
                </div>
                <div class="form-group">
                    <label class="form-label" for="sales_per">Sales per Affiliate</label>
                    <input type="number" id="sales_per" class="form-input" placeholder="e.g., 10">
                </div>
                <div class="form-group">
                    <label class="form-label" for="avg_sale">Average Sale Value ($)</label>
                    <input type="number" id="avg_sale" class="form-input" placeholder="e.g., 75">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
