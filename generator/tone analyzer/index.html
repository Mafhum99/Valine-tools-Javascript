<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Analyze tone (formal, casual, positive, negative)">
    <meta name="theme-color" content="#2563eb">
    <title>&#127917; Tone Analyzer - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127917;</span>
        <h1>Tone Analyzer</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Analyze tone (formal, casual, positive, negative)</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Text to analyze</label>
                    <textarea id="input" class="form-textarea" rows="6" placeholder="Enter text to analyze tone..."></textarea>
                </div>

                <div class="btn-group">
                    <button id="analyze" class="btn btn-primary btn-block">Analyze Tone</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Tone Analysis Results</div>
                    <div id="output" style="white-space: pre-wrap;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Results</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
