<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate team member sections">
    <meta name="theme-color" content="#2563eb">
    <title>Team Section Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon"></span>
        <h1>Team Section Generator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate team member sections</p>
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="tm-members">Members (name:role, one per line)</label>
                    <textarea id="tm-members" class="form-textarea" rows="3">Alice Johnson:CEO & Founder
Bob Williams:Lead Developer
Carol Davis:Design Lead</textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="tm-color">Accent Color</label>
                    <input type="color" id="tm-color" value="#3b82f6" class="color-picker-inline">
                    <input type="text" id="tm-color-text" value="#3b82f6" class="form-input" maxlength="7" placeholder="#hex">
                </div>
                <div class="form-group">
                    <label class="form-label" for="tm-layout">Layout</label>
                    <select id="tm-layout" class="form-select">
                        <option value="grid">Grid</option>
                        <option value="row">Row</option>
                    </select>
                </div>
                <div class="preview-box" id="tm-preview" style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;padding:10px;"></div>
                <div class="result-box" id="tm-output">
                    <div class="result-label">HTML Code</div>
                    <code id="tm-css"></code>
                </div>
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">Copy HTML</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
