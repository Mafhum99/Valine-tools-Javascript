<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random words">
    <meta name="theme-color" content="#2563eb">
    <title>Random Word Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#127922;</span>
        <h1>Random Word Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random words</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="count">Number of Words</label>
                    <input type="number" id="count" class="form-input" placeholder="10" min="1" max="100" value="10">
                </div>

                <div class="form-group">
                    <label class="form-label" for="separator">Separator</label>
                    <select id="separator" class="form-select">
                        <option value=", ">Comma</option>
                        <option value=" ">Space</option>
                        <option value="\n">New Line</option>
                        <option value="\n">Bullet List</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Words</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Words</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
