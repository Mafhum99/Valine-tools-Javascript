<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Simple thesaurus with synonyms">
    <meta name="theme-color" content="#2563eb">
    <title>&#128214; Thesaurus Lookup - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#128214;</span>
        <h1>Thesaurus Lookup</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Simple thesaurus with synonyms</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Enter a word</label>
                    <input type="text" id="input" class="form-input" placeholder="e.g., happy, fast, big...">
                </div>

                <div class="btn-group">
                    <button id="lookup" class="btn btn-primary btn-block">Lookup Synonyms</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Synonyms</div>
                    <div id="output" style="white-space: pre-wrap; line-height:2;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">&#128203; Copy Synonyms</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
