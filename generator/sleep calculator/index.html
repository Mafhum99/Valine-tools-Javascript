<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate optimal sleep and wake-up times based on sleep cycles.">
    <meta name="theme-color" content="#2563eb">
    <title>😴 Sleep Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <a href="../../index.html" class="back-btn">←</a>
        <span class="tool-header-icon">😴</span>
        <h1>Sleep Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Determine the best time to sleep or wake up to feel refreshed.</p>

            <div id="tool-content">
                <!-- ====== TOOL CONTENT START ====== -->
                <div class="form-group">
                    <label class="form-label" for="calc-mode">I want to...</label>
                    <select id="calc-mode" class="form-select">
                        <option value="to-wake">Wake up at...</option>
                        <option value="to-sleep">Go to sleep at...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="target-time">Time (HH:mm)</label>
                    <input type="time" id="target-time" class="form-input">
                </div>

                <div class="btn-group">
                    <button id="action-btn" class="btn btn-primary btn-block">Calculate Best Times</button>
                    <button id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Optimal Times</div>
                    <div id="output">Enter a time to see the best sleep/wake schedule.</div>
                </div>

                <div class="btn-group">
                    <button id="copy-btn" class="btn btn-secondary">📋 Copy Result</button>
                </div>
                <!-- ====== TOOL CONTENT END ====== -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |  
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
