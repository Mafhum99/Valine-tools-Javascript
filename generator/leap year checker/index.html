<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Check if a year is a leap year">
    <meta name="theme-color" content="#2563eb">
    <title>&#x1F50D; Leap Year Checker - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F50D;</span>
        <h1>Leap Year Checker</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Check if a year is a leap year</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="year">Enter Year</label>
                    <input type="number" id="year" class="form-input" placeholder="e.g., 2024" value="2024" min="1" max="9999">
                </div>

                <div class="btn-group">
                    <button id="check" class="btn btn-primary btn-block">Check</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
