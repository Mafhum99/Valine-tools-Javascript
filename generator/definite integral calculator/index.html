<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate definite integrals with bounds">
    <meta name="theme-color" content="#2563eb">
    <title>∫ Definite Integral Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">∫</span>
        <h1>Definite Integral Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate definite integrals with bounds</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="functionExpr">Function f(x)</label>
                    <input type="text" id="functionExpr" class="form-input" placeholder="e.g., x**2 + Math.sin(x), Math.exp(x)">
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label" for="lowerBound">Lower Bound (a)</label>
                        <input type="number" id="lowerBound" class="form-input" placeholder="0" step="any">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="upperBound">Upper Bound (b)</label>
                        <input type="number" id="upperBound" class="form-input" placeholder="1" step="any">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="intervals">Intervals (n)</label>
                        <input type="number" id="intervals" class="form-input" placeholder="10" step="1" min="2" value="10">
                    </div>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
