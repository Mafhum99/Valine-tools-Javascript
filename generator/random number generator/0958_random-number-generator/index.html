<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate random numbers in a range">
    <meta name="theme-color" content="#2563eb">
    <title>🎲 Random Number Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🎲</span>
        <h1>Random Number Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate random numbers in a range</p>

            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="input">Minimum Value</label>
                    <input type="number" id="input" class="form-input" placeholder="Enter value..." value="1">
                </div>

                <div class="form-group">
                    <label class="form-label" for="max">Maximum Value</label>
                    <input type="number" id="max" class="form-input" value="100">
                </div>
                <div class="form-group">
                    <label class="form-label" for="count">How Many Numbers (1-50)</label>
                    <input type="number" id="count" class="form-input" value="1" min="1" max="50">
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">🎲 Generate Numbers</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Generated Numbers</div>
                    <div id="output" style="font-family: monospace; word-break: break-all;">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Numbers</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
