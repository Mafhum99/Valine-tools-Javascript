<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Generate catchy blog post titles">
    <meta name="theme-color" content="#2563eb">
    <title>📰 Blog Post Title Generator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">📰</span>
        <h1>Blog Post Title Generator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Generate catchy blog post titles</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="topic">Topic</label>
                    <input type="text" id="topic" class="form-input" placeholder="e.g., Productivity tips, Healthy eating...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="title-style">Title Style</label>
                    <select id="title-style" class="form-select">
                        <option value="how-to">How-To</option>
                        <option value="list">List / Numbered</option>
                        <option value="question">Question</option>
                        <option value="guide">Ultimate Guide</option>
                        <option value="controversial">Controversial / Bold</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="generate" class="btn btn-primary btn-block">Generate Titles</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
