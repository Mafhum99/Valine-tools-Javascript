<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate area and arc length of a circular sector">
    <meta name="theme-color" content="#2563eb">
    <title>🥧 Sector Area Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🥧</span>
        <h1>Sector Area Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate area and arc length of a circular sector based on radius and central angle.</p>
            
            <div id="tool-content">
                <div class="form-group">
                    <label class="form-label" for="radius">Radius (r)</label>
                    <input type="number" id="radius" class="form-input" placeholder="Enter radius..." step="any" min="0">
                </div>

                <div class="form-group">
                    <label class="form-label" for="angle">Central Angle (θ)</label>
                    <input type="number" id="angle" class="form-input" placeholder="Enter angle..." step="any">
                </div>

                <div class="form-group">
                    <label class="form-label" for="unit">Angle Unit</label>
                    <select id="unit" class="form-select">
                        <option value="degrees">Degrees (°)</option>
                        <option value="radians">Radians (rad)</option>
                    </select>
                </div>
                
                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>
                
                <div class="result-box" id="result">
                    <div class="result-label">Result</div>
                    <div id="output">-</div>
                </div>
                
                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
    <script src="script.js" defer></script>
</body>
</html>
