<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&#x1F4CA; Logarithm Calculator - Mini Tools</title>
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">&#x1F4CA;</span>
        <h1>Logarithm Calculator</h1>
    </header>
    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate logarithms with various bases</p>
            <div id="tool-content">
                <div class="form-group"><label class="form-label" for="number">Number</label><input type="number" id="number" class="form-input" placeholder="100" step="any"></div>
                <div class="form-group"><label class="form-label" for="base">Base</label><select id="base" class="form-input"><option value="e">e (natural log, ln)</option><option value="10">10 (common log)</option><option value="2">2 (binary log)</option><option value="custom">Custom</option></select></div>
                <div class="form-group" id="customBaseGroup" style="display:none;"><label class="form-label" for="customBase">Custom Base</label><input type="number" id="customBase" class="form-input" placeholder="5" step="any"></div>
                <div class="btn-group"><button id="calculateBtn" class="btn btn-primary">&#x1F522; Calculate log</button><button id="clearBtn" class="btn btn-secondary">&#x1F5D1; Clear</button></div>
                <div class="result-box" id="result"><div class="result-label">Logarithm Result</div><div id="output">-</div></div>
                <div class="btn-group"><button id="copyBtn" class="btn btn-secondary">&#x1F4CB; Copy Result</button></div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
