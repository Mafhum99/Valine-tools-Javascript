<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Calculate basal metabolic rate">
    <meta name="theme-color" content="#2563eb">
    <title>🔥 BMR Calculator - Mini Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="tool-header">
        <span class="tool-header-icon">🔥</span>
        <h1>BMR Calculator</h1>
    </header>

    <main class="tool-container">
        <div class="tool-card">
            <p class="text-muted mb-2">Calculate basal metabolic rate</p>
            
            <div id="tool-content">
                <!-- Tool content goes here -->
                <div class="form-group">
                    <label class="form-label" for="gender">Gender</label>
                    <div style="display:flex;gap:1rem;" id="gender">
                        <label style="display:flex;align-items:center;gap:0.25rem;cursor:pointer;">
                            <input type="radio" name="gender" value="male" checked> Male
                        </label>
                        <label style="display:flex;align-items:center;gap:0.25rem;cursor:pointer;">
                            <input type="radio" name="gender" value="female"> Female
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="age">Age (years)</label>
                    <input type="number" id="age" class="form-input" placeholder="e.g. 25" min="15" max="100" step="1">
                </div>

                <div class="form-group">
                    <label class="form-label">Weight</label>
                    <div style="display:flex;gap:0.5rem;">
                        <input type="number" id="weight" class="form-input" placeholder="Enter weight" min="0" max="500" step="any" style="flex:1;">
                        <select id="weight-unit" class="form-input" style="width:80px;flex:none;">
                            <option value="kg">kg</option>
                            <option value="lbs">lbs</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Height</label>
                    <div id="height-metric" style="display:flex;gap:0.5rem;">
                        <input type="number" id="height-cm" class="form-input" placeholder="Height in cm" min="0" max="300" step="any" style="flex:1;">
                        <select id="height-unit" class="form-input" style="width:80px;flex:none;">
                            <option value="cm">cm</option>
                            <option value="ft">ft/in</option>
                        </select>
                    </div>
                    <div id="height-imperial" style="display:none;gap:0.5rem;">
                        <input type="number" id="height-ft" class="form-input" placeholder="Feet" min="0" max="9" step="1" style="flex:1;">
                        <input type="number" id="height-in" class="form-input" placeholder="Inches" min="0" max="11" step="any" style="flex:1;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="activity">Activity Level</label>
                    <select id="activity" class="form-input">
                        <option value="1.2">Sedentary (little or no exercise)</option>
                        <option value="1.375">Lightly Active (light exercise 1-3 days/week)</option>
                        <option value="1.55" selected>Moderately Active (moderate exercise 3-5 days/week)</option>
                        <option value="1.725">Very Active (hard exercise 6-7 days/week)</option>
                        <option value="1.9">Extra Active (very hard exercise, physical job)</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="calculate" class="btn btn-primary btn-block">Calculate</button>
                    <button id="clear" class="btn btn-secondary">Clear</button>
                </div>

                <div class="result-box" id="result">
                    <div class="result-label">Results</div>
                    <div id="output">-</div>
                </div>

                <div class="btn-group">
                    <button id="copy" class="btn btn-secondary">📋 Copy Result</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer class="site-footer">
        <p>© 2026 Dibuat dengan ❤️ - By : Andi Almafhum</p> |
        <div class="footer-actions">
            <a class="footer-btn footer-github" href="https://github.com/mafhum99" target="_blank" rel="noopener noreferrer">
                🐙 GitHub
            </a>
            <a class="footer-btn footer-saweria" href="https://saweria.co/mafhum" target="_blank" rel="noopener noreferrer">
                ☕ Support me
            </a>
        </div>
    </footer>
</body>
</html>
